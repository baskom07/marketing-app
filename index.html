// v2.49: Berkas Penting LINK-BASED — simpan link Google Drive / Dropbox / URL apa pun.
// Gak butuh Firebase Storage (gratis tanpa Blaze plan). Marketing Tracker jadi katalog/index berkas.

function berkasDetectType(url) {
  const u = (url || '').toLowerCase();
  if (u.includes('docs.google.com/spreadsheets')) return { ext: 'gsheets', icon: '📊', label: 'Google Sheets' };
  if (u.includes('docs.google.com/document')) return { ext: 'gdocs', icon: '📘', label: 'Google Docs' };
  if (u.includes('docs.google.com/presentation')) return { ext: 'gslides', icon: '📙', label: 'Google Slides' };
  if (u.includes('docs.google.com/forms')) return { ext: 'gforms', icon: '📋', label: 'Google Forms' };
  if (/\.xlsx?(\?|$)/.test(u) || /\.csv(\?|$)/.test(u)) return { ext: 'xlsx', icon: '📊', label: 'Excel' };
  if (/\.pdf(\?|$)/.test(u)) return { ext: 'pdf', icon: '📕', label: 'PDF' };
  if (/\.docx?(\?|$)/.test(u)) return { ext: 'docx', icon: '📘', label: 'Word' };
  if (/\.pptx?(\?|$)/.test(u)) return { ext: 'pptx', icon: '📙', label: 'PowerPoint' };
  if (/\.(png|jpg|jpeg|gif|webp)(\?|$)/.test(u)) return { ext: 'image', icon: '🖼️', label: 'Gambar' };
  if (/\.zip(\?|$)/.test(u)) return { ext: 'zip', icon: '🗜️', label: 'ZIP' };
  if (u.includes('drive.google.com')) return { ext: 'gdrive', icon: '📎', label: 'Google Drive' };
  if (u.includes('dropbox.com')) return { ext: 'dropbox', icon: '📦', label: 'Dropbox' };
  if (u.includes('onedrive.com') || u.includes('1drv.ms')) return { ext: 'onedrive', icon: '☁️', label: 'OneDrive' };
  return { ext: 'link', icon: '🔗', label: 'Link' };
}

function isValidBerkasUrl(url) {
  if (!url || typeof url !== 'string') return false;
  try {
    const u = new URL(url);
    return u.protocol === 'http:' || u.protocol === 'https:';
  } catch (e) { return false; }
}

function renderBerkasList() {
  const root = document.getElementById('berkas-list-root');
  if (!root) return;
  const files = STATE.files || [];
  if (files.length === 0) {
    root.innerHTML = `
      <div style="background:white;border:1px solid var(--border);border-radius:8px;padding:60px 20px;text-align:center;color:var(--text-muted)">
        <div style="font-size:42px;margin-bottom:8px">📎</div>
        <div style="font-size:14px;font-weight:600;margin-bottom:4px">Belum ada berkas</div>
        <div style="font-size:12px">Klik "+ Tambah Berkas" untuk paste link berkas Drive/Sheets/Docs/PDF.</div>
      </div>
    `;
    return;
  }
  const rows = files.map(f => {
    const t = berkasDetectType(f.url || '');
    const icon = f.icon || t.icon;
    const typeLabel = f.typeLabel || t.label;
    const upDt = f.uploadedAt?.toDate ? f.uploadedAt.toDate() : (f.uploadedAt ? new Date(f.uploadedAt) : null);
    const upStr = upDt ? upDt.toLocaleString('id-ID') : '?';
    return `
      <div style="background:white;border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <div style="font-size:36px;flex-shrink:0">${icon}</div>
        <div style="flex:1;min-width:200px">
          <div style="font-weight:600;font-size:14px;margin-bottom:3px;word-break:break-word">${escapeHtml(f.name)}</div>
          <div style="display:flex;gap:10px;font-size:11.5px;color:var(--text-muted);flex-wrap:wrap;align-items:center">
            <span style="background:#f3f4f6;padding:2px 8px;border-radius:100px;font-weight:600">${escapeHtml(typeLabel)}</span>
            <span>👤 ${escapeHtml(f.uploadedByName || '?')}</span>
            <span>📅 ${escapeHtml(upStr)}</span>
          </div>
          ${f.description ? `<div style="font-size:11.5px;color:var(--text-muted);line-height:1.4;margin-top:4px">${escapeHtml(f.description)}</div>` : ''}
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <a href="${escapeHtml(f.url)}" target="_blank" rel="noopener" class="btn btn-primary btn-sm">🔗 Buka</a>
          <button class="btn btn-ghost btn-sm" data-berkas-edit="${f.id}">✏️</button>
          <button class="btn btn-ghost btn-sm" data-berkas-del="${f.id}" style="color:#dc2626">🗑️</button>
        </div>
      </div>
    `;
  }).join('');
  root.innerHTML = rows;
  root.querySelectorAll('[data-berkas-del]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.berkasDel;
      const f = STATE.files.find(x => x.id === id);
      if (!f) return;
      if (!confirm(`Hapus berkas "${f.name}"?\n\nNote: ini cuma hapus dari index Marketing Tracker — file asli di Google Drive tetap utuh.`)) return;
      try {
        await deleteDoc(doc(STATE.db, 'importantFiles', f.id));
        toast('Berkas dihapus dari index', 'success');
      } catch (err) { toast('Gagal hapus: ' + err.message, 'error'); }
    });
  });
  root.querySelectorAll('[data-berkas-edit]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.berkasEdit;
      const f = STATE.files.find(x => x.id === id);
      if (f) openBerkasModal(f);
    });
  });
}

function openBerkasModal(existing) {
  const me = STATE.currentMember;
  if (!me) return;
  const isEdit = !!existing;
  const f = existing || {};
  const html = `
    <div class="modal-header">
      <h2 class="modal-title">${isEdit ? '✏️ Edit Berkas' : '+ Tambah Berkas Penting'}</h2>
      <button class="modal-close" data-close-modal>&times;</button>
    </div>
    <div class="modal-body" style="padding:20px">
      ${!isEdit ? `
        <div style="background:#fef3c7;border-left:3px solid #f59e0b;padding:10px 14px;border-radius:6px;margin-bottom:14px;font-size:12px;color:#92400e;line-height:1.5">
          💡 <strong>Tip:</strong> di Google Drive, klik kanan file → <strong>Share</strong> → ubah ke "Anyone with the link" (atau spesifik ke email tim) → copy link → paste di bawah.
        </div>
      ` : ''}
      <div class="form-group">
        <label class="label">Nama Berkas <span style="color:#dc2626">*</span></label>
        <input type="text" id="b-name" class="input" placeholder="Mis: Rekap Iklan Juli 2026" value="${escapeHtml(f.name || '')}" autofocus>
      </div>
      <div class="form-group">
        <label class="label">Link / URL Berkas <span style="color:#dc2626">*</span></label>
        <input type="url" id="b-url" class="input" placeholder="https://docs.google.com/spreadsheets/d/..." value="${escapeHtml(f.url || '')}">
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">Tipe & icon akan auto-detect dari URL.</div>
        <div id="b-preview-type" style="margin-top:8px;font-size:12px;color:var(--text-muted);display:none">
          Tipe terdeteksi: <span id="b-preview-label" style="font-weight:600"></span>
        </div>
      </div>
      <div class="form-group">
        <label class="label">Keterangan (opsional)</label>
        <textarea id="b-desc" class="textarea" rows="3" placeholder="Catatan tambahan, mis: versi/periode/konteks">${escapeHtml(f.description || '')}</textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal>Batal</button>
      <button class="btn btn-primary" id="b-save">${isEdit ? 'Update' : 'Simpan'}</button>
    </div>
  `;
  showModal(html, { size: 'md' });
  // Live preview tipe saat user paste URL
  const urlInput = document.getElementById('b-url');
  const previewBox = document.getElementById('b-preview-type');
  const previewLabel = document.getElementById('b-preview-label');
  function updatePreview() {
    const u = urlInput.value.trim();
    if (!u) { previewBox.style.display = 'none'; return; }
    const t = berkasDetectType(u);
    previewBox.style.display = 'block';
    previewLabel.textContent = `${t.icon} ${t.label}`;
  }
  urlInput.addEventListener('input', updatePreview);
  updatePreview();
  // Save
  document.getElementById('b-save').addEventListener('click', async () => {
    const name = document.getElementById('b-name').value.trim();
    const url = document.getElementById('b-url').value.trim();
    const desc = document.getElementById('b-desc').value.trim();
    if (!name) { toast('Nama berkas wajib', 'error'); return; }
    if (!url) { toast('Link/URL wajib', 'error'); return; }
    if (!isValidBerkasUrl(url)) { toast('URL tidak valid (harus http:// atau https://)', 'error'); return; }
    const t = berkasDetectType(url);
    const data = {
      name, url, description: desc,
      ext: t.ext, icon: t.icon, typeLabel: t.label,
      updatedAt: serverTimestamp(),
    };
    try {
      if (isEdit) {
        await updateDoc(doc(STATE.db, 'importantFiles', existing.id), data);
        toast('Berkas diupdate', 'success');
      } else {
        data.uploadedById = me.id;
        data.uploadedByName = me.name;
        data.uploadedAt = serverTimestamp();
        await addDoc(collection(STATE.db, 'importantFiles'), data);
        toast('Berkas ditambahkan', 'success');
      }
      closeModal();
    } catch (err) { toast('Gagal: ' + err.message, 'error'); }
  });
}

function bindKalenderKerjaPage() {
  const s = kalKerjaState();
  const monthEl = document.getElementById('kalkerja-month');
  const yearEl = document.getElementById('kalkerja-year');
  const memberEl = document.getElementById('kalkerja-member');
  const excelBtn = document.getElementById('btn-kalkerja-excel');

  const refresh = () => renderKalenderKerjaGrid();
  // v2.54 FIX: ganti bulan/tahun WAJIB reload override dari Firestore dulu.
  // Sebelumnya cuma render → override bulan target gak ke-load (STATE masih isi bulan lama)
  // → user lihat "cuma isi sistem", padahal data manual aman di Firestore.
  const reloadAndRender = async () => {
    const root = document.getElementById('kalkerja-grid-root');
    if (root) root.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text-muted)">⏳ Memuat data bulan ${s.month}/${s.year}...</div>`;
    await loadKalKerjaOverrides();
    renderKalenderKerjaGrid();
  };
  if (monthEl) monthEl.addEventListener('change', () => { s.month = parseInt(monthEl.value, 10); reloadAndRender(); });
  if (yearEl) yearEl.addEventListener('change', () => { s.year = parseInt(yearEl.value, 10); reloadAndRender(); });
  // memberFilter cuma filter tampilan, override sama-sama dari doc bulan ini → cukup re-render
  if (memberEl) memberEl.addEventListener('change', () => { s.memberFilter = memberEl.value || null; refresh(); });
  if (excelBtn) excelBtn.addEventListener('click', exportKalenderKerjaToExcel);
  const holBtn = document.getElementById('btn-kalkerja-holidays');
  if (holBtn) holBtn.addEventListener('click', openHolidaysModal);

  // Initial load — overrides + holidays
  Promise.all([loadKalKerjaOverrides(), loadKalKerjaHolidays()]).then(() => {
    renderKalenderKerjaGrid();
  });

  // v2.61: AUTO-REFRESH tiap 60 detik — biar status "ongoing" mengikuti jam yg lagi berjalan
  // (tugas proses hari ini ngalir sampai jam sekarang). Skip kalau lagi edit cell (anti ganggu).
  if (_kalKerjaTick) clearInterval(_kalKerjaTick);
  _kalKerjaTick = setInterval(() => {
    if (STATE.currentView !== 'kalkerja') { clearInterval(_kalKerjaTick); _kalKerjaTick = null; return; }
    const active = document.activeElement;
    const editing = active && active.matches && active.matches('[data-kk-edit]');
    if (editing) return; // jangan ganggu user yg lagi ngetik
    kalKerjaInvalidateCache();
    renderKalenderKerjaGrid();
  }, 60 * 1000);
}
let _kalKerjaTick = null; // v2.61 — interval auto-refresh ongoing

async function loadKalKerjaOverrides() {
  const s = kalKerjaState();
  const docId = `${s.year}-${String(s.month).padStart(2,'0')}`;
  try {
    const snap = await getDoc(doc(STATE.db, 'monthlyCalendarOverrides', docId));
    const data = snap.exists() ? snap.data() : {};
    const raw = data.overrides || {};
    const rawSt = data.statuses || {};  // v2.55 — status per cell
    // v2.54 FIX: defensive prefix-filter. Key override format = `YYYY-MM-memberId-DD-slot`.
    // Bug lama (ganti bulan gak reload) bisa nyelipin key bulan lain ke doc ini. Buang yg gak match.
    const prefix = docId + '-';
    const clean = {};
    let dropped = 0;
    Object.keys(raw).forEach(k => {
      if (k.startsWith(prefix)) clean[k] = raw[k];
      else dropped++;
    });
    STATE.kalKerjaOverrides = clean;
    // v2.55 — load statuses (prefix filter sama, buang kosong)
    const cleanSt = {};
    Object.keys(rawSt).forEach(k => {
      if (k.startsWith(prefix) && rawSt[k]) cleanSt[k] = rawSt[k];
    });
    STATE.kalKerjaStatuses = cleanSt;
    console.log(`[KalKerja] Load ${docId}: ${Object.keys(clean).length} override, ${Object.keys(cleanSt).length} status manual${dropped ? ` (${dropped} junk cross-month di-skip)` : ''}`);
  } catch (err) {
    console.error('Gagal load overrides', err);
    STATE.kalKerjaOverrides = {};
    STATE.kalKerjaStatuses = {};
  }
}

// v2.34: load global holidays (tanggal merah) dari Firestore
async function loadKalKerjaHolidays() {
  try {
    const snap = await getDoc(doc(STATE.db, 'appConfig', 'kalKerjaHolidays'));
    STATE.kalKerjaHolidays = snap.exists() ? (snap.data().holidays || {}) : {};
  } catch (err) {
    console.error('Gagal load holidays', err);
    STATE.kalKerjaHolidays = {};
  }
  kalKerjaInvalidateCache();
}
async function saveKalKerjaHolidays() {
  try {
    await setDoc(doc(STATE.db, 'appConfig', 'kalKerjaHolidays'), {
      holidays: STATE.kalKerjaHolidays,
      updatedAt: serverTimestamp(),
      updatedBy: STATE.currentMember?.name || '?',
    });
    kalKerjaInvalidateCache();
  } catch (err) {
    toast('Gagal save: ' + err.message, 'error');
  }
}

// v2.34: Modal "Atur Hari Libur"
function openHolidaysModal() {
  const isAdmin = STATE.currentMember?.role === 'admin';
  const holidays = STATE.kalKerjaHolidays || {};
  const sortedKeys = Object.keys(holidays).sort();
  const rows = sortedKeys.length === 0
    ? `<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--text-muted)">Belum ada tanggal libur tersimpan.</td></tr>`
    : sortedKeys.map(date => {
        const name = holidays[date];
        const dt = new Date(date);
        const dayName = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'][dt.getDay()];
        return `
          <tr>
            <td style="padding:8px 12px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:13px">${date} (${dayName})</td>
            <td style="padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px">${escapeHtml(name)}</td>
            <td style="padding:8px 12px;border-bottom:1px solid var(--border);text-align:right">
              ${isAdmin ? `<button class="btn btn-ghost btn-sm" data-holiday-del="${date}">🗑️</button>` : '<span style="font-size:11px;color:var(--text-muted)">read-only</span>'}
            </td>
          </tr>
        `;
      }).join('');

  const html = `
    <div class="modal-header">
      <h2 class="modal-title">🗓️ Atur Hari Libur / Tanggal Merah</h2>
      <button class="modal-close" data-close-modal>&times;</button>
    </div>
    <div class="modal-body" style="padding:20px">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">
        Tanggal yang di-set di sini akan otomatis ditandai <strong>"Libur"</strong> di Kalender Kerja Bulanan (semua member). Cocok untuk: Hari Raya, Cuti Bersama, Libur Khusus.
        ${isAdmin ? '' : '<br><strong>🔒 Hanya admin yang bisa edit.</strong>'}
      </div>

      ${isAdmin ? `
        <div style="background:#f9fafb;padding:12px 14px;border-radius:6px;margin-bottom:16px;border:1px solid var(--border)">
          <div style="font-weight:600;font-size:13px;margin-bottom:8px">Tambah Tanggal Libur</div>
          <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
            <div style="flex:0 0 160px">
              <label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:3px">Tanggal</label>
              <input type="date" id="holiday-date" class="input" style="width:100%;padding:6px 10px;font-size:13px">
            </div>
            <div style="flex:1;min-width:200px">
              <label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:3px">Nama / Keterangan</label>
              <input type="text" id="holiday-name" class="input" placeholder="Mis: Hari Raya Galungan" style="width:100%;padding:6px 10px;font-size:13px">
            </div>
            <button class="btn btn-primary btn-sm" id="holiday-add">+ Tambah</button>
          </div>
        </div>
      ` : ''}

      <div style="font-weight:600;font-size:13px;margin-bottom:8px">📋 Daftar Hari Libur Tersimpan</div>
      <table style="width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:6px;overflow:hidden">
        <thead style="background:#f3f4f6">
          <tr>
            <th style="padding:8px 12px;text-align:left;font-size:12px;border-bottom:1px solid var(--border)">Tanggal</th>
            <th style="padding:8px 12px;text-align:left;font-size:12px;border-bottom:1px solid var(--border)">Nama</th>
            <th style="padding:8px 12px;text-align:right;font-size:12px;border-bottom:1px solid var(--border);width:80px">Aksi</th>

        <tbody id="holidays-tbody">${rows}</tbody>
      </table>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal>Tutup</button>

  // Bind delete
  document.querySelectorAll('[data-holiday-del]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const date = btn.dataset.holidayDel;
      if (!confirm(`Hapus hari libur tanggal ${date}?`)) return;
      delete STATE.kalKerjaHolidays[date];
      await saveKalKerjaHolidays();
      toast(`Hari libur ${date} dihapus`, 'success');
      closeModal();
      openHolidaysModal();
      renderKalenderKerjaGrid();
    });
  });
}

async function saveKalKerjaOverride(key, value) {
  const s = kalKerjaState();
  const docId = `${s.year}-${String(s.month).padStart(2,'0')}`;
  // v2.54 FIX: guard — key HARUS prefix bulan aktif. Mencegah save nyasar ke doc bulan lain
  // (mis kalau ada race antara ganti bulan & save mid-edit).
  if (!key.startsWith(docId + '-')) {
    console.warn(`[KalKerja] Skip save: key "${key}" gak match bulan aktif ${docId}`);
    return;
  }
  // v2.46: update local state DULU supaya UI responsive (gak nunggu Firestore round-trip)
  STATE.kalKerjaOverrides = STATE.kalKerjaOverrides || {};
  STATE.kalKerjaOverrides[key] = value;
  // v2.54: tulis HANYA via dot-path field `overrides.<key>` — bukan replace seluruh map.
  // Lebih aman: gak pernah bisa overwrite/hapus key lain walau STATE partial.
  await setDoc(doc(STATE.db, 'monthlyCalendarOverrides', docId), {
    overrides: { [key]: value },
    updatedAt: serverTimestamp(),
    updatedBy: STATE.currentMember?.name || '?',
  }, { merge: true });
}

function renderKalenderKerjaGrid() {

  const dayNames = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];

  // Members yang ditampilkan
  const targetMembers = s.memberFilter
    ? STATE.members.filter(m => m.id === s.memberFilter)
    : STATE.members.slice().sort((a, b) => (a.name || '').localeCompare(b.name || ''));

  if (targetMembers.length === 0) {
    root.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text-muted)">Tidak ada anggota.</div>`;
    return;
  }

  let html = `<div style="font-family:var(--font-mono);font-size:11px;overflow-x:auto">`;
  targetMembers.forEach(m => {
    html += `<div class="kalkerja-section" style="margin-bottom:30px">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:8px;padding:8px 12px;background:var(--primary);color:white;border-radius:6px;text-transform:uppercase;display:inline-block">${escapeHtml(m.name)}</h2>
      <div style="overflow-x:auto">
        <table class="kalkerja-table" style="border-collapse:collapse;font-size:11px;min-width:100%;white-space:nowrap">
          <thead>
            <tr style="background:#f3f4f6">
              <th style="border:1px solid var(--border);padding:6px 8px;position:sticky;left:0;background:#f3f4f6;z-index:2;min-width:90px">Hari</th>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dt = new Date(s.year, s.month - 1, d);
      const dayName = dayNames[dt.getDay()].slice(0, 3); // Sen, Sel, ...
      const isWeekend = dt.getDay() === 0 || dt.getDay() === 6;
      const dateStr = `${s.year}-${String(s.month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isCustomHoliday = kalKerjaIsHoliday(dateStr);
      let bg = '';
      if (isCustomHoliday) bg = 'background:#fecaca;color:#991b1b';
      else if (isWeekend) bg = 'background:#fee2e2;color:#991b1b';
      const tooltip = isCustomHoliday ? `title="${escapeHtml(STATE.kalKerjaHolidays[dateStr])}"` : '';
      html += `<th style="border:1px solid var(--border);padding:6px 4px;${bg}" ${tooltip}>${dayName}${isCustomHoliday ? ' 🟥' : ''}</th>`;
    }
    html += `</tr>
            <tr style="background:#f9fafb">
              <th style="border:1px solid var(--border);padding:6px 8px;position:sticky;left:0;background:#f9fafb;z-index:2">Tanggal</th>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dt = new Date(s.year, s.month - 1, d);
      const isWeekend = dt.getDay() === 0 || dt.getDay() === 6;
      const dateStr = `${s.year}-${String(s.month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isCustomHoliday = kalKerjaIsHoliday(dateStr);
      let bg = '';
      if (isCustomHoliday) bg = 'background:#fecaca;color:#991b1b';
      else if (isWeekend) bg = 'background:#fee2e2;color:#991b1b';
      const tooltip = isCustomHoliday ? `title="${escapeHtml(STATE.kalKerjaHolidays[dateStr])}"` : '';
      html += `<th style="border:1px solid var(--border);padding:6px 4px;font-weight:700;${bg}" ${tooltip}>${d}</th>`;
    }
    html += `</tr></thead><tbody>`;

    KALKERJA_TIME_SLOTS.forEach(slot => {
      const isLunch = slot.lunch;
      html += `<tr>
        <td style="border:1px solid var(--border);padding:6px 8px;font-weight:600;position:sticky;left:0;background:white;z-index:1;${isLunch ? 'background:#fef3c7' : ''}">${slot.label}</td>`;
      for (let d = 1; d <= daysInMonth; d++) {
        const dt = new Date(s.year, s.month - 1, d);
        const isWeekend = dt.getDay() === 0 || dt.getDay() === 6;
        const dateStr = `${s.year}-${String(s.month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isCustomHoliday = kalKerjaIsHoliday(dateStr); // v2.34: tanggal merah custom
        // Lunch cell — locked, gak ada status/badge
        if (isLunch) {
          html += `<td style="border:1px solid var(--border);padding:4px 6px;min-width:120px;max-width:180px;background:#fef3c7;font-weight:600;text-align:center;color:#92400e;vertical-align:middle">MAKAN SIANG</td>`;
          continue;
        }
        // v2.55: rich cell info (text + kind + status)
        const info = kalKerjaCellInfo(m.id, s.year, s.month, d, slot.label);
        let cellBg = '';
        let extraCls = '';
        if (isCustomHoliday && !(info.text && info.text.trim())) {
          cellBg = 'background:#fecaca;color:#991b1b;font-style:italic;text-align:center;font-weight:600'; // tanggal merah kosong
        } else if (info.kind === 'libur') {
          cellBg = 'background:#f3f4f6;color:#9ca3af;font-style:italic;text-align:center';
        } else if (info.status === 'proses') {
          extraCls = 'kk-bg-proses';
        } else if (info.status === 'selesai') {
          extraCls = 'kk-bg-selesai';
        } else if (info.kind === 'forecast') {
          cellBg = 'background:#eff6ff';
        } else if (isWeekend) {
          cellBg = 'background:#fef2f2';
        }
        const textStyle = info.kind === 'forecast'
          ? 'font-style:italic;color:#1e40af;opacity:0.9'
          : (info.kind === 'libur' ? 'font-style:italic;color:#9ca3af' : '');
        const tipBase = (info.text && info.text.trim()) ? `${info.text}\n\n(Klik untuk edit)` : '(Klik untuk isi manual)';
        const titleAttr = `title="${escapeHtml(tipBase)}"`;
        // v2.56: status ditulis INLINE di teks (mis "FU tiktok shop (proses)"), bukan badge.
        // bg cell dapat tint halus sesuai status biar gampang di-scan. contenteditable di td (teks polos).
        html += `<td class="${extraCls}" style="border:1px solid var(--border);padding:4px 6px;min-width:120px;max-width:180px;vertical-align:top;white-space:normal;word-break:break-word;line-height:1.35;${cellBg}${textStyle ? ';' + textStyle : ''}" contenteditable="true" data-kk-edit="${info.baseKey}" ${titleAttr}>${escapeHtml(info.text)}</td>`;
      }
      html += `</tr>`;
    });
    html += `</tbody></table></div></div>`;
  });
  html += `</div>`;
  root.innerHTML = html;

  // v2.46: Bind editable cells — save on input (debounced) supaya lebih reliable.
  // Sebelumnya cuma save di blur — kalau cell DOM ke-replace mid-edit (race dengan re-render),
  // value hilang & blur gak fire → user kira "gak tersimpan".
  // Sekarang: save tiap 700ms setelah user berhenti ketik, plus tetap save di blur sebagai backup.
  root.querySelectorAll('[data-kk-edit]').forEach(cell => {
    const key = cell.dataset.kkEdit;
    let original = cell.textContent;
    let saveTimer = null;
    const doSave = async (newVal) => {
      if (newVal === original) return;
      try {
        await saveKalKerjaOverride(key, newVal);
        // Visual feedback: flash hijau briefly
        cell.style.transition = 'background 0.3s';
        const prevBg = cell.style.background;
        cell.style.background = '#d1fae5';
        setTimeout(() => { cell.style.background = prevBg; }, 600);
        original = newVal; // update baseline supaya gak save berulang
      } catch (err) {
        console.error('Gagal save override', err);
        toast('Gagal save: ' + err.message, 'error');
      }
    };
    cell.addEventListener('focus', () => { original = cell.textContent; });
    cell.addEventListener('input', () => {
      // Debounce 700ms
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        saveTimer = null;
        const newVal = cell.textContent.trim();
        doSave(newVal);
      }, 700);
    });
    cell.addEventListener('blur', async () => {
      // Save final saat blur (backup, kalau debounce belum sempat fire)
      if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
      const newVal = cell.textContent.trim();
      await doSave(newVal);
    });
    cell.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        cell.blur(); // trigger save
      } else if (e.key === 'Escape') {
        if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
        cell.textContent = original;
        cell.blur();
      }
    });
  });
}

function exportKalenderKerjaToExcel() {
  if (typeof XLSX === 'undefined') {
    toast('Library XLSX belum loaded, refresh dulu', 'error');
    return;
  }
  const s = kalKerjaState();
  const daysInMonth = new Date(s.year, s.month, 0).getDate();
  const dayNames = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
  const monthsId = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
  const monthLabel = `${monthsId[s.month - 1]} ${s.year}`;
  const targetMembers = s.memberFilter
    ? STATE.members.filter(m => m.id === s.memberFilter)
    : STATE.members.slice().sort((a, b) => (a.name || '').localeCompare(b.name || ''));

  const aoa = []; // array of arrays
  // Title row
  aoa.push([`KALENDER KERJA APOTEKKU — TIM MARKETING — ${monthLabel}`]);
  aoa.push([]);

  targetMembers.forEach(m => {
    aoa.push([m.name.toUpperCase()]);
    aoa.push([]);
    // Header Hari
    const hariRow = ['Hari'];
    for (let d = 1; d <= daysInMonth; d++) {
      const dt = new Date(s.year, s.month - 1, d);
      hariRow.push(dayNames[dt.getDay()]);
    }
    aoa.push(hariRow);
    // Header Tanggal
    const tglRow = ['Tanggal'];
    for (let d = 1; d <= daysInMonth; d++) tglRow.push(d);
    aoa.push(tglRow);
    // Header JAM
    const jamRow = ['JAM'];
    for (let d = 1; d <= daysInMonth; d++) jamRow.push('');
    aoa.push(jamRow);
    // Body
    KALKERJA_TIME_SLOTS.forEach(slot => {
      const row = [slot.label];
      for (let d = 1; d <= daysInMonth; d++) {
        // v2.56: status udah inline di teks (mis "FU tiktok shop (proses)")
        const info = kalKerjaCellInfo(m.id, s.year, s.month, d, slot.label);
        row.push(info.text || '');
      }
      aoa.push(row);
    });
    aoa.push([]);
    aoa.push([]);
  });

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  // Set column widths (col A = 14, rest = 30 biar judul task panjang lebih kelihatan)
  const cols = [{ wch: 14 }];
  for (let i = 0; i < daysInMonth; i++) cols.push({ wch: 30 });
  ws['!cols'] = cols;
  // v2.33: set wrapText untuk semua cell biar judul panjang ke-wrap (multi-line) di Excel
  const ref = ws['!ref'];
  if (ref) {
    const range = XLSX.utils.decode_range(ref);
    for (let R = range.s.r; R <= range.e.r; R++) {
      for (let C = range.s.c; C <= range.e.c; C++) {
        const cellAddr = XLSX.utils.encode_cell({ r: R, c: C });
        const cell = ws[cellAddr];
        if (cell) {
          cell.s = cell.s || {};
          cell.s.alignment = { wrapText: true, vertical: 'top' };
        }
      }
    }
  }
  // Row height default biar bisa expand
  ws['!rows'] = [];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Kalender Kerja');
  const filename = `Kalender_Kerja_${monthsId[s.month-1]}_${s.year}.xlsx`;
  XLSX.writeFile(wb, filename);
  toast(`File ${filename} di-download`, 'success');
}

// v2.26-v2.27: grid kalender — pakai getCalendarRecapTasks() yang SKIP filter from/to.
// Kalender = overview bulanan. Klik tanggal → filter from=to=tanggal itu di TABEL (tidak mempengaruhi kalender).
function renderRecapCalendarGrid() {
  const root = document.getElementById('calendar-grid-root');
  if (!root) return;
  const month = getActiveCalendarMonth();
  const [y, m] = month.split('-').map(Number);
  const firstDay = new Date(y, m - 1, 1);
  const startWeekday = firstDay.getDay(); // 0 = Sun
  const daysInMonth = new Date(y, m, 0).getDate();
  const today = todayStr();
  // v2.35: pakai isTaskActiveOnDay untuk visualisasi historis per hari.
  // Setiap task aktif di hari tertentu (sesuai 4 case di user spec):
  //   - Project: muncul setiap hari di range [date, dueDate] hingga done/notCompleted
  //   - Non-project: muncul dari scheduled date sampai done/notCompleted/today (carry-over)
  // Plus support Case 4: task yg punya event (marked_not_completed/restored/deleted) di hari itu juga muncul.
  // v2.36: pakai manual filter (allTasksForCal di bawah) — getCalendarRecapTasks skip notCompleted, kita perlu include buat audit Case 4
  const tasksByDate = {};
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    tasksByDate[dateStr] = [];
  }
  // Include also notCompleted/deleted tasks (untuk audit visualisasi Case 4) — bypass getCalendarRecapTasks yang skip notCompleted
  const allTasksForCal = STATE.tasks.filter(t => {
    // Apply same filters as getCalendarRecapTasks EXCEPT notCompleted/isDeleted
    const rf = STATE.recapFilters;
    if ((t.boardId || DEFAULT_BOARD_ID) !== STATE.currentBoardId) return false;
    if (rf.memberId && t.assigneeId !== rf.memberId) return false;
    if (rf.categoryId && t.category !== rf.categoryId) return false;
    if (rf.status === 'unfinished' && t.status === 'done') return false;
    else if (rf.status === 'todo' && t.status !== 'todo') return false;
    else if (rf.status === 'proses' && t.status !== 'proses') return false;
    else if (rf.status === 'done' && t.status !== 'done') return false;
    if (rf.search) {
      const q = rf.search.toLowerCase();
      const match = (t.title || '').toLowerCase().includes(q) || (t.description || '').toLowerCase().includes(q);
      if (!match) return false;
    }
    return true;
  });
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    allTasksForCal.forEach(t => {
      // Aktif di hari ini? (skip isDeleted check di dalam isTaskActiveOnDay supaya bisa show event di hari deletion)
      const tCopy = { ...t, isDeleted: false }; // bypass isDeleted check
      const isActive = isTaskActiveOnDay(tCopy, dateStr, today);
      const hasEvent = taskHasEventOnDay(t, dateStr);
      if (isActive || hasEvent) {
        tasksByDate[dateStr].push({ task: t, derivedStatus: deriveTaskStatusOnDay(t, dateStr), hasEvent });
      }
    });
  }

  const dayLabels = ['M', 'S', 'S', 'R', 'K', 'J', 'S'];
  let html = '<div class="calendar-grid">';
  dayLabels.forEach(l => html += `<div class="calendar-day-label">${l}</div>`);
  // Empty cells before day 1
  for (let i = 0; i < startWeekday; i++) html += '<div class="calendar-day calendar-day-empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayItems = tasksByDate[dateStr] || []; // [{task, derivedStatus, hasEvent}]
    const total = dayItems.length;
    const doneCount = dayItems.filter(it => it.derivedStatus === 'done').length;
    const prosesCount = dayItems.filter(it => it.derivedStatus === 'proses').length;
    const todoCount = dayItems.filter(it => it.derivedStatus === 'todo').length;
    const notDoneCount = dayItems.filter(it => it.derivedStatus === 'notCompleted').length;
    const eventCount = dayItems.filter(it => it.hasEvent).length;
    const pct = total > 0 ? Math.round(doneCount * 100 / total) : 0;
    const isToday = dateStr === today;
    // intensity bg color (hijau makin tua kalau % done tinggi)
    let bg = 'transparent';
    if (total > 0) {
      const intensity = Math.max(0.08, Math.min(0.4, total / 10));
      bg = pct >= 80 ? `rgba(16, 185, 129, ${intensity + 0.15})` :
           pct >= 40 ? `rgba(245, 158, 11, ${intensity + 0.1})` :
                       `rgba(220, 38, 38, ${intensity + 0.05})`;
    }
    // v2.35: mini-badge per status di kotak hari
    const statusMini = total > 0 ? `
      <div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center;margin-top:2px;font-size:9px">
        ${doneCount > 0 ? `<span style="background:#10b981;color:white;padding:1px 4px;border-radius:8px" title="${doneCount} done">✓${doneCount}</span>` : ''}
        ${prosesCount > 0 ? `<span style="background:#f59e0b;color:white;padding:1px 4px;border-radius:8px" title="${prosesCount} proses">🔄${prosesCount}</span>` : ''}
        ${todoCount > 0 ? `<span style="background:#3b82f6;color:white;padding:1px 4px;border-radius:8px" title="${todoCount} todo">📋${todoCount}</span>` : ''}
        ${notDoneCount > 0 ? `<span style="background:#dc2626;color:white;padding:1px 4px;border-radius:8px" title="${notDoneCount} tidak selesai">🚫${notDoneCount}</span>` : ''}
      </div>
    ` : '';
    html += `
      <div class="calendar-day ${isToday ? 'calendar-day-today' : ''}" data-cal-day="${dateStr}" style="background:${bg};cursor:pointer">
        <div class="calendar-day-num">${d}${eventCount > 0 ? `<span title="${eventCount} event di hari ini (mark/restore/delete)" style="margin-left:3px;font-size:9px;color:#dc2626">●</span>` : ''}</div>
        ${total > 0 ? `<div class="calendar-day-stats" style="font-size:10px;line-height:1.3"><strong>${doneCount}/${total}</strong></div>${statusMini}` : ''}
      </div>
    `;
  }
  html += '</div>';
  root.innerHTML = html;

  // v2.26-v2.27: klik tanggal → set filter from/to ke tanggal itu (single-day mode → hard match)
  // + switch ke tab Tabel. Skip kalau cell kosong (no task).
  root.querySelectorAll('[data-cal-day]').forEach(el => {
    el.addEventListener('click', () => {
      const d = el.dataset.calDay;
      STATE.recapFilters.from = d;
      STATE.recapFilters.to = d;
      STATE.recapTab = 'table';
      renderMain();
      toast(`📍 Tabel filter ke tanggal ${d}`, 'info');
    });
  });
}

// v2.27-v2.28: filter recap dengan 2 mode:
//  - SINGLE-DAY (from === to): match task yang dijadwalkan ATAU dikerjakan di tanggal itu.
//    - Task biasa: t.date === rf.from (exact start), ATAU carry-over (date < target & status != done & target == today).
//    - Task proyek: target di dalam range [date, dueDate]. Termasuk yang start sebelum target (carry-over multi-hari).
//  - RANGE (from !== to): overlap untuk project, exact untuk task biasa.
function getFilteredRecapTasks() {
  const rf = STATE.recapFilters;
  const today = todayStr();
  // v2.37: di single-day mode allow isDeleted task supaya history "tugas dihapus tanggal X" tampil.
  // Range mode tetap skip isDeleted (rekap range = active history).
  const singleDay = rf.from && rf.to && rf.from === rf.to;
  let tasks = STATE.tasks.filter(t => {
    if ((t.boardId || DEFAULT_BOARD_ID) !== STATE.currentBoardId) return false;
    if (!singleDay && t.isDeleted === true) return false;
    return true;
  });

  if (singleDay) {
    const target = rf.from;
    // v2.35: pakai isTaskActiveOnDay — match logic kalender + carry-over + project range + notCompleted history
    // Plus include task yang punya event (notCompleted/restore/deleted) di hari itu (Case 4)
    tasks = tasks.filter(t => {
      if (isTaskActiveOnDay(t, target, today)) return true;
      if (taskHasEventOnDay(t, target)) return true;
      return false;
    });
    // Enrich dengan derivedStatus untuk display di tabel
    tasks = tasks.map(t => ({ ...t, _derivedStatus: deriveTaskStatusOnDay(t, target) }));
  } else {
    if (rf.from) tasks = tasks.filter(t => {
      if (t.isProject) {
        const end = t.dueDate || t.date || '';
        return end >= rf.from; // project end >= filter from
      }
      return (t.date || '') >= rf.from;
    });
    if (rf.to) tasks = tasks.filter(t => {
      if (t.isProject) {
        return (t.date || '') <= rf.to; // project start <= filter to
      }
      return (t.date || '') <= rf.to;
    });
  }
  if (rf.status === 'unfinished') tasks = tasks.filter(t => t.status !== 'done');
  else if (rf.status !== 'all') tasks = tasks.filter(t => t.status === rf.status);
  if (rf.memberId) tasks = tasks.filter(t => t.assigneeId === rf.memberId);
  if (rf.categoryId) tasks = tasks.filter(t => t.category === rf.categoryId);
  if (rf.search) {
    const q = rf.search.toLowerCase();
    tasks = tasks.filter(t =>
      (t.title || '').toLowerCase().includes(q) ||
      (t.description || '').toLowerCase().includes(q));
  }
  // Sort
  tasks.sort((a, b) => {
    let va, vb;
    switch (rf.sortBy) {
      case 'title': va = (a.title || ''); vb = (b.title || ''); break;
      case 'assignee': va = (a.assigneeName || ''); vb = (b.assigneeName || ''); break;
      case 'status': va = a.status || ''; vb = b.status || ''; break;
      case 'progress': va = a.progress || 0; vb = b.progress || 0; break;
      case 'updated': va = a.updatedAt?.toMillis?.() || 0; vb = b.updatedAt?.toMillis?.() || 0; break;
      default: va = a.date || ''; vb = b.date || ''; break;
    }
    if (va < vb) return rf.sortDir === 'asc' ? -1 : 1;
    if (va > vb) return rf.sortDir === 'asc' ? 1 : -1;
    return 0;
  });
  return tasks;
}

// v2.27: Helper untuk kalender — SKIP filter from/to (kalender = overview bulanan,
// gak boleh ke-restrict by date picker). Filter member/kategori/status/search tetap apply.
// v2.35-v2.37: Derive status task pada hari tertentu dari activity log.
// v2.37 update: kalau task SEKARANG sudah recovered (bukan notCompleted, bukan deleted),
//               SKIP marked_not_completed di history — anggap as "transient state" yg ter-undo.
//               Hanya task yg saat ini benar-benar notCompleted atau deleted yang label "TIDAK SELESAI"/"DIHAPUS" muncul di history.
function deriveTaskStatusOnDay(task, dayStr) {
  const today = todayStr();
  // Hari ini & masa depan → pakai status sekarang (apa adanya)
  if (dayStr >= today) {
    if (task.isDeleted === true) return 'deleted';
    if (task.notCompleted === true) return 'notCompleted';
    return task.status || 'todo';
  }
  // Hari lampau → derive dari activity log
  const activities = (task.activity || []).slice()
    .filter(a => a && a.at && typeof a.at === 'string')
    .sort((a, b) => (a.at || '').localeCompare(b.at || ''));
  // v2.37: skip marked_not_completed kalau task SAAT INI bukan notCompleted/deleted lagi
  // (artinya task ter-restored / di-selesai-kan kemudian, label TIDAK SELESAI gak relevan di history)
  const skipNotCompletedHistory = !task.notCompleted && !task.isDeleted;
  let status = 'todo';
  for (const act of activities) {
    const actDate = (a => a && a.length >= 10 ? a.slice(0, 10) : '')(act.at);
    if (actDate > dayStr) break;
    if (act.type === 'status_changed' && act.to) status = act.to;
    else if (act.type === 'marked_not_completed') {
      if (!skipNotCompletedHistory) status = 'notCompleted';
      // else: skip — task sudah recovered, history label ditolak
    }
    else if (act.type === 'restored_from_not_completed') status = act.to || 'todo';
    else if (act.type === 'task_deleted') status = 'deleted';
  }
  return status;
}

// v2.35: Apakah task aktif (relevan) pada hari dayStr?
//   - Project: dayStr di range [date, dueDate], BELUM done sebelum dayStr
//   - Non-project: dayStr >= task.date, BELUM done atau notCompleted sebelum dayStr
//     - Done: aktif hanya sampai completedAt date (termasuk)
//     - notCompleted: aktif sampai notCompletedAt date (termasuk)
//     - Pending: aktif dari task.date sampai today
function isTaskActiveOnDay(task, dayStr, today) {
  if (!task) return false;
  if (!task.date) return false;
  // v2.37: task isDeleted → aktif sampai tanggal dihapus (sesuai task_deleted activity)
  if (task.isDeleted === true) {
    const delAct = (task.activity || []).find(a => a.type === 'task_deleted');
    const delDay = delAct && delAct.at ? delAct.at.slice(0, 10) : null;
    if (!delDay) return false; // gak tahu kapan dihapus, skip
    if (dayStr > delDay) return false; // setelah dihapus, skip
    // Sampai tanggal dihapus, lanjut cek logic project/non-project di bawah
  }

  if (task.isProject) {
    const start = task.date;
    const end = task.dueDate || task.date;
    if (dayStr < start || dayStr > end) return false;
    // Done sebelum/pada dayStr? Tampil hanya sampai completedAt
    if (task.status === 'done' && task.completedAt) {
      const completedDay = tsToLocalDateStr(task.completedAt);
      if (completedDay && dayStr > completedDay) return false;
    }
    if (task.notCompleted === true && task.notCompletedAt) {
      const markedDay = tsToLocalDateStr(task.notCompletedAt);
      if (markedDay && dayStr > markedDay) return false;
    }
    return true;
  }

  // Non-project
  if (dayStr < task.date) return false;
  if (task.status === 'done' && task.completedAt) {
    const completedDay = tsToLocalDateStr(task.completedAt);
    if (completedDay && dayStr > completedDay) return false;
    return true;
  }
  if (task.notCompleted === true && task.notCompletedAt) {
    const markedDay = tsToLocalDateStr(task.notCompletedAt);
    if (markedDay && dayStr > markedDay) return false;
    return true;
  }
  // Pending (belum done, belum notCompleted): aktif dari task.date sampai today
  if (dayStr > today) return false;
  return true;
}

// v2.35: Cek apakah task punya activity event di hari tertentu (untuk Case 4 — deletion/restore history)
function taskHasEventOnDay(task, dayStr) {
  const acts = task.activity || [];
  return acts.some(a => {
    if (!a || !a.at) return false;
    const ad = a.at.slice(0, 10);
    return ad === dayStr && (
      a.type === 'marked_not_completed' ||
      a.type === 'restored_from_not_completed' ||
      a.type === 'task_deleted'
    );
  });
}

  const rf = STATE.recapFilters;

    refreshTab();
  });

  if (resetBtn) resetBtn.addEventListener('click', () => {
    STATE.recapFilters = {
      from: '', to: '', status: 'all', memberId: null, categoryId: null,

function exportRecapData() {
  const tasks = getFilteredRecapTasks();
  if (tasks.length === 0) { toast('Tidak ada data untuk export', 'error'); return; }
  const header = [
    'Tanggal', 'Kategori', 'Judul', 'Deskripsi', 'Pelaksana', 'Bersama', 'Proyek',
    'Status', 'Progress %', 'Target', 'Terlaksana',
    'Jam Mulai', 'Jam Selesai', 'Tanggal Selesai/Deadline',
    'Label', 'Dari Template', 'Dibuat', 'Diubah',
  ];
  const rows = tasks.map(t => {
    const cat = CATEGORIES.find(c => c.id === t.category);
    const labels = (t.labelIds || [])
      .map(id => STATE.labels.find(l => l.id === id)?.name)
      .filter(Boolean).join(' · ');
    return [
      t.date || '',
      cat ? cat.name : '',
      t.title || '',
      t.description || '',
      t.assigneeName || '',
      t.isShared ? 'Ya' : '',
      t.isProject ? 'Ya' : '',
      (t.status || '').toUpperCase(),
      `${t.progress || 0}%`,
      t.target || '',
      t.progressCount || '',
      t.startTime || '',
      t.endTime || '',
      t.dueDate || '',
      labels,
      t.fromTemplateName || '',
      tsToIso(t.createdAt),
      tsToIso(t.updatedAt),
    ];
  });
  const csv = [header, ...rows].map(r => r.map(csvCell).join(',')).join('\n');
  const filename = `rekap_tugas_${todayStr()}.csv`;
  downloadFile(filename, csv, 'text/csv');
  toast(`Exported ${tasks.length} tugas`, 'success');
}

function renderRecapTable() {
  const root = document.getElementById('recap-table-root');
  if (!root) return;
  const tasks = getFilteredRecapTasks();
  const rf = STATE.recapFilters;
  const isSingleDay = rf.from && rf.to && rf.from === rf.to;

  // Summary — v2.36: kalau single-day mode, pakai _derivedStatus biar count akurat per tanggal historical
  const statusOf = (t) => (isSingleDay && t._derivedStatus) ? t._derivedStatus : (t.status || 'todo');
  const total = tasks.length;
  const doneCount = tasks.filter(t => statusOf(t) === 'done').length;
  const prosesCount = tasks.filter(t => statusOf(t) === 'proses').length;
  const todoCount = tasks.filter(t => statusOf(t) === 'todo').length;
  const completionPct = total > 0 ? Math.round(doneCount * 100 / total) : 0;
  const summaryRoot = document.getElementById('recap-summary-root');
  if (summaryRoot) {
    summaryRoot.innerHTML = `
      <div class="recap-summary">
        <div class="recap-summary-card">
          <div class="recap-summary-label">Total Tugas</div>
          <div class="recap-summary-value">${total}</div>
          <div class="recap-summary-detail">Pada filter aktif</div>
        </div>
        <div class="recap-summary-card">
          <div class="recap-summary-label">Selesai</div>
          <div class="recap-summary-value" style="color:var(--success)">${doneCount}</div>
          <div class="recap-summary-detail">${completionPct}% completion rate</div>
        </div>
        <div class="recap-summary-card">
          <div class="recap-summary-label">Sedang Proses</div>
          <div class="recap-summary-value" style="color:var(--warning)">${prosesCount}</div>
          <div class="recap-summary-detail">Aktif dikerjakan</div>
        </div>
        <div class="recap-summary-card">
          <div class="recap-summary-label">Belum Mulai</div>
          <div class="recap-summary-value" style="color:var(--info)">${todoCount}</div>
          <div class="recap-summary-detail">Status TODO</div>
        </div>
      </div>
    `;
  }

  if (tasks.length === 0) {
    // v2.28: empty state lebih informatif sesuai konteks filter
    const singleDay = rf.from && rf.to && rf.from === rf.to;
    const hint = singleDay
      ? `Tidak ada task aktif tanggal <strong>${escapeHtml(rf.from)}</strong> (juga tidak ada event audit di hari ini).<br>Coba klik "<strong>↺ Lihat semua tanggal</strong>" di atas, atau cek menu <strong>📌 Tugas Proyek</strong> & <strong>🚫 Tidak Selesai</strong>.`
      : `Coba longgarkan filter atau ubah range tanggal.`;
    root.innerHTML = `
      <div class="recap-table-wrap">
        <div class="recap-table-empty" style="text-align:center;padding:40px 20px">
          <div style="font-size:36px;margin-bottom:8px">📭</div>
          <div style="font-size:14px;color:var(--text);font-weight:600;margin-bottom:6px">Tidak ada tugas yang cocok dengan filter</div>
          <div style="font-size:13px;color:var(--text-muted);line-height:1.6">${hint}</div>
        </div>
      </div>
    `;
    return;
  }

  const colHeader = (key, label) => {
    const isSorted = rf.sortBy === key;
    const dirClass = isSorted ? (rf.sortDir === 'asc' ? 'sorted asc' : 'sorted') : '';
    return `<th class="${dirClass}" data-sort="${key}">${label}</th>`;
  };

  const rows = tasks.map(t => {
    const cat = CATEGORIES.find(c => c.id === t.category);
    const catBadge = cat
      ? `<span class="category-badge" style="color:${cat.color};margin:0">${escapeHtml(cat.short || cat.name)}</span>`
      : '<span style="color:var(--text-light);font-size:11px">—</span>';
    const progress = Number(t.progress) || 0;
    const updatedTime = timeAgo(t.updatedAt || t.createdAt);
    const dueBadge = t.dueDate ? `<span style="font-family:var(--font-mono);font-size:11.5px">${t.dueDate.slice(5)}</span>` : '<span style="color:var(--text-light)">—</span>';
    const timeRange = (t.startTime || t.endTime)
      ? `<div style="font-family:var(--font-mono);font-size:10.5px;color:#6b21a8;margin-top:2px">⏰ ${escapeHtml(t.startTime || '?')}${t.endTime ? `–${escapeHtml(t.endTime)}` : ''}</div>`
      : '';
    const targetVal = Number(t.target) || 0;
    const targetInfo = targetVal > 0
      ? `<div style="font-size:10.5px;color:var(--info);font-family:var(--font-mono);margin-top:2px">🎯 ${t.progressCount || 0}/${targetVal}</div>`
      : '';
    // v2.27: untuk task proyek (multi-hari), tampilkan range start-end + badge biar user paham
    const projectRange = t.isProject
      ? `<div style="font-size:10px;color:#7c3aed;font-weight:600;margin-top:2px">📌 Proyek${t.dueDate && t.dueDate !== t.date ? ` (s/d ${t.dueDate.slice(5)})` : ''}</div>`
      : '';
    // v2.35: status per-day kalau ada di filter single-day mode
    const isSingleDay = rf.from && rf.to && rf.from === rf.to;
    const displayStatus = (isSingleDay && t._derivedStatus) ? t._derivedStatus : (t.status || 'todo');
    const statusLabel = displayStatus === 'notCompleted' ? 'TIDAK SELESAI'
      : displayStatus === 'deleted' ? 'DIHAPUS'
      : displayStatus.toUpperCase();
    const statusClass = displayStatus === 'notCompleted' ? 'todo'
      : displayStatus === 'deleted' ? 'todo'
      : displayStatus;
    const statusBg = displayStatus === 'notCompleted' ? 'background:#fee2e2;color:#991b1b'
      : displayStatus === 'deleted' ? 'background:#fef3c7;color:#92400e'
      : '';
    const isCurrDiff = isSingleDay && t._derivedStatus && t._derivedStatus !== (t.status || 'todo');
    const statusHint = isCurrDiff
      ? `<div style="font-size:9.5px;color:var(--text-muted);margin-top:2px">sekarang: ${escapeHtml((t.status || 'todo').toUpperCase())}</div>`
      : '';
    // v2.37: task dihapus → row tidak clickable (no openTaskModal), judul strikethrough, badge DIHAPUS
    const isDeletedTask = t.isDeleted === true;
    const rowAttr = isDeletedTask
      ? 'data-recap-task-deleted="1" style="opacity:0.7;cursor:not-allowed" title="Task ini sudah dihapus permanen — detail tidak bisa dibuka"'
      : `data-recap-task="${t.id}"`;
    const titleHtml = isDeletedTask
      ? `<span style="text-decoration:line-through;color:var(--text-muted)">${escapeHtml(t.title || '')}</span> <span style="font-size:10px;color:#dc2626;font-weight:700;background:#fee2e2;padding:1px 6px;border-radius:4px;margin-left:4px">DIHAPUS</span>`
      : `${escapeHtml(t.title || '')}${targetInfo}`;
    return `
      <tr ${rowAttr}>
        <td class="cell-date">${t.date || '—'}${projectRange}${timeRange}</td>
        <td>${catBadge}</td>
        <td class="cell-title">${titleHtml}</td>
        <td>
          <span style="display:inline-flex;align-items:center;gap:6px">
            ${avatarHtml(t.assigneeName || '?')} ${escapeHtml(t.assigneeName || '?')}
          </span>
        </td>
        <td><span class="status-pill ${statusClass}" style="${statusBg}">${statusLabel}</span>${statusHint}</td>
        <td>
          <span class="mini-progress"><span class="mini-progress-fill" style="width:${progress}%;background:${progress === 100 ? 'var(--success)' : (progress > 0 ? 'var(--warning)' : 'var(--text-light)')}"></span></span>
          <span style="font-size:12px;font-variant-numeric:tabular-nums">${progress}%</span>
        </td>
        <td>${dueBadge}</td>
        <td style="color:var(--text-muted);font-size:12px">${updatedTime}</td>
      </tr>
    `;
  }).join('');

  root.innerHTML = `
    <div class="recap-table-wrap">
      <table class="recap-table">
        <thead>
          <tr>
            ${colHeader('date', 'Tanggal')}
            <th>Kategori</th>
            ${colHeader('title', 'Judul Tugas')}
            ${colHeader('assignee', 'Pelaksana')}
            ${colHeader('status', 'Status')}
            ${colHeader('progress', 'Progress')}
            <th>Deadline</th>
            ${colHeader('updated', 'Diubah')}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;

  // Bind row click → open task modal
  root.querySelectorAll('[data-recap-task]').forEach(tr => {
    tr.addEventListener('click', () => openTaskModal(tr.dataset.recapTask));
  });
  // Bind sortable headers
  root.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (rf.sortBy === key) rf.sortDir = rf.sortDir === 'asc' ? 'desc' : 'asc';
      else { rf.sortBy = key; rf.sortDir = 'desc'; }
      renderRecapTable();
    });
  });
}

function renderChatMessages() {
  const root = document.getElementById('chat-messages-root');
  if (!root) return;
  const me = STATE.currentMember;
  const msgs = STATE.messages || [];

  if (msgs.length === 0) {
    root.innerHTML = `
      <div class="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px">Belum ada pesan</div>
        <div style="font-size:13px">Ketik di bawah untuk mulai diskusi sama tim</div>
      </div>
    `;
    return;
  }

  // Group messages by date (day divider)
  const groups = [];
  let lastDateStr = '';
  msgs.forEach(m => {
    const ts = m.createdAt?.toMillis?.() || 0;
    const d = ts ? new Date(ts) : new Date();
    const dateKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (dateKey !== lastDateStr) {
      const today = todayStr();
      const yest = (() => { const x = new Date(); x.setDate(x.getDate() - 1); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; })();
      let label;
      if (dateKey === today) label = 'Hari ini';
      else if (dateKey === yest) label = 'Kemarin';
      else label = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
      groups.push({ type: 'divider', label });
      lastDateStr = dateKey;
    }
    groups.push({ type: 'msg', msg: m });
  });

  root.innerHTML = groups.map(g => {
    if (g.type === 'divider') return `<div class="chat-day-divider">${escapeHtml(g.label)}</div>`;
    const m = g.msg;
    const mine = me && m.authorId === me.id;
    const ts = m.createdAt?.toMillis?.() || 0;
    const timeStr = ts ? (() => {
      const d = new Date(ts);
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    })() : '';
    const isDeleted = m.isDeleted === true;
    const canDelete = me && !isDeleted && (m.authorId === me.id || me.role === 'admin');
    return `
      <div class="chat-msg ${mine ? 'mine' : ''} ${isDeleted ? 'deleted' : ''}" data-msg-id="${m.id}">
        <div class="chat-msg-avatar" style="background:${colorFor(m.authorName || '?')}">${escapeHtml(initials(m.authorName || '?'))}</div>
        <div class="chat-msg-bubble">
          <div class="chat-msg-head">
            <span class="chat-msg-author">${escapeHtml(m.authorName || '?')}</span>
            <span class="chat-msg-time">${timeStr}</span>
          </div>
          <div class="chat-msg-text">${isDeleted ? 'Pesan dihapus' : parseMentions(m.text || '').html}</div>
          ${canDelete ? `<button class="chat-msg-del" data-del-msg="${m.id}" title="Hapus pesan">✕</button>` : ''}
        </div>
      </div>
    `;
  }).join('');

  // Bind delete buttons
  root.querySelectorAll('[data-del-msg]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm('Hapus pesan ini?')) return;
      try {
        await updateDoc(doc(STATE.db, 'messages', btn.dataset.delMsg), {
          isDeleted: true,
          deletedAt: serverTimestamp(),
          deletedById: STATE.currentMember?.id,
        });
      } catch (err) {
        toast('Gagal hapus: ' + err.message, 'error');
      }
    });
  });

  // Auto-scroll ke bawah
  requestAnimationFrame(() => { root.scrollTop = root.scrollHeight; });
}

function bindChatPage() {
  const input = document.getElementById('chat-input');
  const btn = document.getElementById('chat-send-btn');
  if (!input || !btn) return;

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(120, input.scrollHeight) + 'px';
  });

  // v2.24: @mention picker
  setupMentionPicker(input);

  async function sendMsg() {
    const text = input.value.trim();
    if (!text) return;
    const me = STATE.currentMember;
    if (!me) return;
    btn.disabled = true;
    // v2.22-v2.25: detect mentions + visual feedback
    const { mentionedIds } = parseMentions(text);
    // v2.25: kasih feedback ke user — kalau ada @ tapi gak match, warn
    if (text.includes('@') && mentionedIds.length === 0) {
      const memberList = (STATE.members || []).map(m => m.name).join(', ');
      console.warn('[mention] @ ditemukan di pesan tapi tidak match member apapun.\nMember yg ada:', memberList);
    }
    try {
      await addDoc(collection(STATE.db, 'messages'), {
        text,
        authorId: me.id,
        authorName: me.name,
        mentions: mentionedIds,
        createdAt: serverTimestamp(),
      });
      input.value = '';
      input.style.height = 'auto';
      markChatAsRead();
      // v2.25: konfirmasi visual saat mention sukses
      if (mentionedIds.length > 0) {
        const names = mentionedIds
          .map(id => (STATE.members || []).find(m => m.id === id)?.name)
          .filter(Boolean).join(', ');
        if (names) toast(`📌 Mention terkirim ke ${names}`, 'success');
      }
    } catch (err) {
      toast('Gagal kirim: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  btn.addEventListener('click', sendMsg);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  });

  // Focus saat buka chat
  setTimeout(() => input.focus(), 100);
}

function renderProjectList() {
  const root = document.getElementById('project-list-root');
  if (!root) return;

  const filter = STATE.projectFilter || 'active';
  let projects = STATE.tasks.filter(t =>
    t.isProject === true
    && (t.boardId || DEFAULT_BOARD_ID) === STATE.currentBoardId
    && t.isDeleted !== true
    && t.notCompleted !== true // v2.25: skip notCompleted di project list
  );
  if (filter === 'active') projects = projects.filter(t => t.status !== 'done');
  else if (filter === 'done') projects = projects.filter(t => t.status === 'done');

  // v2.22: filter tambahan
  if (STATE.projectFilterCategory) {
    projects = projects.filter(t => t.category === STATE.projectFilterCategory);
  }
  if (STATE.projectFilterMember) {
    if (STATE.projectFilterMember === 'me') {
      const meId = STATE.currentMember?.id;
      projects = projects.filter(t => t.assigneeId === meId || t.isShared === true);
    } else {
      projects = projects.filter(t => t.assigneeId === STATE.projectFilterMember);
    }
  }
  if (STATE.projectFilterLabelIds.length > 0) {
    projects = projects.filter(t =>
      (t.labelIds || []).some(id => STATE.projectFilterLabelIds.includes(id))
    );
  }
  if (STATE.projectSearch) {
    const q = STATE.projectSearch.toLowerCase();
    projects = projects.filter(t =>
      (t.title || '').toLowerCase().includes(q) ||
      (t.description || '').toLowerCase().includes(q)
    );
  }

  // Sort: status active (todo/proses) dulu, lalu by date asc (project starting soonest first)
  projects.sort((a, b) => {
    const aActive = a.status !== 'done' ? 0 : 1;
    const bActive = b.status !== 'done' ? 0 : 1;
    if (aActive !== bActive) return aActive - bActive;
    return (a.date || '').localeCompare(b.date || '');
  });

  if (projects.length === 0) {
    root.innerHTML = `
      <div class="project-empty">
        <div class="project-empty-icon">📌</div>
        <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px">Belum ada proyek ${filter === 'active' ? 'aktif' : (filter === 'done' ? 'selesai' : '')}</div>
        <div style="font-size:13px;margin-bottom:18px">Bikin proyek baru untuk tugas yang berlangsung mingguan atau bulanan</div>
        <button class="btn btn-primary" data-new-project-empty>+ Bikin Proyek Pertama</button>
      </div>
    `;
    const emptyBtn = root.querySelector('[data-new-project-empty]');
    if (emptyBtn) emptyBtn.addEventListener('click', () => openTaskModal(null, { isProject: true }));
    return;
  }

  const today = todayStr();
  const monthsId = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const fmtDate = (dateStr) => {
    if (!dateStr) return '—';
    const [, m, d] = dateStr.split('-');
    return `${parseInt(d)} ${monthsId[parseInt(m)-1]}`;
  };
  const cardsHtml = projects.map(t => {
    const start = t.date;
    const end = t.dueDate || t.date;
    const cat = CATEGORIES.find(c => c.id === t.category);
    const assignee = STATE.members.find(m => m.id === t.assigneeId);
    const labels = (t.labelIds || [])
      .map(id => STATE.labels.find(l => l.id === id))
      .filter(Boolean);
    const checklistInfo = computeChecklistTotal(t);

    // Days calculation
    const todayDt = new Date(today + 'T00:00:00');
    const startDt = new Date(start + 'T00:00:00');
    const endDt = new Date(end + 'T00:00:00');
    const totalDays = Math.round((endDt - startDt) / 86400000) + 1;
    const elapsedDays = Math.max(0, Math.min(totalDays, Math.round((todayDt - startDt) / 86400000) + 1));
    const daysLeft = Math.round((endDt - todayDt) / 86400000);
    const isOverdue = daysLeft < 0 && t.status !== 'done';
    const isDone = t.status === 'done';
    const isProses = t.status === 'proses';

    // Timeline bar — selalu full width (representasi 100% duration)
    const elapsedPct = totalDays > 0 ? Math.min(100, (elapsedDays / totalDays) * 100) : 100;
    const progressPct = Number(t.progress) || 0;
    // Today indicator position (% within bar)
    let todayPos = elapsedPct;
    if (todayDt < startDt) todayPos = 0;
    else if (todayDt > endDt) todayPos = 100;

    const barClass = isDone ? 'done' : (isOverdue ? 'overdue' : (isProses ? 'proses' : ''));
    const cardClass = isDone ? 'status-done' : (isOverdue ? 'overdue' : (isProses ? 'status-proses' : ''));
    const daysLeftClass = isDone ? 'done' : (isOverdue ? 'overdue' : (daysLeft <= 1 ? 'warn' : 'fine'));
    const daysLeftTxt = isDone ? '✓ Selesai'
      : isOverdue ? `⚠️ lewat ${Math.abs(daysLeft)} hari`
      : daysLeft === 0 ? 'Deadline hari ini!'
      : daysLeft === 1 ? '1 hari lagi'
      : `${daysLeft} hari lagi`;

    return `
      <div class="project-card ${cardClass}" data-project-task="${t.id}">
        <div class="project-card-head">
          <div style="flex:1;min-width:0">
            <div class="project-card-meta-top">
              ${cat ? `<span class="category-badge" style="color:${cat.color};margin:0">${escapeHtml(cat.name)}</span>` : ''}
              ${t.isShared ? '<span class="shared-badge" style="margin:0">👥 Bersama</span>' : ''}
              ${labels.map(l => `<span class="label-chip" style="background:${l.color}">${escapeHtml(l.name)}</span>`).join('')}
            </div>
            <div class="project-card-title">${escapeHtml(t.title || '')}</div>
            ${t.description ? `<div style="font-size:13px;color:var(--text-muted);margin-top:4px">${escapeHtml(t.description.slice(0, 120))}${t.description.length > 120 ? '…' : ''}</div>` : ''}
          </div>
          <div class="project-days-left ${daysLeftClass}">${daysLeftTxt}</div>
        </div>

        <div class="project-timeline">
          <div class="project-timeline-bar ${barClass}" style="left:0;right:0"></div>
          <div class="project-timeline-progress" style="width:${progressPct}%"></div>
          ${todayDt >= startDt && todayDt <= endDt ? `<div class="project-timeline-today" style="left:${todayPos}%" title="Hari ini"></div>` : ''}
        </div>
        <div class="project-timeline-labels">
          <span>${fmtDate(start)}</span>
          <span style="color:var(--text);font-weight:600">Progress: ${progressPct}%</span>
          <span>${fmtDate(end)}</span>
        </div>

        <div class="project-card-meta-bot">
          <span>${avatarHtml(assignee?.name || t.assigneeName || '?')} <strong>${escapeHtml(assignee?.name || t.assigneeName || '?')}</strong></span>
          <span>📆 <strong>${totalDays} hari</strong> total · ${elapsedDays}/${totalDays} hari berlalu</span>
          ${checklistInfo.total > 0 ? `<span>☑️ ${checklistInfo.done}/${checklistInfo.total} checklist</span>` : ''}
          ${(t.comments || []).length > 0 ? `<span>💬 ${(t.comments || []).length} comment</span>` : ''}
        </div>
      </div>
    `;
  }).join('');

  root.innerHTML = `<div class="project-list">${cardsHtml}</div>`;
  root.querySelectorAll('[data-project-task]').forEach(card => {
    card.addEventListener('click', () => openTaskModal(card.dataset.projectTask));
  });
}

      if (idx === -1) STATE.projectFilterLabelIds.push(id);
      else STATE.projectFilterLabelIds.splice(idx, 1);
      renderMain();
    });
  });
  // v2.22: search input (debounced) · v2.23: simpan timer di STATE biar bisa di-cancel saat reset
  const searchEl = document.getElementById('proj-search');
  if (searchEl) {
    searchEl.addEventListener('input', () => {
      if (STATE._projSearchTimer) clearTimeout(STATE._projSearchTimer);
      STATE._projSearchTimer = setTimeout(() => {
        STATE._projSearchTimer = null;
        STATE.projectSearch = searchEl.value || '';
        renderProjectList(); // gak perlu renderMain, cuma list yg refresh
      }, 250);
    });
  }
  // Reset filter button — v2.23: clear input element + cancel pending debounce
  const resetBtn = document.getElementById('reset-project-filters');
  if (resetBtn) resetBtn.addEventListener('click', () => {
    if (STATE._projSearchTimer) { clearTimeout(STATE._projSearchTimer); STATE._projSearchTimer = null; }
    STATE.projectFilterCategory = null;
    STATE.projectFilterMember = null;
    STATE.projectFilterLabelIds = [];
    STATE.projectSearch = '';
    if (searchEl) searchEl.value = '';
    renderMain();
  });

  const newBtn = document.getElementById('btn-new-project');
  if (newBtn) newBtn.addEventListener('click', () => openTaskModal(null, { isProject: true }));
}

function renderNotDoneList() {
  const root = document.getElementById('notdone-list-root');
  if (!root) return;
  const filter = STATE.notDoneFilter || { member: null, category: null, search: '' };
  let tasks = STATE.tasks.filter(t => t.notCompleted === true && !t.isDeleted);
  if (filter.member) tasks = tasks.filter(t => t.assigneeId === filter.member);
  if (filter.category) tasks = tasks.filter(t => t.category === filter.category);
  if (filter.search) {
    const q = filter.search.toLowerCase();
    tasks = tasks.filter(t =>
      (t.title || '').toLowerCase().includes(q) ||
      (t.kendala || '').toLowerCase().includes(q) ||
      (t.description || '').toLowerCase().includes(q)
    );
  }
  // Sort terbaru duluan
  tasks.sort((a, b) => (b.notCompletedAt || 0) - (a.notCompletedAt || 0));

  if (tasks.length === 0) {
    root.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text-muted)">
      <div style="font-size:48px;margin-bottom:12px">🎉</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:6px">Belum ada task tidak selesai</div>
      <div style="font-size:13px">Task yang ditandai "Tidak Selesai" akan muncul di sini buat direview.</div>
    </div>`;
    return;
  }

  // v2.25: action button "Hapus" & "Kembalikan ke Kanban" hanya untuk admin
  const me = STATE.currentMember;
  const isAdmin = me?.role === 'admin';

  const rows = tasks.map(t => {
    const cat = CATEGORIES.find(c => c.id === t.category);
    const catBadge = cat ? `<span class="category-badge" style="background:${cat.color}20;color:${cat.color}">${escapeHtml(cat.name)}</span>` : '';
    const ts = t.notCompletedAt ? new Date(t.notCompletedAt).toLocaleString('id-ID') : '?';
    const byName = t.notCompletedBy?.name || '?';
    return `
      <div class="notdone-card" style="background:white;border:1px solid var(--border);border-left:4px solid #dc2626;border-radius:8px;padding:14px 16px;margin-bottom:10px;cursor:pointer" data-nd-open="${t.id}">
        <div style="display:flex;justify-content:space-between;align-items:start;gap:12px;margin-bottom:6px">
          <div style="flex:1">
            <div style="font-weight:600;font-size:15px;margin-bottom:4px">${escapeHtml(t.title)}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:12px">
              ${catBadge}
              <span style="color:var(--text-muted)">📅 ${escapeHtml(t.date || '?')}</span>
              <span style="color:var(--text-muted)">👤 ${escapeHtml(t.assigneeName || '?')}</span>
            </div>
          </div>
          <div style="text-align:right;font-size:11px;color:var(--text-muted);white-space:nowrap">
            <div>Ditandai ${escapeHtml(ts)}</div>
            <div>oleh ${escapeHtml(byName)}</div>
          </div>
        </div>
        <div style="background:#fef2f2;border-radius:6px;padding:10px 12px;font-size:13px;color:#991b1b;line-height:1.5">
          <strong>Alasan:</strong> ${escapeHtml(t.kendala || '(tidak ada catatan)')}
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end;align-items:center;flex-wrap:wrap">
          ${isAdmin ? `
            <span style="font-size:11px;color:var(--text-muted);margin-right:auto">🔐 Aksi khusus admin:</span>
            <button class="btn btn-ghost btn-sm" data-stop data-nd-restore="${t.id}" title="Kembalikan task ke kanban (status TODO)">↺ Kembalikan ke Kanban</button>
            <button class="btn btn-danger btn-sm" data-stop data-nd-delete="${t.id}" title="Hapus task permanen">🗑️ Hapus Task</button>
            <button class="btn btn-ghost btn-sm" data-stop data-nd-open="${t.id}">👁️ Detail</button>
          ` : `
            <span style="font-size:11px;color:var(--text-muted);margin-right:auto">🔒 Hanya admin yang bisa proses task ini</span>
            <button class="btn btn-ghost btn-sm" data-stop data-nd-open="${t.id}">👁️ Detail</button>
          `}
        </div>
      </div>
    `;
  }).join('');

  root.innerHTML = rows;

  // Bind row click → open task modal
  root.querySelectorAll('[data-nd-open]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      openTaskModal(el.dataset.ndOpen);
    });
  });

  // v2.25: Restore to kanban — admin only
  root.querySelectorAll('[data-nd-restore]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!isAdmin) { toast('Hanya admin yang bisa kembalikan task', 'error'); return; }
      const taskId = btn.dataset.ndRestore;
      const t = STATE.tasks.find(x => x.id === taskId);
      if (!t) return;
      if (!confirm(`Kembalikan "${t.title}" ke kanban?\n\nStatus balik ke TODO, alasan tidak-selesai dihapus.`)) return;
      try {
        const meNow = STATE.currentMember;
        // v2.35: tambah activity log entry
        const newAct = {
          id: uid(),
          type: 'restored_from_not_completed',
          byId: meNow.id, byName: meNow.name,
          at: new Date().toISOString(),
          to: 'todo',
          prevReason: t.kendala || '',
        };
        const activity = [...(t.activity || []), newAct];
        await updateDoc(doc(STATE.db, 'tasks', taskId), {
          notCompleted: false,
          kendala: null,
          notCompletedAt: null,
          notCompletedBy: null,
          status: 'todo',
          progress: 0,
          activity,
          updatedAt: serverTimestamp(),
        });
        toast('Task dikembalikan ke kanban', 'success');
      } catch (err) {
        toast('Gagal: ' + err.message, 'error');
      }
    });
  });

  // v2.25-v2.35: Delete permanent — admin only. v2.35: SEMUA delete jadi soft-delete + activity log
  // biar history visible di kalender (Case 4 user spec).
  root.querySelectorAll('[data-nd-delete]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!isAdmin) { toast('Hanya admin yang bisa hapus task', 'error'); return; }
      const taskId = btn.dataset.ndDelete;
      const t = STATE.tasks.find(x => x.id === taskId);
      if (!t) return;
      if (!confirm(`HAPUS PERMANEN task "${t.title}"?\n\nIni tidak bisa di-undo. Lebih baik pilih "Kembalikan ke Kanban" kalau masih perlu.`)) return;
      try {
        const meNow = STATE.currentMember;
        // v2.35: activity log entry
        const newAct = {
          id: uid(),
          type: 'task_deleted',
          byId: meNow.id, byName: meNow.name,
          at: new Date().toISOString(),
          reason: t.kendala || '(no reason)',
        };
        const activity = [...(t.activity || []), newAct];
        // Soft-delete uniformly biar history terjaga di kalender
        await updateDoc(doc(STATE.db, 'tasks', taskId), {
          isDeleted: true,
          notCompleted: false,
          kendala: null,
          notCompletedAt: null,
          notCompletedBy: null,
          activity,
          updatedAt: serverTimestamp(),
        });
        toast('Task dihapus permanen', 'success');
      } catch (err) {
        toast('Gagal hapus: ' + err.message, 'error');
      }
    });
  });
}

function getActiveCalendarMonth() {
  if (STATE.calendarMonth) return STATE.calendarMonth;
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function shiftCalendarMonth(delta) {
  const cur = getActiveCalendarMonth();
  const [y, m] = cur.split('-').map(Number);
  const dt = new Date(y, m - 1 + delta, 1);
  STATE.calendarMonth = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`;
}

function renderCalendarPageHtml() {
  const month = getActiveCalendarMonth();
  const [y, m] = month.split('-').map(Number);
  const monthsId = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
  const monthLabel = `${monthsId[m - 1]} ${y}`;
  return `
    <div class="page-title-row">
      <div>
        <h1 class="page-title">Kalender Tugas</h1>
        <div style="font-size:13px;color:var(--text-muted);margin-top:4px">Lihat completion harian — klik tanggal untuk detail tugas</div>
      </div>
    </div>

    <div class="calendar-wrap">
      <div class="calendar-header">

        <div class="calendar-nav">
          <button class="calendar-nav-btn" id="cal-prev" title="Bulan lalu">‹</button>
          <button class="btn btn-secondary btn-sm" id="cal-today">Hari ini</button>

        </div>
      </div>
      <div id="calendar-grid-root"></div>
