<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Tracker v2.63 — ApotekKu</title>
<!-- v2.32: SheetJS untuk export Kalender Kerja Bulanan ke Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<!-- v2.47: Chart.js untuk Dashboard analytics -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* === APOTEKKU BRAND === */
    --bg: #ffffff;           /* putih bersih */
    --bg-card: #ffffff;
    --bg-col: #f5f5f5;       /* abu sangat tipis utk kolom kanban */
    --bg-sidebar: #fafafa;   /* abu paling tipis sidebar */
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --text: #1a1a1a;         /* ink */
    --text-muted: #525252;
    --text-light: #a3a3a3;
    --primary: #dc2626;      /* ApotekKu red */
    --primary-dark: #b91c1c;
    --primary-light: #fde8e8;
    --accent: #c87f1f;       /* warm amber (TaskPro-ish action) */
    --accent-light: #fdf4e7;
    --success: #16a34a;
    --success-light: #dcfce7;
    --warning: #d97706;
    --warning-light: #fef3c7;
    --danger: #dc2626;
    --danger-light: #fee2e2;
    --info: #2563eb;
    --info-light: #dbeafe;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.10);
    --radius: 14px;
    --radius-sm: 8px;
    --radius-lg: 18px;
    --font-serif: 'Instrument Serif', Georgia, serif;
    --font-sans: 'IBM Plex Sans', -apple-system, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input, textarea, select { font-family: inherit; font-size: 14px; }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--primary); outline-offset: -1px; }
  h1, h2, h3, h4, .serif-heading { font-family: var(--font-serif); font-weight: 400; letter-spacing: -0.01em; }

  /* === APP LAYOUT (sidebar + main) === */
  .app-shell {
    display: flex;
    min-height: 100vh;
  }
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    transition: transform .25s;
    z-index: 90;
  }
  .sidebar-brand {
    padding: 22px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sidebar-logo {
    width: 36px; height: 36px;
    background: var(--primary);
    border-radius: var(--radius-sm);
    display: grid; place-items: center;
    color: white;
    box-shadow: 0 4px 12px rgba(220,38,38,0.25);
    flex-shrink: 0;
  }
  .sidebar-logo svg { width: 20px; height: 20px; }
  .sidebar-title {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .sidebar-nav {
    flex: 1;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow-y: auto;
  }
  .sidebar-nav-section {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    padding: 14px 12px 6px;
  }
  .sidebar-nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    border: none;
    background: transparent;
    text-align: left;
    font-family: inherit;
    width: 100%;
  }
  .sidebar-nav-item:hover {
    background: rgba(0,0,0,0.04);
    color: var(--text);
  }
  .sidebar-nav-item.active {
    background: white;
    color: var(--text);
    font-weight: 600;
    box-shadow: var(--shadow-sm);
  }
  .sidebar-nav-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    font-size: 15px;
  }
  .sidebar-bottom {
    padding: 14px;
    border-top: 1px solid var(--border);
  }
  .sidebar-logout {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px 16px;
    background: var(--primary);
    color: white;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    font-weight: 600;
    transition: all .15s;
    font-family: inherit;
  }
  .sidebar-logout:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
  }

  /* === MAIN CONTENT === */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* === TOPBAR === */
  .topbar {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar-toggle {
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    display: none;
    place-items: center;
    color: var(--text-muted);
    font-size: 20px;
  }
  .topbar-toggle:hover { background: var(--bg-col); }
  .topbar-welcome { flex: 1; }
  .topbar-welcome-title {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 2px;
  }
  .topbar-welcome-sub {
    font-size: 13px;
    color: var(--text-muted);
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .user-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 4px;
    padding-right: 4px;
    background: transparent;
  }
  .user-badge-info {
    text-align: right;
    line-height: 1.3;
  }
  .user-badge-name {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
  }
  .user-badge-role {
    font-size: 11px;
    color: var(--text-muted);
  }
  .user-badge-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: white;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .admin-pill {
    background: var(--accent-light);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  /* === PAGE === */
  .page-content {
    padding: 28px 32px;
    flex: 1;
    overflow-y: auto;
  }
  .page-title-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 22px;
    gap: 14px;
    flex-wrap: wrap;
  }
  .page-title {
    font-family: var(--font-serif);
    font-size: 36px;
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  .page-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* === FILTER STRIP === */
  .filter-strip {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-group-label {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-right: 4px;
  }
  .filter-divider {
    width: 1px;
    height: 22px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* === BUTTONS === */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    border: 1px solid transparent;
    transition: all .15s;
    white-space: nowrap;
    font-family: inherit;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: #a36418; }
  .btn-accent-soft {
    background: var(--accent-light);
    color: var(--accent);
    border-color: transparent;
  }
  .btn-accent-soft:hover { background: #fae8c9; }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { background: #15803d; }
  /* v2.53 — tombol Selesai look "blocked" kalau checklist belum komplit */
  .btn-success.is-blocked {
    background: #a7d3b3;
    cursor: not-allowed;
    opacity: 0.85;
    position: relative;
  }
  .btn-success.is-blocked:hover { background: #94c2a3; }

  /* v2.55 — Status badge (TEKS, bukan ikon) di cell Kalender Kerja */
  .kk-cell-wrap { display: flex; flex-direction: column; gap: 3px; }
  .kk-status-badge {
    display: inline-block;
    align-self: flex-start;
    font-family: var(--font-mono);
    font-size: 8.5px;
    font-weight: 700;
    letter-spacing: 0.3px;
    padding: 1px 5px;
    border-radius: 3px;
    line-height: 1.4;
    user-select: none;
    white-space: nowrap;
  }
  .kk-status-badge.clickable { cursor: pointer; transition: filter .12s, transform .12s; }
  .kk-status-badge.clickable:hover { filter: brightness(0.93); transform: translateY(-1px); }
  .kk-status-badge.clickable:active { transform: translateY(0); }
  .kk-st-belum   { background: #e5e7eb; color: #4b5563; }
  .kk-st-proses  { background: #fde68a; color: #92400e; }
  .kk-st-selesai { background: #bbf7d0; color: #166534; }
  .kk-st-rencana { background: #dbeafe; color: #1e40af; }
  .kk-cell-text { white-space: normal; word-break: break-word; line-height: 1.35; min-height: 14px; outline: none; }
  .kk-cell-text:focus { background: #fffef0; box-shadow: inset 0 0 0 2px #fbbf24; border-radius: 3px; }
  /* Cell background per status (lembut) */
  .kk-bg-proses  { background: #fffbeb !important; }
  .kk-bg-selesai { background: #f0fdf4 !important; }
  /* Legend chips di header */
  .kk-legend { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .kk-legend .chip { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px; font-family: var(--font-mono); }
  .btn-success-soft {
    background: var(--success-light);
    color: #15803d;
  }
  .btn-success-soft:hover { background: #bbf7d0; }
  .btn-secondary { background: var(--bg-col); color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { background: #e9e4dc; }
  .btn-ghost { background: transparent; color: var(--text-muted); }
  .btn-ghost:hover { background: var(--bg-col); color: var(--text); }
  .btn-ghost-soft {
    background: white;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost-soft:hover {
    background: var(--bg-col);
    color: var(--text);
  }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: var(--primary-dark); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-icon {
    width: 34px; height: 34px;
    padding: 0;
    border-radius: var(--radius-sm);
  }

  /* === FORMS === */
  .input, .select, .textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: white;
    font-size: 14px;
    transition: border-color .15s;
  }
  .input:focus, .select:focus, .textarea:focus {
    border-color: var(--primary);
    outline-offset: 0;
  }
  .textarea { resize: vertical; min-height: 80px; font-family: inherit; }
  .label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .form-group { margin-bottom: 14px; }

  /* === FILTER CHIPS === */
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    background: var(--bg-col);
    color: var(--text-muted);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all .15s;
  }
  .chip:hover { background: #e1e7ef; }
  .chip.active {
    background: var(--primary);
    color: white;
  }
  .chip-avatar {
    width: 16px; height: 16px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: white;
    font-size: 9px;
    font-weight: 700;
  }

  /* === DATE PICKER === */
  .date-control {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px;
  }
  .date-nav {
    width: 28px; height: 28px;
    border-radius: var(--radius-sm);
    display: grid; place-items: center;
    color: var(--text-muted);
  }
  .date-nav:hover { background: var(--bg-col); }
  .date-input {
    border: none;
    padding: 4px 8px;
    font-size: 13px;
    font-weight: 500;
    background: transparent;
  }
  .date-today-btn {
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    color: var(--primary);
  }
  .date-today-btn:hover { background: var(--primary-light); }

  /* === KANBAN === */
  .kanban {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    min-height: 400px;
  }
  .kanban-col {
    background: var(--bg-col);
    border-radius: var(--radius-lg);
    padding: 16px;
    display: flex;
    flex-direction: column;
    min-height: 300px;
    transition: background .15s;
  }
  .kanban-col.drag-over {
    background: #dbeafe;
    outline: 2px dashed var(--primary);
    outline-offset: -2px;
  }
  .kanban-col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .kanban-col-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .kanban-col-icon {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .col-todo .kanban-col-icon { background: var(--text-light); }
  .col-proses .kanban-col-icon { background: var(--warning); }
  .col-done .kanban-col-icon { background: var(--success); }
  .kanban-col-count {
    background: white;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .kanban-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }
  .kanban-empty {
    text-align: center;
    color: var(--text-light);
    padding: 24px 12px;
    font-size: 12px;
    font-style: italic;
  }
  .kanban-add-btn {
    padding: 10px;
    border-radius: var(--radius);
    border: 1px dashed var(--border-strong);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    margin-top: 4px;
    background: transparent;
  }
  .kanban-add-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: white;
  }

  /* === TASK CARD === */
  .task-card {
    background: white;
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    cursor: grab;
    transition: all .15s;
    position: relative;
  }
  .task-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .task-card.dragging {
    opacity: 0.5;
    cursor: grabbing;
  }
  .task-card.col-todo { border-left: 4px solid var(--info); }
  .task-card.col-proses { border-left: 4px solid var(--warning); }
  .task-card.col-done { border-left: 4px solid var(--success); }
  .task-card-body { cursor: pointer; }
  .task-card-actions {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .task-card-actions .btn {
    flex: 1;
    padding: 8px 12px;
    font-size: 12.5px;
  }
  .task-card-history-btn {
    width: 30px;
    height: 30px;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text-muted);
    display: grid;
    place-items: center;
    font-size: 13px;
  }
  .task-card-history-btn:hover {
    background: var(--bg-col);
    color: var(--text);
  }
  .task-card.task-locked {
    background: #fafbfc;
    cursor: default;
  }
  .task-card.task-locked::after {
    content: '🔒';
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 11px;
    opacity: 0.45;
  }
  .task-card.task-locked:hover {
    transform: none;
    box-shadow: var(--shadow-sm);
  }
  .readonly-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    background: var(--bg-col);
    color: var(--text-muted);
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
  }

  /* === BOARD SWITCHER === */
  .board-switcher {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-wrap: wrap;
  }
  .board-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--bg-col);
    border: 1px solid transparent;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
  }
  .board-chip:hover { background: #e1e7ef; }
  .board-chip.active {
    background: white;
    color: var(--text);
    border-color: var(--border-strong);
    box-shadow: var(--shadow-sm);
    font-weight: 600;
  }
  .board-color {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .board-chip-new {
    border: 1px dashed var(--border-strong);
    background: transparent;
    font-size: 12px;
  }
  .board-chip-new:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-light);
  }

  /* === CALENDAR === */
  .calendar-wrap {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .calendar-month-label {
    font-family: var(--font-serif);
    font-size: 26px;
    font-weight: 400;
  }
  .calendar-nav { display: flex; gap: 6px; align-items: center; }
  .calendar-nav-btn {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    background: var(--bg-col);
    font-size: 14px;
    color: var(--text);
    transition: all .15s;
  }
  .calendar-nav-btn:hover { background: var(--border); }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .calendar-dow {
    padding: 10px 14px;
    background: var(--bg-col);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    text-align: center;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .calendar-dow:last-child { border-right: none; }
  .calendar-day {
    aspect-ratio: 1.2;
    min-height: 110px;
    padding: 8px 10px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    transition: background .12s;
    position: relative;
  }
  .calendar-day:nth-child(7n) { border-right: none; }
  .calendar-day:hover { background: var(--bg-col); }
  .calendar-day.outside {
    background: #fafafa;
    color: var(--text-light);
    cursor: default;
  }
  .calendar-day.outside:hover { background: #fafafa; }
  .calendar-day.today .calendar-day-num {
    background: var(--primary);
    color: white;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    display: inline-grid;
    place-items: center;
    font-weight: 700;
  }
  .calendar-day-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .calendar-day.outside .calendar-day-num { color: var(--text-light); }
  .calendar-day-stats {
    display: flex;
    flex-direction: column;
    gap: 2px;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: auto;
  }
  .calendar-day-mini-bar {
    height: 4px;
    border-radius: 100px;
    background: var(--bg-col);
    overflow: hidden;
    margin: 6px 0 4px;
  }
  .calendar-day-mini-bar-fill {
    height: 100%;
    background: var(--success);
    border-radius: 100px;
  }
  .calendar-day-completion {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
  }
  .calendar-day.complete .calendar-day-completion { color: var(--success); }
  .calendar-day.partial .calendar-day-completion { color: var(--warning); }
  .calendar-day.empty .calendar-day-completion { color: var(--text-light); }
  .calendar-day-counts {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    font-size: 10.5px;
    line-height: 1.4;
  }
  .calendar-day-count {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 600;
  }
  .calendar-day-count.todo { background: var(--info-light); color: var(--info); }
  .calendar-day-count.proses { background: var(--warning-light); color: #92400e; }
  .calendar-day-count.done { background: var(--success-light); color: #15803d; }

  /* === RECAP TABLE === */
  .recap-table-wrap {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .recap-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .recap-table thead th {
    background: var(--bg-col);
    text-align: left;
    padding: 12px 14px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  .recap-table thead th:hover { background: #ececec; }
  .recap-table thead th.sorted::after {
    content: ' ↓';
    color: var(--primary);
  }
  .recap-table thead th.sorted.asc::after { content: ' ↑'; }
  .recap-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .recap-table tbody tr:hover { background: var(--bg-col); cursor: pointer; }
  .recap-table tbody tr:last-child { border-bottom: none; }
  .recap-table td {
    padding: 12px 14px;
    vertical-align: middle;
  }
  .recap-table td.cell-title { font-weight: 600; color: var(--text); }
  .recap-table td.cell-date { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .recap-table .mini-progress {
    width: 70px;
    height: 4px;
    background: var(--bg-col);
    border-radius: 100px;
    overflow: hidden;
    display: inline-block;
    margin-right: 6px;
    vertical-align: middle;
  }
  .recap-table .mini-progress-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 100px;
  }
  .recap-table .status-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .recap-table .status-pill.todo { background: var(--info-light); color: var(--info); }
  .recap-table .status-pill.proses { background: var(--warning-light); color: #92400e; }
  .recap-table .status-pill.done { background: var(--success-light); color: #15803d; }
  .recap-table-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
    font-size: 14px;
  }
  .recap-summary {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .recap-summary-card {
    flex: 1;
    min-width: 150px;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
  }
  .recap-summary-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .recap-summary-value {
    font-family: var(--font-serif);
    font-size: 32px;
    font-weight: 400;
  }
  .recap-summary-detail {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* === TIME TRACKER === */
  .time-tracker-box {
    background: var(--bg-col);
    padding: 14px 16px;
    border-radius: var(--radius);
    margin-bottom: 12px;
  }
  .time-tracker-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .time-tracker-display {
    flex: 1;
    min-width: 140px;
  }
  .time-tracker-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 2px;
  }
  .time-tracker-total {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .time-tracker-running {
    color: var(--success);
    animation: pulse-time 1.5s ease-in-out infinite;
  }
  @keyframes pulse-time {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .time-tracker-sessions {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 11.5px;
    color: var(--text-muted);
    max-height: 100px;
    overflow-y: auto;
  }
  .time-tracker-session {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
  }
  .time-badge-card {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
  }

  /* === MENTION HIGHLIGHT === */
  .mention {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--primary-light);
    color: var(--primary);
    font-weight: 700;
    font-size: 0.95em;
  }
  .chat-msg.mine .mention {
    background: rgba(255,255,255,0.25);
    color: white;
  }
  /* v2.24: Mention picker dropdown */
  .mention-picker-item:hover { background: var(--bg-col) !important; }

  /* === KENDALA BADGE === */
  .kendala-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 10.5px;
    font-weight: 700;
    background: var(--danger-light);
    color: #991b1b;
    margin-bottom: 6px;
    margin-right: 4px;
  }
  .kendala-box {
    padding: 12px 14px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-left: 3px solid var(--danger);
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
  }
  .kendala-label {
    font-size: 11px;
    font-weight: 700;
    color: #991b1b;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  .kendala-text {
    font-size: 13px;
    color: #7f1d1d;
    line-height: 1.5;
    white-space: pre-wrap;
  }

  /* === CARRY-OVER BADGE === */
  .carryover-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 10.5px;
    font-weight: 700;
    background: var(--warning-light);
    color: #92400e;
    margin-bottom: 6px;
  }

  /* === CHAT PAGE === */
  .chat-shell {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 200px);
    min-height: 480px;
    overflow: hidden;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .chat-day-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 12px 0 6px;
    color: var(--text-light);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .chat-day-divider::before, .chat-day-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .chat-msg {
    display: flex;
    gap: 10px;
    max-width: 78%;
    align-self: flex-start;
  }
  .chat-msg.mine {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .chat-msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: white;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .chat-msg-bubble {
    background: var(--bg-col);
    border-radius: 14px;
    padding: 9px 13px;
    min-width: 60px;
    position: relative;
  }
  .chat-msg.mine .chat-msg-bubble {
    background: var(--primary);
    color: white;
  }
  .chat-msg-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 2px;
  }
  .chat-msg.mine .chat-msg-head { justify-content: flex-end; }
  .chat-msg-author {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }
  .chat-msg.mine .chat-msg-author { color: white; opacity: 0.95; }
  .chat-msg-time {
    font-size: 10.5px;
    color: var(--text-light);
    font-family: var(--font-mono);
  }
  .chat-msg.mine .chat-msg-time { color: rgba(255,255,255,0.7); }
  .chat-msg-text {
    font-size: 14px;
    line-height: 1.45;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .chat-msg.mine .chat-msg-text { color: white; }
  .chat-msg-del {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: white;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-sm);
  }
  .chat-msg:hover .chat-msg-del { display: flex; }
  .chat-msg-del:hover { background: var(--danger-light); color: var(--danger); }
  .chat-msg.deleted .chat-msg-bubble {
    background: var(--bg-col) !important;
    color: var(--text-light) !important;
    font-style: italic;
  }
  .chat-msg.deleted .chat-msg-text {
    color: var(--text-light) !important;
    font-size: 12px;
  }
  .chat-msg.deleted .chat-msg-del { display: none !important; }
  .chat-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }
  .chat-empty-icon { font-size: 48px; opacity: 0.5; margin-bottom: 8px; }
  .chat-input-bar {
    display: flex;
    gap: 10px;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    background: white;
    align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    font-family: inherit;
    background: var(--bg-col);
  }
  .chat-input:focus { outline: 2px solid var(--primary); outline-offset: -1px; background: white; }
  .chat-send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    display: grid; place-items: center;
    font-size: 18px;
    cursor: pointer;
    transition: all .15s;
    flex-shrink: 0;
    border: none;
  }
  .chat-send-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .chat-send-btn:disabled { background: var(--border-strong); cursor: not-allowed; transform: none; }

  /* Sidebar nav badge for unread count */
  .sidebar-nav-badge {
    margin-left: auto;
    background: var(--primary);
    color: white;
    font-size: 10.5px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 100px;
    min-width: 20px;
    text-align: center;
    font-family: var(--font-mono);
  }

  /* === v2.26: Floating Chat (FAB + popup panel) === */
  .chat-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    display: grid;
    place-items: center;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(220, 38, 38, 0.35);
    border: none;
    transition: transform .18s, box-shadow .18s, background .15s;
    z-index: 9000;
  }
  .chat-fab:hover {
    background: var(--primary-dark);
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 6px 22px rgba(220, 38, 38, 0.45);
  }
  .chat-fab-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: white;
    color: var(--primary);
    font-size: 11px;
    font-weight: 700;
    min-width: 22px;
    height: 22px;
    border-radius: 100px;
    padding: 0 6px;
    display: grid;
    place-items: center;
    border: 2px solid var(--primary);
    font-family: var(--font-mono);
    line-height: 1;
  }
  .chat-panel {
    position: fixed;
    bottom: 92px;
    right: 24px;
    width: 380px;
    height: 540px;
    max-height: calc(100vh - 130px);
    background: white;
    border-radius: 14px;
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.2);
    display: none;
    flex-direction: column;
    z-index: 9001;
    overflow: hidden;
    border: 1px solid var(--border);
    transform-origin: bottom right;
    animation: chatPanelIn 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .chat-panel.open { display: flex; }
  @keyframes chatPanelIn {
    0% { opacity: 0; transform: translateY(12px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .chat-panel-header {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .chat-panel-title {
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chat-panel-close {
    background: rgba(255, 255, 255, 0.18);
    border: none;
    color: white;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    transition: background .15s;
  }
  .chat-panel-close:hover { background: rgba(255, 255, 255, 0.32); }
  .chat-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--bg-col);
  }
  .chat-panel-input-bar {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    background: white;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .chat-panel-input-bar .chat-input { font-size: 13px; padding: 8px 14px; }
  .chat-panel-input-bar .chat-send-btn { width: 38px; height: 38px; font-size: 16px; }
  /* Mobile responsiveness */
  @media (max-width: 560px) {
    .chat-panel {
      bottom: 0;
      right: 0;
      left: 0;
      width: 100%;
      height: 80vh;
      max-height: 80vh;
      border-radius: 14px 14px 0 0;
    }
    .chat-fab { bottom: 16px; right: 16px; }
    .notif-fab { bottom: 80px; right: 16px; }
    .notif-panel {
      bottom: 0;
      right: 0;
      left: 0;
      width: 100%;
      height: 75vh;
      max-height: 75vh;
      border-radius: 14px 14px 0 0;
    }
  }

  /* === v2.51: Floating Notif (FAB kecil + popup panel) === */
  .notif-fab {
    position: fixed;
    bottom: 92px; /* di atas chat-fab (bottom 24 + height 56 + 12 gap) */
    right: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #f59e0b;
    color: white;
    display: grid;
    place-items: center;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(245, 158, 11, 0.4);
    border: none;
    transition: transform .18s, box-shadow .18s, background .15s;
    z-index: 9000;
  }
  .notif-fab:hover {
    background: #d97706;
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 6px 18px rgba(245, 158, 11, 0.5);
  }
  .notif-fab-badge {
    position: absolute;
    top: -3px;
    right: -3px;
    background: #dc2626;
    color: white;
    font-size: 10px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    border-radius: 100px;
    padding: 0 5px;
    display: grid;
    place-items: center;
    border: 2px solid #fff;
    line-height: 1;
  }
  .notif-panel {
    position: fixed;
    bottom: 148px; /* di atas notif-fab (92 + 44 + 12) */
    right: 24px;
    width: 360px;
    max-width: calc(100vw - 32px);
    height: 460px;
    max-height: calc(100vh - 180px);
    background: white;
    border-radius: 14px;
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.2);
    display: none;
    flex-direction: column;
    z-index: 9001;
    overflow: hidden;
    border: 1px solid var(--border);
    transform-origin: bottom right;
    animation: notifPanelIn 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .notif-panel.open { display: flex; }
  @keyframes notifPanelIn {
    0% { opacity: 0; transform: translateY(12px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .notif-panel-header {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .notif-panel-title {
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .notif-panel-actions { display: flex; gap: 6px; align-items: center; }
  .notif-panel-actions button {
    background: rgba(255, 255, 255, 0.18);
    border: none;
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    transition: background .15s;
  }
  .notif-panel-actions button:hover { background: rgba(255, 255, 255, 0.32); }
  .notif-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    background: var(--bg-col);
  }
  .notif-panel-item {
    display: flex;
    gap: 10px;
    padding: 10px 12px;
    background: #fff;
    border-radius: 8px;
    margin-bottom: 6px;
    border-left: 3px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .notif-panel-item.unread {
    background: #fef3c7;
    border-left-color: #f59e0b;
  }
  .notif-panel-item.clickable { cursor: pointer; }
  .notif-panel-item.clickable:hover { background: #f3f4f6; }
  .notif-panel-item.unread.clickable:hover { background: #fde68a; }
  .notif-panel-item-icon { font-size: 20px; flex-shrink: 0; line-height: 1.2; }
  .notif-panel-item-body { flex: 1; min-width: 0; }
  .notif-panel-item-title {
    font-weight: 600;
    font-size: 12.5px;
    color: var(--text);
    margin-bottom: 2px;
    display: flex;
    justify-content: space-between;
    gap: 6px;
  }
  .notif-panel-item-time {
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
    font-weight: 400;
  }
  .notif-panel-item-msg {
    font-size: 11.5px;
    color: var(--text-muted);
    line-height: 1.4;
    word-break: break-word;
  }
  .notif-panel-footer {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    background: #fff;
    text-align: center;
    flex-shrink: 0;
  }
  .notif-panel-footer button {
    background: none;
    border: none;
    color: var(--primary);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 8px;
  }
  .notif-panel-footer button:hover { text-decoration: underline; }
  .notif-panel-empty {
    text-align: center;
    padding: 30px 16px;
    color: var(--text-muted);
    font-size: 12.5px;
  }
  .notif-panel-empty .icon { font-size: 36px; margin-bottom: 8px; }

  /* === PROJECT PAGE (menu Tugas Proyek tersendiri) === */
  .project-list { display: flex; flex-direction: column; gap: 14px; }
  .project-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    cursor: pointer;
    transition: all .15s;
    border-left: 4px solid #8b5cf6;
  }
  .project-card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .project-card.status-done { border-left-color: var(--success); opacity: 0.85; }
  .project-card.status-proses { border-left-color: var(--warning); }
  .project-card.overdue { border-left-color: var(--danger); background: #fef2f2; }
  .project-card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .project-card-title {
    font-family: var(--font-serif);
    font-size: 19px;
    font-weight: 400;
    line-height: 1.3;
    color: var(--text);
  }
  .project-card-meta-top {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .project-card-meta-bot {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 12px;
    font-size: 12.5px;
    color: var(--text-muted);
  }
  .project-card-meta-bot strong { color: var(--text); }
  .project-timeline {
    margin-top: 14px;
    position: relative;
    height: 28px;
    background: var(--bg-col);
    border-radius: 6px;
    overflow: visible;
  }
  .project-timeline-bar {
    position: absolute;
    top: 0;
    bottom: 0;
    background: linear-gradient(90deg, #ddd6fe 0%, #c4b5fd 100%);
    border-radius: 6px;
  }
  .project-timeline-bar.proses {
    background: linear-gradient(90deg, #fde68a 0%, #f59e0b 100%);
  }
  .project-timeline-bar.done {
    background: linear-gradient(90deg, #bbf7d0 0%, var(--success) 100%);
  }
  .project-timeline-bar.overdue {
    background: linear-gradient(90deg, #fecaca 0%, var(--danger) 100%);
  }
  .project-timeline-progress {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    background: rgba(0,0,0,0.18);
    border-radius: 6px 0 0 6px;
  }
  .project-timeline-today {
    position: absolute;
    top: -4px;
    bottom: -4px;
    width: 2px;
    background: var(--primary);
    z-index: 2;
  }
  .project-timeline-today::before {
    content: '';
    position: absolute;
    top: -3px;
    left: -3px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--primary);
  }
  .project-timeline-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: var(--font-mono);
  }
  .project-days-left {
    font-family: var(--font-mono);
    font-weight: 700;
    padding: 4px 11px;
    border-radius: 100px;
    font-size: 12px;
    white-space: nowrap;
  }
  .project-days-left.fine { background: #ede9fe; color: #6b21a8; }
  .project-days-left.warn { background: var(--warning-light); color: #92400e; }
  .project-days-left.overdue { background: var(--danger-light); color: #991b1b; }
  .project-days-left.done { background: var(--success-light); color: #15803d; }
  .project-empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-light);
  }
  .project-empty-icon {
    font-size: 56px;
    margin-bottom: 12px;
    opacity: 0.5;
  }
  .project-filter-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 100px;
    background: var(--bg-col);
    border: 1px solid transparent;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
  }
  .project-filter-pill:hover { background: #e8e8e8; }
  .project-filter-pill.active {
    background: #ede9fe;
    color: #6b21a8;
    border-color: #c4b5fd;
    font-weight: 700;
  }

  /* === PROJECT BADGE === */
  .project-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 10.5px;
    font-weight: 700;
    background: #ede9fe;
    color: #6b21a8;
    margin-bottom: 6px;
    margin-right: 4px;
    font-family: var(--font-mono);
  }
  .project-badge.overdue {
    background: var(--danger-light);
    color: #991b1b;
  }

  /* === SHARED TASK BADGE === */
  .shared-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 10.5px;
    font-weight: 700;
    background: var(--success-light);
    color: #15803d;
    margin-bottom: 6px;
    margin-right: 4px;
  }

  /* === FREQUENCY BADGE (task dari template recurring) === */
  .freq-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 10.5px;
    font-weight: 700;
    margin-bottom: 6px;
    margin-right: 4px;
  }
  .freq-badge.daily   { background: #fde8e8; color: #b91c1c; }
  .freq-badge.weekly  { background: #dbeafe; color: #1d4ed8; }
  .freq-badge.monthly { background: #fef3c7; color: #92400e; }

  /* === TARGET COUNTER === */
  .target-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 10.5px;
    font-weight: 700;
    background: var(--info-light);
    color: var(--info);
    font-family: var(--font-mono);
  }
  .target-badge.done { background: var(--success-light); color: #15803d; }
  .target-control {
    background: var(--bg-col);
    padding: 14px 16px;
    border-radius: var(--radius);
    margin-bottom: 14px;
  }
  .target-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .target-row > label {
    flex: 1;
    min-width: 160px;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
  }
  .target-row > label small {
    display: block;
    font-weight: 400;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .target-input-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px;
  }
  .target-input-group input {
    width: 70px;
    border: none;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 700;
    padding: 4px;
    background: transparent;
  }
  .target-input-group input:focus { outline: none; }
  .target-step-btn {
    width: 30px; height: 30px;
    border-radius: var(--radius-sm);
    background: var(--bg-col);
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: background .1s;
  }
  .target-step-btn:hover:not(:disabled) { background: var(--border-strong); }
  .target-step-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .target-display {
    flex: 0 0 auto;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--info);
    padding: 8px 18px;
    background: var(--info-light);
    border-radius: var(--radius-sm);
    min-width: 110px;
  }
  .target-display.done { color: var(--success); background: var(--success-light); }

  /* === CATEGORY BADGE === */
  .category-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 9px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border: 1px solid currentColor;
    margin-bottom: 8px;
    background: transparent;
  }
  .category-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .category-select {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .category-option {
    flex: 1;
    min-width: 110px;
    padding: 14px 16px;
    background: white;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    text-align: left;
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
  }
  .category-option:hover:not(:disabled) {
    border-color: currentColor;
  }
  .category-option.active {
    border-color: currentColor;
    background: var(--bg-col);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
  }
  .category-option-name {
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .category-option-name::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
  }
  .category-option-desc {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .category-option:disabled { opacity: 0.6; cursor: not-allowed; }

  /* === LABEL CHIPS (di task card & modal) === */
  .label-chip {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 10.5px;
    font-weight: 600;
    color: white;
    line-height: 1.4;
  }
  .label-chip-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .label-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 11px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all .15s;
    background: var(--bg-col);
    color: var(--text);
    font-family: inherit;
  }
  .label-toggle.active {
    border-color: currentColor;
  }
  .label-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* === COLOR PICKER === */
  .color-picker {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 0 0 1px var(--border);
    cursor: pointer;
    transition: transform .15s;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active {
    box-shadow: 0 0 0 2px currentColor;
    transform: scale(1.05);
  }

  /* === CHECKLIST === */
  .checklist-block {
    background: var(--bg-col);
    padding: 12px 14px;
    border-radius: var(--radius);
    margin-bottom: 10px;
  }
  .checklist-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .checklist-title {
    font-weight: 600;
    font-size: 13px;
    flex: 1;
    border: none;
    background: transparent;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .checklist-title:hover:not(:disabled) { background: rgba(0,0,0,0.04); }
  .checklist-title:focus { background: white; outline: 1px solid var(--primary); }
  .checklist-progress {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .checklist-progress-bar {
    height: 3px;
    background: white;
    border-radius: 100px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .checklist-progress-fill {
    height: 100%;
    background: var(--success);
    transition: width .25s;
  }
  .checklist-items { display: flex; flex-direction: column; gap: 4px; }
  .checklist-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px;
    border-radius: 4px;
  }
  .checklist-item:hover { background: rgba(0,0,0,0.03); }
  .checklist-item input[type="checkbox"] {
    width: 16px; height: 16px;
    cursor: pointer;
    accent-color: var(--primary);
  }
  .checklist-item-text {
    flex: 1;
    border: none;
    background: transparent;
    padding: 4px;
    font-size: 13px;
    border-radius: 4px;
  }
  .checklist-item-text:hover:not(:disabled) { background: rgba(0,0,0,0.04); }
  .checklist-item-text:focus { background: white; outline: 1px solid var(--primary); }
  .checklist-item-text.checked { text-decoration: line-through; color: var(--text-muted); }
  .checklist-item-delete {
    width: 22px; height: 22px;
    color: var(--text-light);
    font-size: 14px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity .15s;
  }
  .checklist-item:hover .checklist-item-delete { opacity: 1; }
  .checklist-item-delete:hover { background: var(--danger-light); color: var(--danger); }
  .checklist-add-btn {
    width: 100%;
    padding: 6px;
    background: transparent;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 6px;
  }
  .checklist-add-btn:hover { color: var(--primary); border-color: var(--primary); }

  /* === TIME BADGE === */
  .time-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 10.5px;
    font-weight: 700;
    background: #f3e8ff;
    color: #6b21a8;
    font-family: var(--font-mono);
  }

  /* === DUE DATE BADGE === */
  .due-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 10.5px;
    font-weight: 600;
    background: var(--bg-col);
    color: var(--text-muted);
  }
  .due-badge.overdue {
    background: var(--danger-light);
    color: #991b1b;
  }
  .due-badge.today {
    background: var(--warning-light);
    color: #92400e;
  }
  .due-badge.soon {
    background: var(--primary-light);
    color: #1d4ed8;
  }
  .due-badge.done {
    background: var(--success-light);
    color: #065f46;
  }

  /* === ACTIVITY LOG === */
  .activity-list {
    max-height: 220px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .activity-item {
    display: flex;
    gap: 8px;
    padding: 6px 0;
    font-size: 12px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--bg-col);
    display: grid;
    place-items: center;
    flex-shrink: 0;
    font-size: 11px;
  }
  .activity-content { flex: 1; line-height: 1.5; }
  .activity-actor { color: var(--text); font-weight: 600; }
  .activity-time { font-size: 10.5px; color: var(--text-light); }

  /* === PROGRESS BAR (di kanban card) === */
  .task-card-progress {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .task-card-progress-track {
    flex: 1;
    height: 5px;
    background: var(--bg-col);
    border-radius: 100px;
    overflow: hidden;
  }
  .task-card-progress-fill {
    height: 100%;
    background: var(--primary);
    transition: width .25s ease-out;
    border-radius: 100px;
  }
  .task-card-progress-fill.done { background: var(--success); }
  .task-card-progress-fill.in-progress { background: var(--warning); }
  .task-card-progress-fill.zero { background: var(--text-light); }
  .task-card-progress-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    min-width: 32px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* === PROGRESS CONTROL (di modal task) === */
  .progress-control {
    background: var(--bg-col);
    padding: 14px 16px;
    border-radius: var(--radius);
    margin-bottom: 14px;
  }
  .progress-control-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .progress-control-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--primary);
    font-variant-numeric: tabular-nums;
  }
  .progress-control-value.done { color: var(--success); }
  .progress-control-value.in-progress { color: var(--warning); }
  .progress-control-status-hint {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  input[type="range"].progress-slider {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 8px;
    background: white;
    border-radius: 100px;
    outline: none;
    border: 1px solid var(--border);
    margin: 6px 0;
  }
  input[type="range"].progress-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    background: var(--primary);
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  input[type="range"].progress-slider::-moz-range-thumb {
    width: 22px;
    height: 22px;
    background: var(--primary);
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  input[type="range"].progress-slider:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .progress-quick-row {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  .progress-quick-btn {
    flex: 1;
    padding: 6px 8px;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
  }
  .progress-quick-btn:hover:not(:disabled) {
    border-color: var(--primary);
    color: var(--primary);
  }
  .progress-quick-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .progress-quick-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .task-card-title {
    font-size: 13.5px;
    font-weight: 600;
    margin-bottom: 4px;
    word-break: break-word;
  }
  .task-card.col-done .task-card-title {
    text-decoration: line-through;
    color: var(--text-muted);
  }
  .task-card-desc {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
    word-break: break-word;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .task-card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .task-card-assignee {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-weight: 500;
  }
  .task-card-comments-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    color: var(--primary);
    font-weight: 600;
  }
  .avatar {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: white;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .avatar-lg { width: 36px; height: 36px; font-size: 14px; }

  /* === MODAL === */
  .modal-overlay {

/* =============================================================
   UTILS
   ============================================================= */
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
// v2.30: Convert Firestore Timestamp / number / string → YYYY-MM-DD (local time)
function tsToLocalDateStr(ts) {
  if (!ts) return '';
  let d;
  if (typeof ts === 'string') return ts.slice(0, 10);
  if (typeof ts === 'number') d = new Date(ts);
  else if (ts.toDate) d = ts.toDate();
  else if (ts.seconds) d = new Date(ts.seconds * 1000);
  else return '';
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function dateLabel(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const today = todayStr();
  const yest = (() => { const t = new Date(); t.setDate(t.getDate() - 1); return [t.getFullYear(), String(t.getMonth()+1).padStart(2,'0'), String(t.getDate()).padStart(2,'0')].join('-'); })();
  if (dateStr === today) return 'Hari ini';
  if (dateStr === yest) return 'Kemarin';
  return dt.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
}
function shiftDate(dateStr, days) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + days);
  const yy = dt.getFullYear();
  const mm = String(dt.getMonth() + 1).padStart(2, '0');
  const dd = String(dt.getDate()).padStart(2, '0');
  return `${yy}-${mm}-${dd}`;
}
function timeAgo(date) {
  if (!date) return '';
  const d = date instanceof Date ? date : (date.toDate ? date.toDate() : new Date(date));
  const sec = Math.floor((Date.now() - d.getTime()) / 1000);
  if (sec < 60) return 'baru saja';
  if (sec < 3600) return `${Math.floor(sec / 60)}m lalu`;
  if (sec < 86400) return `${Math.floor(sec / 3600)}j lalu`;
  if (sec < 604800) return `${Math.floor(sec / 86400)}h lalu`;
  return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
}
function colorFor(name) {
  const s = String(name || '');
  let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function initials(name) {
  const parts = String(name || '?').trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function avatarHtml(name, sizeClass = '') {
  return `<span class="avatar ${sizeClass}" style="background:${colorFor(name)}">${escapeHtml(initials(name))}</span>`;
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function getNotifHistory() {
  try {
    const raw = localStorage.getItem(LS_KEYS.NOTIF_HISTORY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) return [];
    // Auto-purge: remove items older than TTL
    const cutoff = Date.now() - (NOTIF_HISTORY_TTL_DAYS * 86400000);
    return arr.filter(n => n && typeof n.ts === 'number' && n.ts >= cutoff);
  } catch (e) { return []; }
}
function saveNotifHistory(arr) {
  try { localStorage.setItem(LS_KEYS.NOTIF_HISTORY, JSON.stringify(arr.slice(0, NOTIF_HISTORY_MAX))); }
  catch (e) { console.warn('Save notif history failed:', e); }
}
function addNotifToHistory(item) {
  const arr = getNotifHistory();
  // Prepend (latest first)
  arr.unshift({
    id: 'nh-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7),
    ts: Date.now(),
    title: item.title || '',
    body: item.body || '',
    icon: item.icon || '🔔',
    type: item.type || 'default',
    read: false,
    action: item.action || null, // { kind: 'task'|'view', taskId?, view? }

  if (typeof updateNotifBadge === 'function') updateNotifBadge();
  if (typeof updateNotifFAB === 'function') updateNotifFAB();
}

function dismissAppNotif(el, immediate = false) {

  if (el.dataset.timeout) clearTimeout(parseInt(el.dataset.timeout, 10));
  if (immediate) { el.remove(); return; }
  el.classList.add('dismissing');
  setTimeout(() => el.remove(), 250);
}
function playNotifSound() {
  if (!STATE.notifSettings?.enabled || !STATE.notifSettings?.soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // ~3 detik alarm pattern: 2 phrase × 4-tone, vibes notifikasi WA tapi lebih keras
    const phrase = [
      { freq: 1200, dur: 0.20 },
      { freq:  900, dur: 0.18 },
      { freq: 1500, dur: 0.18 },
      { freq: 1100, dur: 0.34 },
    ];
    const gapInPhrase = 0.06;
    const gapBetweenPhrase = 0.20;
    let cursor = ctx.currentTime + 0.02;
    // Master compressor
    const compressor = ctx.createDynamicsCompressor();
    compressor.threshold.setValueAtTime(-22, ctx.currentTime);
    compressor.knee.setValueAtTime(6, ctx.currentTime);
    compressor.ratio.setValueAtTime(10, ctx.currentTime);
    compressor.attack.setValueAtTime(0.003, ctx.currentTime);
    compressor.release.setValueAtTime(0.08, ctx.currentTime);
    compressor.connect(ctx.destination);

    const playTone = (freq, dur, time) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const lpf = ctx.createBiquadFilter();
      lpf.type = 'lowpass';
      lpf.frequency.value = 4000;
      lpf.Q.value = 1;
      osc.connect(lpf);
      lpf.connect(gain);
      gain.connect(compressor);
      osc.type = 'square';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, time);
      gain.gain.exponentialRampToValueAtTime(0.95, time + 0.012);
      gain.gain.setValueAtTime(0.95, time + dur - 0.06);
      gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
      osc.start(time);
      osc.stop(time + dur + 0.02);
    };

    // Phrase 1
    phrase.forEach(({ freq, dur }) => {
      playTone(freq, dur, cursor);
      cursor += dur + gapInPhrase;
    });
    // Gap
    cursor += gapBetweenPhrase;
    // Phrase 2
    phrase.forEach(({ freq, dur }) => {
      playTone(freq, dur, cursor);
      cursor += dur + gapInPhrase;
    });
  } catch (e) { console.error('Sound failed', e); }
}

// v2.20: Sound khusus chat — pendek (~0.5 detik), 2-tone ding-dong, tetap keras
function playChatSound() {
  if (!STATE.notifSettings?.enabled || !STATE.notifSettings?.chatSoundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Pattern: ding (1400Hz, 0.16s) → pause 0.05s → dong (900Hz, 0.22s)
    const tones = [
      { freq: 1400, dur: 0.16 },
      { freq:  900, dur: 0.22 },
    ];
    const gap = 0.05;
    let cursor = ctx.currentTime + 0.02;
    // Compressor untuk loudness max
    const compressor = ctx.createDynamicsCompressor();
    compressor.threshold.setValueAtTime(-22, ctx.currentTime);
    compressor.knee.setValueAtTime(6, ctx.currentTime);
    compressor.ratio.setValueAtTime(10, ctx.currentTime);
    compressor.attack.setValueAtTime(0.003, ctx.currentTime);
    compressor.release.setValueAtTime(0.08, ctx.currentTime);
    compressor.connect(ctx.destination);

    tones.forEach(({ freq, dur }) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const lpf = ctx.createBiquadFilter();
      lpf.type = 'lowpass';
      lpf.frequency.value = 4000;
      lpf.Q.value = 1;
      osc.connect(lpf);
      lpf.connect(gain);
      gain.connect(compressor);
      osc.type = 'square'; // tetap keras
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, cursor);
      gain.gain.exponentialRampToValueAtTime(0.95, cursor + 0.01);
      gain.gain.setValueAtTime(0.95, cursor + dur - 0.05);
      gain.gain.exponentialRampToValueAtTime(0.0001, cursor + dur);
      osc.start(cursor);
      osc.stop(cursor + dur + 0.02);
      cursor += dur + gap;
    });
  } catch (e) { console.error('Chat sound failed', e); }
}

// Background timer untuk cek reminder harian + startTime task
let _reminderTimer = null;
function startReminderTimer() {
  if (_reminderTimer) clearInterval(_reminderTimer);
  _reminderTimer = setInterval(checkRemindersTick, 60000); // tiap menit
  // Run immediate (skip first 5s untuk wait STATE)
  setTimeout(checkRemindersTick, 5000);
}
function checkRemindersTick() {
  const s = STATE.notifSettings;
  if (!s || !s.enabled) return;
  const me = STATE.currentMember;
  if (!me) return;
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const currentTime = `${hh}:${mm}`;
  const today = todayStr();

  // 1. Daily reminder
  if (s.notifyDailyReminder && currentTime === s.reminderTime) {
    const lsKey = `marketing_tracker.lastDailyReminder.${me.id}`;
    if (localStorage.getItem(lsKey) !== today) {
      const unfinished = STATE.tasks.filter(t =>
        (t.assigneeId === me.id || t.isShared) &&
        t.status !== 'done' &&
        ((t.boardId || DEFAULT_BOARD_ID) === STATE.currentBoardId) &&
        ((t.date === today) || (t.date && t.date < today))
      );
      if (unfinished.length > 0) {
        showNotif(
          '📋 Reminder Tugas',
          `Kamu masih punya ${unfinished.length} tugas belum selesai hari ini`,
          {
            tag: `daily-${today}`,
            persist: true,
            type: 'daily',
            action: { kind: 'view', view: 'kanban' },
            onClick: () => {
              STATE.currentView = 'kanban';
              renderMain();
            },
          }
        );
        playNotifSound();
      }
      localStorage.setItem(lsKey, today);
    }
  }

  // 2. Start time reminder
  // FIX v2.17: untuk task proyek, trigger di tiap hari range (today in [start..end])
  if (s.notifyOnStartTime) {
    const startingTasks = STATE.tasks.filter(t => {
      if (!(t.assigneeId === me.id || t.isShared)) return false;
      if (t.startTime !== currentTime) return false;
      if (t.status === 'done') return false;
      if (t.isDeleted === true) return false;
      if ((t.boardId || DEFAULT_BOARD_ID) !== STATE.currentBoardId) return false;
      if (t.isProject) {
        // Project: today harus dalam range [start..end]
        const start = t.date;
        const end = t.dueDate || t.date;
        return today >= start && today <= end;
      }
      return t.date === today;
    });
    for (const task of startingTasks) {
      const key = `marketing_tracker.lastStartNotif.${task.id}.${today}`;
      if (localStorage.getItem(key)) continue;
      const taskId = task.id;
      const titleSuffix = task.isProject ? ' (proyek)' : '';
      showNotif(
        '⏰ Waktunya Mulai!',
        `"${task.title}"${titleSuffix} — jadwal mulai jam ${task.startTime}`,
        {
          tag: `start-${task.id}`,
          type: 'start',
          action: { kind: 'task', taskId: taskId },
          onClick: () => openTaskModal(taskId),
        }
      );
      playNotifSound();
      localStorage.setItem(key, '1');
    }
  }
}

// Handle new task added via Firestore listener
function handleNewTaskNotif(taskDoc) {
  const s = STATE.notifSettings;
  if (!s || !s.enabled || !s.notifyOnNewTask) return;
  const me = STATE.currentMember;
  if (!me) return;
  const t = { id: taskDoc.id, ...taskDoc.data() };
  // Skip kalau ke-create oleh me sendiri
  if (t.createdById === me.id) return;
  // Skip kalau bukan ke me (kecuali shared OR admin)
  if (me.role !== 'admin' && t.assigneeId !== me.id && !t.isShared) return;
  // Skip task dari template auto-generate (avoid spam tiap pagi)
  if (t.fromTemplateId) return;
  // Skip task date sangat lampau
  const today = todayStr();
  if (t.date && t.date < today) return;

  const creator = t.createdByName || 'Seseorang';
  const forMe = t.assigneeId === me.id;
  let title;
  if (t.isShared) title = '👥 Tugas Bersama Baru';
  else if (forMe) title = '🆕 Tugas Baru untuk Kamu';
  else title = `🆕 Tugas Baru (${t.assigneeName || '?'})`;

  const taskId = t.id;
  showNotif(title, `${creator}: "${t.title}"`, {
    tag: `new-${t.id}`,
    type: 'new',
    action: { kind: 'task', taskId: taskId },
    onClick: () => openTaskModal(taskId),
  });
  playNotifSound();
}

// v2.30: Notif khusus ke ADMIN saat member mark task sebagai "Tidak Selesai"
function handleNotCompletedNotif(task) {
  const me = STATE.currentMember;
  if (!me) return;
  // Cuma fire kalau current viewer adalah admin
  if (me.role !== 'admin') return;
  // Skip kalau admin sendiri yang mark (gak perlu notif diri sendiri)
  const markedBy = task.notCompletedBy;
  if (markedBy && markedBy.id === me.id) return;
  const s = STATE.notifSettings;
  if (!s || !s.enabled) return;

  const byName = markedBy?.name || 'Seseorang';
  const reason = (task.kendala || '').slice(0, 100);
  const taskId = task.id;
  showNotif(`🚫 Task ditandai Tidak Selesai`, `${byName}: "${task.title}" — ${reason}`, {
    tag: `notdone-${task.id}`,
    type: 'start', // warna oranye/merah biar prominent
    icon: '🚫',
    action: { kind: 'view', view: 'notdone' },
    onClick: () => {
      STATE.currentView = 'notdone';
      renderMain();
    },
  });

}

// Granular permission per member untuk Labels/Templates/Members
// Admin auto-true; member di-set oleh admin via Data Pengguna modal.
// permissions = { labels: bool, templates: bool, members: bool }
function hasPerm(perm) {
  const me = STATE.currentMember;
  if (!me) return false;
  if (me.role === 'admin') return true;
  return !!(me.permissions && me.permissions[perm]);
}

// === Progress ↔ Status mapping ===
// 0% = TODO, 1-99% = PROSES, 100% = DONE
function progressToStatus(p) {
  const n = Number(p) || 0;
  if (n >= 100) return 'done';
  if (n > 0) return 'proses';
  return 'todo';
}

/* =============================================================
   v2.53 — CHECKLIST COMPLETION ENFORCEMENT
   Aturan: task yang punya checklist tidak bisa di-mark 'done'
   kalau belum semua centang. Menjaga integritas data — tracker
   hanya valid kalau "Selesai" benar-benar berarti selesai.
   ============================================================= */
function checklistStats(checklists) {
  const arr = Array.isArray(checklists) ? checklists : [];
  const allItems = arr.flatMap(cl => Array.isArray(cl?.items) ? cl.items : []);
  const total = allItems.length;
  const done = allItems.filter(it => it && it.done === true).length;
  return { total, done, hasChecklist: total > 0, isComplete: total === 0 || done === total };
}
// Block transisi ke done kalau checklist incomplete.
// Returns: { ok: bool, done, total, message }
function validateChecklistDone(checklists) {
  const s = checklistStats(checklists);
  if (!s.hasChecklist || s.isComplete) {
    return { ok: true, ...s };
  }
  return {
    ok: false,
    ...s,
    message: `Tidak bisa Selesaikan: checklist masih ${s.done}/${s.total}. Centang semua item dulu sebelum tandai Selesai.`,
  };
}
function statusToProgress(s, currentProgress) {
  // Saat drag-drop antar kolom — set progress sesuai status tujuan.
  // Keep existing progress kalau sudah konsisten dengan status target.
  const cur = Number(currentProgress) || 0;
  if (s === 'done') return 100;
  if (s === 'todo') return 0;
  // proses: kalau current 0 atau 100, set ke 50 (default). Else keep.
  if (cur === 0 || cur === 100) return 50;
  return cur;
}
function progressFillClass(p) {
  const n = Number(p) || 0;
  if (n >= 100) return 'done';
  if (n > 0) return 'in-progress';
  return 'zero';
}

/* =============================================================
   TOAST
   ============================================================= */
function toast(msg, type = '') {
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = `toast ${type ? 'toast-' + type : ''}`;
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 2500);
}

/* =============================================================
   MODAL
   ============================================================= */
function showModal(html, opts = {}) {
  closeModal();
  const root = document.getElementById('modal-root');
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal ${opts.size === 'lg' ? 'modal-lg' : ''}">${html}</div>`;
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay && !opts.persistent) closeModal();
  });
  root.appendChild(overlay);
  // Close button binding
  overlay.querySelectorAll('[data-close-modal]').forEach(b => b.addEventListener('click', closeModal));
  // Focus first input
  setTimeout(() => {
    const first = overlay.querySelector('input,textarea,select');
    if (first) first.focus();
  }, 100);
  return overlay;
}
function closeModal() {
  const root = document.getElementById('modal-root');
  root.innerHTML = '';
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

async function sha256Hex(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function isAuthValid() {
  const ts = parseInt(localStorage.getItem(LS_KEYS.AUTHED_AT) || '0', 10);
  if (!ts) return false;
  const ageMs = Date.now() - ts;
  return ageMs < AUTH_TTL_DAYS * 24 * 60 * 60 * 1000;
}
