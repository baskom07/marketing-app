}

function getTasksForDate(dateStr) {
  return STATE.tasks.filter(t => {
    if ((t.boardId || DEFAULT_BOARD_ID) !== STATE.currentBoardId) return false;
    if (t.isDeleted === true) return false; // v2.15: soft-deleted
    // Task biasa: match date exact
    if (!t.isProject) return t.date === dateStr;
    // Task proyek: include kalau dateStr ada di range start..end
    const start = t.date;
    const end = t.dueDate || t.date;
    return dateStr >= start && dateStr <= end;
  });
}

function renderCalendarGrid() {
  const root = document.getElementById('calendar-grid-root');
  if (!root) return;
  const month = getActiveCalendarMonth();
  const [y, m] = month.split('-').map(Number);
  const firstDay = new Date(y, m - 1, 1);
  const lastDay = new Date(y, m, 0);
  const firstDow = firstDay.getDay(); // 0=Sun..6=Sat
  const daysInMonth = lastDay.getDate();
  const today = todayStr();

  // Compute prev month tail
  const prevLastDate = new Date(y, m - 1, 0).getDate();
  const cells = [];
  for (let i = firstDow - 1; i >= 0; i--) {
    const d = prevLastDate - i;
    const dt = new Date(y, m - 2, d);
    cells.push({ outside: true, dateStr: `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`, day: d });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ outside: false, dateStr: `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`, day: d });
  }
  // Pad ke 42 cells (6 minggu max)
  let nextDay = 1;
  while (cells.length < 42) {
    const dt = new Date(y, m, nextDay);
    cells.push({ outside: true, dateStr: `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(nextDay).padStart(2,'0')}`, day: nextDay });
    nextDay++;
  }

  const dows = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
  const dowHtml = dows.map(d => `<div class="calendar-dow">${d}</div>`).join('');

  const cellsHtml = cells.map(c => {
    const dayTasks = getTasksForDate(c.dateStr);
    const todoCount = dayTasks.filter(t => t.status === 'todo' || !t.status).length;
    const prosesCount = dayTasks.filter(t => t.status === 'proses').length;
    const doneCount = dayTasks.filter(t => t.status === 'done').length;
    const total = dayTasks.length;
    const pct = total > 0 ? Math.round(doneCount * 100 / total) : 0;
    const isToday = c.dateStr === today;
    const completionClass = total === 0 ? 'empty' : (pct === 100 ? 'complete' : 'partial');

    return `
      <div class="calendar-day ${c.outside ? 'outside' : ''} ${isToday ? 'today' : ''} ${completionClass}" data-cal-day="${c.dateStr}">
        <div><span class="calendar-day-num">${c.day}</span></div>
        ${total === 0 ? '' : `
          <div class="calendar-day-counts">
            ${todoCount ? `<span class="calendar-day-count todo">○ ${todoCount}</span>` : ''}
            ${prosesCount ? `<span class="calendar-day-count proses">◐ ${prosesCount}</span>` : ''}
            ${doneCount ? `<span class="calendar-day-count done">✓ ${doneCount}</span>` : ''}
          </div>
          <div class="calendar-day-mini-bar">
            <div class="calendar-day-mini-bar-fill" style="width:${pct}%;background:${pct === 100 ? 'var(--success)' : (pct > 0 ? 'var(--warning)' : 'var(--text-light)')}"></div>
          </div>
          <div class="calendar-day-completion">${pct}% · ${total} tugas</div>
        `}
      </div>
    `;
  }).join('');

  root.innerHTML = `<div class="calendar-grid">${dowHtml}${cellsHtml}</div>`;

  // Bind clicks
  root.querySelectorAll('[data-cal-day]').forEach(cell => {
    cell.addEventListener('click', () => openDayDetailModal(cell.dataset.calDay));
  });
}

function bindCalendarNav() {
  const prev = document.getElementById('cal-prev');
  const next = document.getElementById('cal-next');
  const today = document.getElementById('cal-today');
  if (prev) prev.addEventListener('click', () => { shiftCalendarMonth(-1); renderMain(); });
  if (next) next.addEventListener('click', () => { shiftCalendarMonth(1); renderMain(); });
  if (today) today.addEventListener('click', () => { STATE.calendarMonth = null; renderMain(); });
}

function openDayDetailModal(dateStr) {
  const dayTasks = getTasksForDate(dateStr);
  const todoTasks = dayTasks.filter(t => t.status === 'todo' || !t.status);
  const prosesTasks = dayTasks.filter(t => t.status === 'proses');
  const doneTasks = dayTasks.filter(t => t.status === 'done');

  const pct = total > 0 ? Math.round(doneTasks.length * 100 / total) : 0;

  const renderTaskRow = (t) => {
    const cat = CATEGORIES.find(c => c.id === t.category);
    const timeBadge = (t.startTime || t.endTime)
      ? `<span class="time-badge" style="font-size:10px">⏰ ${escapeHtml(t.startTime || '?')}${t.endTime ? `–${escapeHtml(t.endTime)}` : ''}</span>`
      : '';
    const targetVal = Number(t.target) || 0;
    const targetBadge = targetVal > 0
      ? `<span class="target-badge ${(t.progressCount || 0) >= targetVal ? 'done' : ''}" style="font-size:10px">🎯 ${t.progressCount || 0}/${targetVal}</span>`
      : '';
    return `
      <div data-day-task="${t.id}" style="display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--bg-col);margin-bottom:6px;cursor:pointer;flex-wrap:wrap">
        <span class="status-pill ${t.status || 'todo'}" style="min-width:62px;text-align:center">${(t.status || 'todo').toUpperCase()}</span>
        ${cat ? `<span class="category-badge" style="color:${cat.color};margin:0;font-size:9px">${escapeHtml(cat.short)}</span>` : ''}
        <span style="flex:1;font-weight:500;min-width:160px">${escapeHtml(t.title || '')}</span>
        ${timeBadge}
        ${targetBadge}
        <span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--text-muted)">
          ${avatarHtml(t.assigneeName || '?')} ${escapeHtml(t.assigneeName || '?')}
        </span>
        <span class="mini-progress" style="width:60px"><span class="mini-progress-fill" style="width:${t.progress || 0}%;background:${t.progress === 100 ? 'var(--success)' : (t.progress > 0 ? 'var(--warning)' : 'var(--text-light)')}"></span></span>
        <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;min-width:32px;text-align:right">${t.progress || 0}%</span>
      </div>
    `;
  };

  const [yy, mm, dd] = dateStr.split('-');
  const monthsId = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
  const dateLabelStr = `${parseInt(dd)} ${monthsId[parseInt(mm)-1]} ${yy}`;

  showModal(`
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:10px;flex:1">
        <div class="modal-title">📅 ${dateLabelStr}</div>
        ${total > 0 ? `
          <span style="padding:4px 12px;border-radius:100px;background:${pct === 100 ? 'var(--success-light)' : (pct > 0 ? 'var(--warning-light)' : 'var(--bg-col)')};color:${pct === 100 ? '#15803d' : (pct > 0 ? '#92400e' : 'var(--text-muted)')};font-size:12px;font-weight:700;font-family:var(--font-mono)">
            ${pct}% selesai
          </span>
        ` : ''}
      </div>
      <button class="modal-close" data-close-modal>×</button>
    </div>
    <div class="modal-body">
      ${total === 0 ? `
        <div style="text-align:center;padding:40px 20px;color:var(--text-light)">
          📭 Tidak ada tugas di tanggal ini
        </div>
      ` : `
        <div class="recap-summary" style="margin-bottom:18px">
          <div class="recap-summary-card">
            <div class="recap-summary-label">Total</div>
            <div class="recap-summary-value">${total}</div>
          </div>
          <div class="recap-summary-card">
            <div class="recap-summary-label">Selesai</div>
            <div class="recap-summary-value" style="color:var(--success)">${doneTasks.length}</div>
          </div>
          <div class="recap-summary-card">
            <div class="recap-summary-label">Proses</div>
            <div class="recap-summary-value" style="color:var(--warning)">${prosesTasks.length}</div>
          </div>
          <div class="recap-summary-card">
            <div class="recap-summary-label">Belum</div>
            <div class="recap-summary-value" style="color:var(--info)">${todoTasks.length}</div>
          </div>

function renderKanban() {
  const root = document.getElementById('kanban-root');
  if (!root) return;

  let filtered = visibleTasks();
  // Auto-filter by current user — kanban personal view (task milik dia + tugas bersama)
  const me = STATE.currentMember;
  if (me) {
    filtered = filtered.filter(t => t.assigneeId === me.id || t.isShared === true);
  }
  if (STATE.filterCategoryId) filtered = filtered.filter(t => t.category === STATE.filterCategoryId);
  if (STATE.filterLabelIds.length > 0) {
    filtered = filtered.filter(t =>
      (t.labelIds || []).some(lid => STATE.filterLabelIds.includes(lid))
    );
  }
  // Sort: Label Prioritas → Jam Mulai → Kategori
  // (v2.21: filter Jam & Frekuensi dihapus — sort by jam udah handle, template simplify v2.14 cuma harian)
  filtered = sortKanbanTasks(filtered);

  const cols = [
    { key: 'todo', label: 'Todo', icon: '○' },
    { key: 'proses', label: 'Proses', icon: '◐' },
    { key: 'done', label: 'Done', icon: '●' },
  ];

  const colsHtml = cols.map(c => {
    const tasksInCol = filtered.filter(t => (t.status || 'todo') === c.key);
    const cards = tasksInCol.map(t => renderTaskCard(t)).join('');
    return `
      <div class="kanban-col col-${c.key}" data-col="${c.key}">
        <div class="kanban-col-header">
          <div class="kanban-col-title">
            <span class="kanban-col-icon"></span>
            ${c.label}
          </div>
          <span class="kanban-col-count">${tasksInCol.length}</span>
        </div>
        <div class="kanban-list">
          ${cards || `<div class="kanban-empty">Kosong</div>`}
        </div>
        <button class="kanban-add-btn" data-add-status="${c.key}">+ Tambah</button>
      </div>
    `;
  }).join('');

  root.innerHTML = `<div class="kanban">${colsHtml}</div>`;

  // Bind card click (only on body, not on action buttons)
  root.querySelectorAll('[data-task-id]').forEach(el => {
    const body = el.querySelector('[data-card-body]');
    if (body) {
      body.addEventListener('click', (e) => {
        if (e.target.closest('[data-stop]')) return;
        openTaskModal(el.dataset.taskId);
      });
    }
  });

  // Quick action buttons (Kerjakan / Batal / Selesai / Batal Selesai)
  root.querySelectorAll('[data-quick-action]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const [newStatus, taskId] = btn.dataset.quickAction.split(':');
      const task = STATE.tasks.find(t => t.id === taskId);
      if (!task || !canEditTask(task)) return;
      await updateTaskStatus(taskId, newStatus);
    });
  });

  // v2.24: Tombol "Tidak Selesai" di card → popup tanya alasan
  root.querySelectorAll('[data-mark-notdone]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const taskId = btn.dataset.markNotdone;
      const task = STATE.tasks.find(t => t.id === taskId);
      if (!task || !canEditTask(task)) return;
      openMarkNotDoneModal(task);
    });
  });

  // History button → modal Riwayat Pengerjaan
  root.querySelectorAll('[data-history]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openHistoryModal(btn.dataset.history);
    });
  });

  // Drag-drop — hanya enable untuk task yg user bisa edit
  root.querySelectorAll('[data-task-id]').forEach(card => {
    const taskId = card.dataset.taskId;
    const task = STATE.tasks.find(t => t.id === taskId);
    if (!canEditTask(task)) {
      card.draggable = false;
      return;
    }
    card.draggable = true;
    card.addEventListener('dragstart', (e) => {
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', taskId);
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
  });
  root.querySelectorAll('.kanban-col').forEach(col => {
    col.addEventListener('dragover', (e) => { e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
    col.addEventListener('drop', async (e) => {
      e.preventDefault();
      col.classList.remove('drag-over');
      const taskId = e.dataTransfer.getData('text/plain');
      const newStatus = col.dataset.col;
      const task = STATE.tasks.find(t => t.id === taskId);
      if (!task || task.status === newStatus) return;
      if (!canEditTask(task)) {
        toast('Kamu cuma bisa ubah status task kamu sendiri', 'error');
        return;
      }
      await updateTaskStatus(taskId, newStatus);
    });
  });

  // Add buttons — preset progress sesuai kolom
  root.querySelectorAll('[data-add-status]').forEach(btn => {
    btn.addEventListener('click', () => {
      const s = btn.dataset.addStatus;
      const progress = s === 'done' ? 100 : (s === 'proses' ? 50 : 0);
      openTaskModal(null, { progress });
    });
  });
}

function renderTaskCard(t) {
  const assignee = STATE.members.find(m => m.id === t.assigneeId);
  const assigneeName = assignee?.name || t.assigneeName || '?';
  const commentCount = (t.comments || []).length;
  const desc = t.description ? `<div class="task-card-desc">${escapeHtml(t.description)}</div>` : '';
  const locked = !canEditTask(t);
  const progress = Number(t.progress) || 0;
  const fillClass = progressFillClass(progress);
  const status = t.status || 'todo';

  // Category badge
  const cat = CATEGORIES.find(c => c.id === t.category);
  const categoryHtml = cat
    ? `<span class="category-badge" style="color:${cat.color}">${escapeHtml(cat.name)}</span>`
    : '';

  // v2.29: Carry-over badge — task dari tanggal lampau & belum done, ditampilkan di hari ini.
  // Termasuk task dari template (label badge dibedain: "Template kemarin belum eksekusi").
  const today = todayStr();
  const isCarryOver = STATE.selectedDate === today
    && t.date && t.date < today
    && t.status !== 'done';
  const carryoverHtml = isCarryOver ? (() => {
    const [y, m, d] = t.date.split('-');
    if (t.fromTemplateId) {
      // Task dari template harian/mingguan yang belum di-eksekusi kemarin → label khusus
      return `<span class="carryover-badge" style="background:#fde68a;color:#78350f;border-color:#f59e0b" title="Task dari template tanggal ${d}/${m} yang belum dieksekusi">📌 Template ${d}/${m} belum eksekusi</span>`;
    }
    return `<span class="carryover-badge" title="Task dijadwalkan tanggal ${d}/${m}, ke-rollover karena belum done">⏪ Carry-over dari ${d}/${m}</span>`;
  })() : '';

  // Shared badge — task bersama
  const sharedHtml = t.isShared
    ? `<span class="shared-badge" title="Tugas bersama — semua anggota tim bisa update">👥 Bersama</span>`
    : '';

  // v2.24: notCompleted badge — tampil kalau task ditandai tidak selesai (popup kendala dari card)
  const kendalaHtml = t.notCompleted
    ? `<span class="kendala-badge" title="Tidak selesai: ${escapeHtml((t.kendala || '').slice(0, 100))}">🚫 Tidak Selesai</span>`
    : '';

  // Project badge — tugas multi-hari
  let projectHtml = '';
  if (t.isProject) {
    const start = t.date;
    const end = t.dueDate || t.date;
    const fmtRange = (() => {
      const monthsId = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
      const [, sm, sd] = start.split('-');
      const [, em, ed] = end.split('-');
      if (sm === em) return `${parseInt(sd)}–${parseInt(ed)} ${monthsId[parseInt(sm)-1]}`;
      return `${parseInt(sd)} ${monthsId[parseInt(sm)-1]} – ${parseInt(ed)} ${monthsId[parseInt(em)-1]}`;
    })();
    // Sisa hari
    const todayDate = new Date(todayStr() + 'T00:00:00');
    const endDate = new Date(end + 'T00:00:00');
    const daysLeft = Math.round((endDate - todayDate) / (1000 * 60 * 60 * 24));
    const isOverdue = daysLeft < 0;
    const sisaTxt = isOverdue ? `lewat ${Math.abs(daysLeft)}h`
      : (daysLeft === 0 ? 'hari ini' : `${daysLeft}h lagi`);
    projectHtml = `<span class="project-badge ${isOverdue ? 'overdue' : ''}" title="Tugas proyek ${fmtRange}">📌 Proyek ${fmtRange} · ${sisaTxt}</span>`;
  }

  // Frequency badge — kalau task ter-generate dari template recurring
  let freqHtml = '';
  if (t.fromTemplateId) {
    // Cari template original untuk dapat frequency
    const tpl = STATE.templates.find(tp => tp.id === t.fromTemplateId);
    const freq = tpl?.frequency;
    const freqMap = {
      daily:   { cls: 'daily',   txt: '🗓️ Harian' },
      weekly:  { cls: 'weekly',  txt: '📆 Mingguan' },
      monthly: { cls: 'monthly', txt: '📅 Bulanan' },
    };
    if (freq && freqMap[freq]) {
      const fm = freqMap[freq];
      freqHtml = `<span class="freq-badge ${fm.cls}" title="Dari template: ${escapeHtml(t.fromTemplateName || tpl.name)}">${fm.txt}</span>`;
    } else if (t.fromTemplateName) {
      freqHtml = `<span class="freq-badge daily" title="Dari template: ${escapeHtml(t.fromTemplateName)}">📋 ${escapeHtml(t.fromTemplateName)}</span>`;
    }
  }

  // Labels
  const taskLabels = (t.labelIds || [])
    .map(id => STATE.labels.find(l => l.id === id))
    .filter(Boolean);
  const labelsHtml = taskLabels.length > 0 ? `
    <div class="label-chip-row">
      ${taskLabels.map(l => `<span class="label-chip" style="background:${l.color}">${escapeHtml(l.name)}</span>`).join('')}
    </div>
  ` : '';

  // Due date badge
  const dueBadge = renderDueBadge(t);

  // Checklist progress
  const checklistInfo = computeChecklistTotal(t);
  const checklistBadge = checklistInfo.total > 0
    ? `<span title="${checklistInfo.done} dari ${checklistInfo.total} checklist selesai">☑️ ${checklistInfo.done}/${checklistInfo.total}</span>`
    : '';

  // Time tracking badge (kalau ada timeLog)
  const tMin = totalTimeMinutes(t);
  const tActive = activeTimerSession(t);
  const trackedTimeBadge = tMin > 0 || tActive
    ? `<span class="time-badge-card" title="Total waktu yang udah di-track">⏱️ ${tActive ? '⏵ ' : ''}${fmtMinutes(tMin)}</span>`
    : '';

  // Target counter badge — kalau task pakai mode target/counter
  const targetVal = Number(t.target) || 0;
  const progressCount = Number(t.progressCount) || 0;
  const targetBadge = targetVal > 0
    ? `<span class="target-badge ${progressCount >= targetVal ? 'done' : ''}" title="Terlaksana ${progressCount} dari target ${targetVal}">🎯 ${progressCount}/${targetVal}</span>`
    : '';

  // Time range badge — jam mulai & jam selesai
  const timeBadge = (t.startTime || t.endTime)
    ? `<span class="time-badge" title="Jadwal tugas">⏰ ${escapeHtml(t.startTime || '?')}${t.endTime ? ` – ${escapeHtml(t.endTime)}` : ''}</span>`
    : '';

  // Action buttons (conditional by status & permission)
  // v2.24: tombol "Tidak Selesai" ditambah di TODO & PROSES, supaya user bisa mark task gak bisa diselesaikan + isi alasan
  // v2.53: tombol Selesai disabled-look kalau ada checklist incomplete (validation di updateTaskStatus tetap final gate)
  const clkStats = checklistStats(t.checklists);
  const checklistBlocked = clkStats.hasChecklist && !clkStats.isComplete;
  const doneTitle = checklistBlocked
    ? `Tidak bisa selesai — checklist ${clkStats.done}/${clkStats.total}`
    : 'Tandai tugas selesai';
  const doneBtnClass = checklistBlocked ? 'btn btn-success is-blocked' : 'btn btn-success';
  let actionsHtml = '';
  if (!locked) {
    if (status === 'todo') {
      actionsHtml = `
        <button class="btn btn-accent" data-stop data-quick-action="proses:${t.id}">
          Kerjakan →
        </button>
        <button class="btn btn-ghost-soft btn-sm" data-stop data-mark-notdone="${t.id}" title="Tandai task tidak selesai + isi alasan">
          ✗ Tidak Selesai
        </button>
      `;
    } else if (status === 'proses') {
      actionsHtml = `
        <button class="btn btn-ghost-soft" data-stop data-quick-action="todo:${t.id}">
          ↺ Batal
        </button>
        <button class="${doneBtnClass}" data-stop data-quick-action="done:${t.id}" title="${doneTitle}">
          ✓ Selesai${checklistBlocked ? ` <span style="font-size:10px;opacity:.85;font-weight:500">(${clkStats.done}/${clkStats.total})</span>` : ''}
        </button>
        <button class="btn btn-ghost-soft btn-sm" data-stop data-mark-notdone="${t.id}" title="Tandai task tidak selesai + isi alasan">
          ✗ Tidak Selesai
        </button>
      `;
    } else if (status === 'done') {
      actionsHtml = `
        <button class="btn btn-ghost-soft" data-stop data-quick-action="proses:${t.id}">
          ↺ Batal Selesai
        </button>
      `;
    }
  }

  return `
    <div class="task-card col-${status} ${locked ? 'task-locked' : ''}" data-task-id="${t.id}">
      <div class="task-card-body" data-card-body>
        ${carryoverHtml}${projectHtml}${sharedHtml}${freqHtml}${kendalaHtml}
        ${categoryHtml}
        ${labelsHtml}
        <div class="task-card-title">${escapeHtml(t.title)}</div>
        ${desc}
        <div class="task-card-progress">
          <div class="task-card-progress-track">
            <div class="task-card-progress-fill ${fillClass}" style="width:${progress}%"></div>
          </div>
          <span class="task-card-progress-label">${progress}%</span>
        </div>
        <div class="task-card-meta">
          <span class="task-card-assignee">
            ${avatarHtml(assigneeName)} ${escapeHtml(assigneeName)}
          </span>
          ${timeBadge}
          ${trackedTimeBadge}
          ${dueBadge}
          ${targetBadge}
          ${checklistBadge}
          ${commentCount ? `<span class="task-card-comments-badge">💬 ${commentCount}</span>` : ''}
          <button class="task-card-history-btn" data-stop data-history="${t.id}" title="Riwayat Pengerjaan">🕐</button>
        </div>
      </div>
      ${actionsHtml ? `<div class="task-card-actions">${actionsHtml}</div>` : ''}
    </div>
  `;
}

function computeChecklistTotal(task) {
  let done = 0, total = 0;
  (task.checklists || []).forEach(cl => {
    (cl.items || []).forEach(it => { total++; if (it.done) done++; });
  });
  return { done, total };
}

function renderDueBadge(task) {
  if (!task.dueDate) return '';
  const today = todayStr();
  const cls = task.status === 'done'
    ? 'done'
    : (task.dueDate < today ? 'overdue' : (task.dueDate === today ? 'today' : 'soon'));
  // Format human-readable
  const [y, m, d] = task.dueDate.split('-');
  const label = `${d}/${m}`;
  return `<span class="due-badge ${cls}" title="Deadline: ${task.dueDate}">📅 ${label}</span>`;
}

    <div class="form-group">

      ${STATE.labels.length > 0 ? `
        <div class="chip-row" id="t-labels-row">

            <button type="button" class="label-toggle ${initialLabelIds.includes(l.id) ? 'active' : ''}"
              data-toggle-label="${l.id}" style="color:${l.color}" ${disabledAttr}>

        </div>
      `}

  // Checklists section
  const checklistsSection = `
    <div class="form-group">
      <label class="label">Checklist</label>
      <div id="t-checklists-root">${renderChecklistsEditor(initialChecklists, readOnly)}</div>

    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:10px;flex:1">

        </div>
        ${readOnly ? `<span class="readonly-badge">🔒 Read-only — bukan task kamu</span>` : ''}
      </div>
      <button class="modal-close" data-close-modal>×</button>
    </div>
    <div class="modal-body">
      ${templatePicker}
      <div class="form-group">
        <label class="label">Judul Tugas</label>
        <input id="t-title" class="input" placeholder="Mis: Review ROAS iklan minggu ini" value="${escapeHtml(initialTitle)}" autocomplete="off" ${disabledAttr}>
      </div>
      ${categorySection}
      ${labelsSection}
      <div class="form-group">
        <label class="label">Deskripsi (opsional)</label>
        <textarea id="t-desc" class="textarea" placeholder="Detail tugas..." ${disabledAttr}>${escapeHtml(initialDesc)}</textarea>
      </div>
      <div class="form-group">
        ${renderProgressControl(task?.progress ?? presets.progress ?? 0, initialTarget, initialProgressCount, readOnly)}
      </div>

      ${isEdit ? renderTimeTracker(task) : ''}

      <div class="form-group">
        <label class="label">Pelaksana ${initialIsShared ? '<span style="color:var(--text-muted);font-weight:400">(opsional kalau bersama)</span>' : ''}</label>
        <select id="t-assignee" class="select" ${canChangeAssignee ? '' : 'disabled'}>${memberOpts}</select>
      </div>

      <!-- Tugas Proyek toggle -->
      <div class="form-group" style="padding:12px 14px;background:${initialIsProject ? '#ede9fe' : 'var(--bg-col)'};border-radius:var(--radius);transition:background .2s" id="t-project-wrap">
        <label style="display:flex;align-items:center;gap:10px;cursor:${readOnly ? 'default' : 'pointer'};font-weight:600;font-size:13px">
          <input type="checkbox" id="t-project" ${initialIsProject ? 'checked' : ''} ${readOnly ? 'disabled' : ''} style="width:16px;height:16px;cursor:inherit;accent-color:#6b21a8">
          📌 Tugas Proyek (multi-hari)
        </label>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;padding-left:26px">
          Kalau dicentang, task muncul di kanban setiap hari dalam range Tanggal Mulai - Tanggal Selesai (kecuali sudah done).
        </div>
      </div>

      <!-- Tanggal: 2 mode — single date (task biasa) ATAU range (proyek) -->
      <div id="t-date-single-wrap" class="form-group" style="display:${initialIsProject ? 'none' : 'block'}">
        <label class="label">Tanggal Aktif</label>
        <input type="date" id="t-date" class="input" value="${task?.date || STATE.selectedDate}" ${disabledAttr}>
      </div>
      <div id="t-date-range-wrap" style="display:${initialIsProject ? 'grid' : 'none'};grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group">
          <label class="label">📆 Tanggal Mulai</label>
          <input type="date" id="t-date-range" class="input" value="${task?.date || STATE.selectedDate}" ${disabledAttr}>
        </div>
        <div class="form-group">
          <label class="label">📆 Tanggal Selesai</label>
          <input type="date" id="t-due-range" class="input" value="${initialDueDate || task?.date || STATE.selectedDate}" ${disabledAttr}>
        </div>
      </div>

      <div class="form-group" style="padding:12px 14px;background:${initialIsShared ? 'var(--success-light)' : 'var(--bg-col)'};border-radius:var(--radius);transition:background .2s" id="t-shared-wrap">
        <label style="display:flex;align-items:center;gap:10px;cursor:${readOnly ? 'default' : 'pointer'};font-weight:600;font-size:13px">
          <input type="checkbox" id="t-shared" ${initialIsShared ? 'checked' : ''} ${readOnly ? 'disabled' : ''} style="width:16px;height:16px;cursor:inherit;accent-color:var(--success)">
          👥 Tugas Bersama
        </label>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;padding-left:26px">
          Kalau dicentang, task muncul di kanban semua anggota tim dan siapa pun bisa update progress.
        </div>
      </div>

      <div id="t-jam-deadline-grid" style="display:grid;grid-template-columns:${initialIsProject ? '1fr 1fr' : '1fr 1fr 1fr'};gap:10px">
        <div class="form-group">
          <label class="label">Jam Mulai (opsional)</label>
          <input type="time" id="t-start-time" class="input" value="${initialStartTime}" ${disabledAttr}>
        </div>
        <div class="form-group">
          <label class="label">Jam Selesai (opsional)</label>
          <input type="time" id="t-end-time" class="input" value="${initialEndTime}" ${disabledAttr}>
        </div>
        <div class="form-group" id="t-due-single-wrap" style="display:${initialIsProject ? 'none' : 'block'}">
          <label class="label">Deadline (opsional)</label>
          <input type="date" id="t-due" class="input" value="${initialDueDate}" ${disabledAttr}>
        </div>
      </div>

      ${checklistsSection}

      ${task?.notCompleted ? (() => {
        const isAdmin = me?.role === 'admin';
        return `
        <div class="form-group">
          <label class="label" style="color:var(--danger)">🚫 Tugas Ditandai Tidak Selesai</label>
          <div style="background:#fef2f2;border-left:3px solid #dc2626;padding:10px 12px;border-radius:6px;color:#991b1b;font-size:13px;line-height:1.5">
            <strong>Alasan:</strong> ${escapeHtml(task.kendala || '(tidak ada catatan)')}
            ${task.notCompletedAt ? `<div style="font-size:11px;color:#7f1d1d;margin-top:6px">Ditandai pada ${new Date(task.notCompletedAt).toLocaleString('id-ID')}</div>` : ''}
            <div style="margin-top:8px">
              ${isAdmin
                ? `<button class="btn btn-sm btn-ghost" id="t-clear-notdone" type="button" ${disabledAttr}>↺ Kembalikan ke Kanban</button>`
                : `<div style="font-size:11px;color:#7f1d1d;font-style:italic">🔒 Hanya admin yang bisa kembalikan task ini ke kanban.</div>`
              }
            </div>
          </div>
        </div>
        `;
      })() : ''}

      ${isEdit ? renderTaskMetaInfo(task) : ''}
      ${isEdit ? renderActivitySection(task) : ''}
      ${isEdit ? renderCommentsSection(task) : ''}
    </div>
    <div class="modal-footer">
      ${isEdit && canDelete ? `<button class="btn btn-danger" id="t-delete" style="margin-right:auto">Hapus</button>` : ''}
      <button class="btn btn-ghost" data-close-modal>${readOnly ? 'Tutup' : 'Batal'}</button>
      ${readOnly ? '' : `<button class="btn btn-primary" id="t-save">${isEdit ? 'Simpan' : 'Buat Tugas'}</button>`}
    </div>
  `;

  showModal(html, { size: 'lg' });

  // Read-only mode: no save handler, tetap bisa comment
  if (readOnly) {
    if (isEdit) bindCommentForm(task);
    if (isEdit) bindCommentDelete(task);
    return;
  }

  // Mutable state untuk modal (labels, checklists, category, target/counter, shared, project)
  const MODAL_STATE = {
    labelIds: [...initialLabelIds],
    checklists: JSON.parse(JSON.stringify(initialChecklists)),
    category: initialCategory,
    target: initialTarget,
    progressCount: initialProgressCount,
    isShared: initialIsShared,
    isProject: initialIsProject,
  };

  // Bind progress + target counter (slider/counter switch berdasarkan target value)
  bindProgressControl(MODAL_STATE, readOnly);

  bindCategorySelect(MODAL_STATE);
  bindLabelToggles(MODAL_STATE);
  bindChecklistEditor(MODAL_STATE, readOnly);
  bindTemplatePicker();

  // Bind shared checkbox
  const sharedCb = document.getElementById('t-shared');
  const sharedWrap = document.getElementById('t-shared-wrap');
  if (sharedCb && !readOnly) {
    sharedCb.addEventListener('change', () => {
      MODAL_STATE.isShared = sharedCb.checked;
      if (sharedWrap) sharedWrap.style.background = sharedCb.checked ? 'var(--success-light)' : 'var(--bg-col)';
    });
  }

  // Bind project checkbox — toggle date single ↔ range
  const projectCb = document.getElementById('t-project');
  const projectWrap = document.getElementById('t-project-wrap');
  const dateSingleWrap = document.getElementById('t-date-single-wrap');
  const dateRangeWrap = document.getElementById('t-date-range-wrap');
  const dueSingleWrap = document.getElementById('t-due-single-wrap');
  const jamDeadlineGrid = document.getElementById('t-jam-deadline-grid');
  if (projectCb && !readOnly) {
    projectCb.addEventListener('change', () => {
      MODAL_STATE.isProject = projectCb.checked;
      const on = projectCb.checked;
      if (projectWrap) projectWrap.style.background = on ? '#ede9fe' : 'var(--bg-col)';
      if (dateSingleWrap) dateSingleWrap.style.display = on ? 'none' : 'block';
      if (dateRangeWrap) dateRangeWrap.style.display = on ? 'grid' : 'none';
      if (dueSingleWrap) dueSingleWrap.style.display = on ? 'none' : 'block';
      if (jamDeadlineGrid) jamDeadlineGrid.style.gridTemplateColumns = on ? '1fr 1fr' : '1fr 1fr 1fr';
      // Sync values between single & range inputs
      if (on) {
        const dRange = document.getElementById('t-date-range');
        const dueRange = document.getElementById('t-due-range');
        const dSingle = document.getElementById('t-date');
        if (dRange && dSingle && !dRange.value) dRange.value = dSingle.value;
        if (dueRange && dRange && !dueRange.value) dueRange.value = dRange.value;
      } else {
        const dSingle = document.getElementById('t-date');
        const dRange = document.getElementById('t-date-range');
        if (dSingle && dRange && dRange.value) dSingle.value = dRange.value;
      }
    });
  }

  document.getElementById('t-save').addEventListener('click', async () => {
    const title = document.getElementById('t-title').value.trim();
    const desc = document.getElementById('t-desc').value.trim();
    const sliderEl = document.getElementById('t-progress');
    const sliderProgress = sliderEl ? (Number(sliderEl.value) || 0) : 0;
    const target = Number(MODAL_STATE.target) || 0;
    const progressCount = Number(MODAL_STATE.progressCount) || 0;
    // Kalau target > 0, derive progress dari counter; else pakai slider
    let progress = target > 0
      ? Math.min(100, Math.round(progressCount * 100 / target))
      : sliderProgress;
    let status = progressToStatus(progress);
    const assigneeId = document.getElementById('t-assignee').value;
    const isProject = !!MODAL_STATE.isProject;
    // Date logic: kalau project, pakai range; else pakai single + optional dueDate
    let date, dueDate;
    if (isProject) {
      date = document.getElementById('t-date-range').value;
      dueDate = document.getElementById('t-due-range').value || date;
      if (dueDate < date) {
        toast('Tanggal Selesai harus >= Tanggal Mulai', 'error'); return;
      }
    } else {
      date = document.getElementById('t-date').value;
      dueDate = document.getElementById('t-due').value || null;
    }
    const startTime = document.getElementById('t-start-time').value || null;
    const endTime = document.getElementById('t-end-time').value || null;
    if (!title) { toast('Judul wajib diisi', 'error'); return; }
    if (!date) { toast('Tanggal wajib diisi', 'error'); return; }
    if (!MODAL_STATE.category) { toast('Pilih kategori tugas (Iklan / Branding / Event / CRM)', 'error'); return; }
    const assignee = STATE.members.find(m => m.id === assigneeId);
    if (!assignee) { toast('Pelaksana tidak valid', 'error'); return; }

    // Auto-sync progress kalau ada checklist (hanya kalau gak pakai target)
    const cInfo = computeChecklistTotalArr(MODAL_STATE.checklists);
    let finalProgress = progress;
    if (target === 0 && cInfo.total > 0 && (cInfo.done === cInfo.total) && progress < 100) {
      // Semua checklist done → set progress 100 kalau user belum naikin
      finalProgress = 100;
      status = 'done';
    }
    // v2.53 — Enforce: kalau status='done' tapi checklist belum komplit, BLOCK save.
    // Auto-downgrade ke 'proses' + warn user. Better: hard reject biar gak ambigu.
    if (status === 'done') {
      const v = validateChecklistDone(MODAL_STATE.checklists);
      if (!v.ok) {
        toast(v.message, 'error');
        return;
      }
    }
    try {
      if (isEdit) {
        const update = {
          title, description: desc, status, progress: finalProgress, date, dueDate,
          startTime, endTime,
          target, progressCount,
          assigneeId, assigneeName: assignee.name,
          isShared: !!MODAL_STATE.isShared,
          isProject: !!isProject,
          category: MODAL_STATE.category,
          labelIds: MODAL_STATE.labelIds,
          checklists: MODAL_STATE.checklists,
          updatedAt: serverTimestamp(),
        };
        // Activity log
        const activity = task.activity || [];
        const newActivities = diffActivities(task, update, me);
        if (newActivities.length > 0) update.activity = [...activity, ...newActivities];
        if (status === 'done' && task.status !== 'done') update.completedAt = serverTimestamp();
        if (status !== 'done' && task.status === 'done') update.completedAt = null;
        // v2.24: AUTO TIME TRACK saat status berubah dari modal
        const tt = applyAutoTimeTrack(task, task.status, status, me.id, me.name);
        if (tt) update.timeLog = tt.timeLog;
        await updateDoc(doc(STATE.db, 'tasks', task.id), update);
        toast('Tugas tersimpan', 'success');
      } else {
        await addDoc(collection(STATE.db, 'tasks'), {
          title, description: desc, status, progress: finalProgress, date, dueDate,
          startTime, endTime,
          target, progressCount,
          assigneeId, assigneeName: assignee.name,
          isShared: !!MODAL_STATE.isShared,
          isProject: !!isProject,
          boardId: STATE.currentBoardId,
          category: MODAL_STATE.category,
          labelIds: MODAL_STATE.labelIds,
          checklists: MODAL_STATE.checklists,
          createdById: me.id, createdByName: me.name,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          completedAt: status === 'done' ? serverTimestamp() : null,
          comments: [],
          activity: [{
            id: uid(), type: 'created', byId: me.id, byName: me.name,
            at: new Date().toISOString(),
          }],
        });
        toast('Tugas dibuat', 'success');
      }
      closeModal();
    } catch (err) {
      toast('Gagal simpan: ' + err.message, 'error');
    }
  });

  // v2.24: Tombol Start/Stop manual DIHAPUS — time tracking sekarang auto via status (proses=start, lain=stop).
  // Logic di applyAutoTimeTrack() + di-hook di updateTaskStatus + save handler modal.

  // v2.24: Tombol "Kerjakan Ulang" di section notCompleted (kalau task ditandai gak selesai)
  if (isEdit) {
    const clearNd = document.getElementById('t-clear-notdone');
    if (clearNd) {
      clearNd.addEventListener('click', async () => {
        if (!confirm('Kerjakan ulang task ini? Status balik ke TODO & flag tidak selesai dihapus.')) return;
        try {
          await updateDoc(doc(STATE.db, 'tasks', task.id), {
            notCompleted: false,
            kendala: null,
            notCompletedAt: null,
            status: 'todo',
            progress: 0,
            updatedAt: serverTimestamp(),
          });
          toast('Task dikerjakan ulang', 'success');
          closeModal();
        } catch (err) {
          toast('Gagal: ' + err.message, 'error');
        }
      });
    }
  }

  if (isEdit) {
    const delBtn = document.getElementById('t-delete');
    if (delBtn) {
      delBtn.addEventListener('click', async () => {
        const isFromTemplate = !!task.fromTemplateId;
        const confirmMsg = isFromTemplate
          ? `Hapus tugas "${task.title}"?\n\n📌 Task ini dari template auto-harian. Hapus akan tandai task ini terhapus untuk HARI INI saja — template tetap generate task untuk hari berikutnya.`
          : `Hapus tugas "${task.title}"?`;
        if (!confirm(confirmMsg)) return;
        try {
          if (isFromTemplate) {
            // SOFT DELETE — supaya gak re-generate setelah refresh
            await updateDoc(doc(STATE.db, 'tasks', task.id), {
              isDeleted: true,
              deletedAt: serverTimestamp(),
              deletedById: STATE.currentMember.id,
              deletedByName: STATE.currentMember.name,
            });
          } else {
            // Hard delete untuk task manual non-template
            await deleteDoc(doc(STATE.db, 'tasks', task.id));
          }
          toast('Tugas dihapus', 'success');
          closeModal();
        } catch (err) {
          toast('Gagal hapus: ' + err.message, 'error');
        }
      });
    }

    // Comment form binding
    bindCommentForm(task);
    bindCommentDelete(task);
  }
}

// === Checklist helpers ===
function computeChecklistTotalArr(checklists) {
  let done = 0, total = 0;
  (checklists || []).forEach(cl => {
    (cl.items || []).forEach(it => { total++; if (it.done) done++; });
  });
  return { done, total };
}

function renderChecklistsEditor(checklists, readOnly) {
  if (!checklists || checklists.length === 0) {
    return readOnly
      ? '<div style="font-size:12px;color:var(--text-light);text-align:center;padding:8px">Tidak ada checklist</div>'
      : '';
  }
  return checklists.map((cl, ci) => {
    const items = cl.items || [];
    const done = items.filter(i => i.done).length;
    const total = items.length;
    const pct = total > 0 ? Math.round(done * 100 / total) : 0;
    return `
      <div class="checklist-block" data-cl-idx="${ci}">
        <div class="checklist-head">
          <input class="checklist-title" data-cl-title="${ci}" value="${escapeHtml(cl.title || '')}" placeholder="Judul checklist..." ${readOnly ? 'disabled' : ''}>
          <span class="checklist-progress">${done}/${total}</span>
          ${readOnly ? '' : `<button type="button" class="btn btn-ghost btn-sm" data-del-cl="${ci}" style="color:var(--danger)">✕</button>`}
        </div>
        <div class="checklist-progress-bar">
          <div class="checklist-progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="checklist-items">
          ${items.map((it, ii) => `
            <div class="checklist-item">
              <input type="checkbox" data-toggle-item="${ci}.${ii}" ${it.done ? 'checked' : ''} ${readOnly ? 'disabled' : ''}>
              <input class="checklist-item-text ${it.done ? 'checked' : ''}" data-item-text="${ci}.${ii}" value="${escapeHtml(it.text || '')}" placeholder="Item..." ${readOnly ? 'disabled' : ''}>
              ${readOnly ? '' : `<button type="button" class="checklist-item-delete" data-del-item="${ci}.${ii}">✕</button>`}
            </div>
          `).join('')}
        </div>
        ${readOnly ? '' : `<button type="button" class="checklist-add-btn" data-add-item="${ci}">+ Tambah Item</button>`}
      </div>
    `;
  }).join('');
}

function bindChecklistEditor(state, readOnly) {
  const root = document.getElementById('t-checklists-root');
  const addBtn = document.getElementById('t-add-checklist');
  if (!root) return;

  function refresh() {
    root.innerHTML = renderChecklistsEditor(state.checklists, readOnly);
    attachListeners();
  }

  function attachListeners() {
    if (readOnly) return;
    // Toggle item done
    root.querySelectorAll('[data-toggle-item]').forEach(cb => {
      cb.addEventListener('change', () => {
        const [ci, ii] = cb.dataset.toggleItem.split('.').map(Number);
        state.checklists[ci].items[ii].done = cb.checked;
        refresh();
      });
    });
    // Edit item text
    root.querySelectorAll('[data-item-text]').forEach(input => {
      input.addEventListener('input', () => {
        const [ci, ii] = input.dataset.itemText.split('.').map(Number);
        state.checklists[ci].items[ii].text = input.value;
      });
      // PASTE handler — kalau multi-line, auto-split jadi multiple items
      input.addEventListener('paste', (e) => {
        const text = (e.clipboardData || window.clipboardData)?.getData('text') || '';
        if (!/[\r\n]/.test(text)) return; // single line — biarkan default
        e.preventDefault();
        const [ci, ii] = input.dataset.itemText.split('.').map(Number);
        const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
        if (lines.length === 0) return;
        const items = state.checklists[ci].items;
        // Line 0: replace current item (kalau ada cursor selection, gunakan saja line 0 full)
        items[ii].text = lines[0];
        // Line 1..N: insert items baru setelah current
        for (let k = 1; k < lines.length; k++) {
          items.splice(ii + k, 0, { id: uid(), text: lines[k], done: false });
        }
        refresh();
        // Focus item terakhir yang baru di-insert
        setTimeout(() => {
          const inputs = root.querySelectorAll(`[data-cl-idx="${ci}"] [data-item-text]`);
          const lastIdx = ii + lines.length - 1;
          if (inputs[lastIdx]) inputs[lastIdx].focus();
        }, 50);
        toast(`${lines.length} item ditambahkan dari paste`, 'success');
      });
    });
    // Edit checklist title
    root.querySelectorAll('[data-cl-title]').forEach(input => {
      input.addEventListener('input', () => {
        const ci = Number(input.dataset.clTitle);
        state.checklists[ci].title = input.value;
      });
    });
    // Delete checklist
    root.querySelectorAll('[data-del-cl]').forEach(btn => {
      btn.addEventListener('click', () => {
        const ci = Number(btn.dataset.delCl);
        if (!confirm('Hapus checklist ini?')) return;
        state.checklists.splice(ci, 1);
        refresh();
      });
    });
    // Delete item
    root.querySelectorAll('[data-del-item]').forEach(btn => {
      btn.addEventListener('click', () => {
        const [ci, ii] = btn.dataset.delItem.split('.').map(Number);
        state.checklists[ci].items.splice(ii, 1);
        refresh();
      });
    });
    // Add item
    root.querySelectorAll('[data-add-item]').forEach(btn => {
      btn.addEventListener('click', () => {
        const ci = Number(btn.dataset.addItem);
        state.checklists[ci].items.push({ id: uid(), text: '', done: false });
        refresh();
        // Focus the new item input
        setTimeout(() => {
          const inputs = root.querySelectorAll(`[data-cl-idx="${ci}"] [data-item-text]`);
          if (inputs.length) inputs[inputs.length - 1].focus();
        }, 50);
      });
    });
  }

  if (addBtn) {
    addBtn.addEventListener('click', () => {
      state.checklists.push({ id: uid(), title: 'Checklist', items: [] });
      refresh();
    });
  }
  attachListeners();
}

function bindCategorySelect(state) {
  document.querySelectorAll('[data-category]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      state.category = btn.dataset.category;
      document.querySelectorAll('[data-category]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

function bindLabelToggles(state) {
  document.querySelectorAll('[data-toggle-label]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      const id = btn.dataset.toggleLabel;
      const idx = state.labelIds.indexOf(id);
      if (idx === -1) {
        state.labelIds.push(id);
        btn.classList.add('active');
      } else {
        state.labelIds.splice(idx, 1);
        btn.classList.remove('active');
      }

}

function bindTemplatePicker() {

  if (!sel) return;

    if (!id) return;
    const tpl = STATE.templates.find(t => t.id === id);

// === Activity helpers ===
function diffActivities(oldTask, newTask, me) {
  const news = [];
  const ts = new Date().toISOString();
  const oldP = Number(oldTask.progress) || 0;
  const newP = Number(newTask.progress) || 0;
  if (oldP !== newP) {
    news.push({
      id: uid(), type: 'progress_changed',
      byId: me.id, byName: me.name, at: ts,
      from: oldP, to: newP,
    });
  }
  if ((oldTask.assigneeId || '') !== (newTask.assigneeId || '')) {
    news.push({
      id: uid(), type: 'assignee_changed',
      byId: me.id, byName: me.name, at: ts,
      from: oldTask.assigneeName, to: newTask.assigneeName,
    });
  }
  if (oldTask.status !== newTask.status) {
    news.push({
      id: uid(), type: 'status_changed',
      byId: me.id, byName: me.name, at: ts,
      from: oldTask.status, to: newTask.status,
    });
  }
  return news;
}

function renderActivitySection(task) {
  const activity = task.activity || [];
  if (activity.length === 0) return '';
  const items = activity.slice().reverse().slice(0, 30).map(a => {
    let text = '';
    switch (a.type) {
      case 'created': text = 'membuat tugas ini'; break;
      case 'status_changed': text = `ubah status dari <strong>${a.from || '?'}</strong> ke <strong>${a.to}</strong>`; break;
      case 'progress_changed': text = `update progress dari <strong>${a.from}%</strong> ke <strong>${a.to}%</strong>`; break;
      case 'assignee_changed': text = `pindah pelaksana dari <strong>${escapeHtml(a.from || '?')}</strong> ke <strong>${escapeHtml(a.to || '?')}</strong>`; break;
      case 'completed': text = 'tandai selesai'; break;
      case 'marked_not_completed': text = `tandai <strong>tidak selesai</strong> — alasan: <em>${escapeHtml((a.reason || '').slice(0, 100))}</em>`; break;
      case 'restored_from_not_completed': text = `<strong>kembalikan task ke kanban</strong> (tidak setuju hapus / cancel mark not selesai)`; break;
      case 'task_deleted': text = `<strong>hapus task permanen</strong>${a.reason ? ` — sisa alasan: <em>${escapeHtml((a.reason || '').slice(0, 100))}</em>` : ''}`; break;
      case 'moved_via_preview': text = `<strong>pindah jadwal</strong> dari <code>${escapeHtml(a.from || '?')}</code> ke <code>${escapeHtml(a.to || '?')}</code> via Preview Tugas Mendatang`; break;
      default: text = a.type;
    }
    const icon = a.type === 'progress_changed' ? '📊'
      : a.type === 'status_changed' ? '🔄'
      : a.type === 'assignee_changed' ? '👤'
      : a.type === 'marked_not_completed' ? '🚫'
      : a.type === 'restored_from_not_completed' ? '↺'
      : a.type === 'task_deleted' ? '🗑️'
      : a.type === 'moved_via_preview' ? '🔀'
      : '✨';
    return `
      <div class="activity-item">
        <div class="activity-icon">${icon}</div>
        <div class="activity-content">
          <span class="activity-actor">${escapeHtml(a.byName || '?')}</span> ${text}
          <div class="activity-time">${timeAgo(a.at)}</div>
        </div>
      </div>
    `;
  }).join('');
  return `
    <div class="comments-section">
      <div class="comments-title">📜 Riwayat Aktivitas</div>
      <div class="activity-list">${items}</div>
    </div>
  `;
}

function bindProgressControl(modalState, readOnly) {
  const slider = document.getElementById('t-progress');
  const valEl = document.getElementById('t-prog-value');
  const hintEl = document.getElementById('t-prog-status-hint');
  const targetInput = document.getElementById('t-target');
  const countInput = document.getElementById('t-progress-count');
  const targetMinus = document.getElementById('t-target-minus');
  const targetPlus = document.getElementById('t-target-plus');
  const targetDisplay = document.getElementById('t-target-display');

  function computeProgressFromCount() {
    const target = Number(modalState.target) || 0;
    const count = Number(modalState.progressCount) || 0;
    if (target <= 0) return null;
    const pct = Math.min(100, Math.round(count * 100 / target));
    return pct;
  }

  function refreshDisplay() {
    const target = Number(modalState.target) || 0;
    const count = Number(modalState.progressCount) || 0;
    const useCounter = target > 0;
    const pct = useCounter ? computeProgressFromCount() : (slider ? Number(slider.value) || 0 : 0);

    if (valEl) {
      valEl.textContent = `${pct}%`;
      valEl.className = `progress-control-value ${progressFillClass(pct)}`;
    }
    if (hintEl) {
      const autoStatus = progressToStatus(pct);
      let baseTxt = useCounter
        ? `${count} / ${target} tercapai · status auto: ${autoStatus.toUpperCase()}`
        : `Status auto: ${autoStatus.toUpperCase()}`;
      hintEl.textContent = baseTxt;
      hintEl.style.color = '';
      // v2.53 — Warning kalau status calculated DONE tapi checklist belum komplit
      if (autoStatus === 'done') {
        const v = validateChecklistDone(modalState.checklists);
        if (!v.ok) {
          hintEl.textContent = `${baseTxt} · ⚠️ checklist ${v.done}/${v.total} — save akan ditolak`;
          hintEl.style.color = '#dc2626';
        }
      }
    }
    // Sync slider visibility based on target mode
    const sliderWrap = document.getElementById('t-slider-wrap');
    const counterWrap = document.getElementById('t-counter-wrap');
    if (sliderWrap) sliderWrap.style.display = useCounter ? 'none' : 'block';
    if (counterWrap) counterWrap.style.display = useCounter ? 'flex' : 'none';
    // Display target counter value
    if (targetDisplay) {
      targetDisplay.textContent = `${count} / ${target || '∞'}`;
      targetDisplay.classList.toggle('done', count >= target && target > 0);
    }
    // Update quick buttons (slider mode only)
    if (!useCounter) {
      document.querySelectorAll('[data-progress-set]').forEach(btn => {
        btn.classList.toggle('active', Number(btn.dataset.progressSet) === pct);
      });
    }
    // Disable +/- kalau read-only or limit reached
    if (targetMinus) targetMinus.disabled = readOnly || count <= 0;
    if (targetPlus) targetPlus.disabled = readOnly || (target > 0 && count >= target);
  }

  if (slider) slider.addEventListener('input', () => refreshDisplay());
  document.querySelectorAll('[data-progress-set]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      if (slider) slider.value = btn.dataset.progressSet;
      refreshDisplay();
    });
  });

  if (targetInput) {
    targetInput.addEventListener('input', () => {
      let v = parseInt(targetInput.value, 10);
      if (isNaN(v) || v < 0) v = 0;
      modalState.target = v;
      // Kalau target dikurangi di bawah progressCount, clamp progressCount
      if (v > 0 && modalState.progressCount > v) modalState.progressCount = v;
      if (countInput) countInput.value = modalState.progressCount;
      if (countInput) countInput.max = v || '';
      refreshDisplay();
    });
  }
  if (countInput) {
    countInput.addEventListener('input', () => {
      let v = parseInt(countInput.value, 10);
      if (isNaN(v) || v < 0) v = 0;
      const target = Number(modalState.target) || 0;
      if (target > 0 && v > target) v = target;
      modalState.progressCount = v;
      refreshDisplay();
    });
  }
  if (targetMinus) {
    targetMinus.addEventListener('click', () => {
      if (readOnly) return;
      modalState.progressCount = Math.max(0, (Number(modalState.progressCount) || 0) - 1);
      if (countInput) countInput.value = modalState.progressCount;
      refreshDisplay();
    });
  }
  if (targetPlus) {
    targetPlus.addEventListener('click', () => {
      if (readOnly) return;
      const target = Number(modalState.target) || 0;
      let next = (Number(modalState.progressCount) || 0) + 1;
      if (target > 0 && next > target) next = target;
      modalState.progressCount = next;
      if (countInput) countInput.value = modalState.progressCount;
      refreshDisplay();
    });
  }

  refreshDisplay();
}

          </div>

      </div>

      <!-- Target field — kalau diisi, mode counter aktif -->

        </div>

      <!-- Counter mode (visible kalau target > 0) -->

        <label>Terlaksana</label>
        <button type="button" class="target-step-btn" id="t-target-minus" ${readOnly ? 'disabled' : ''}>−</button>
        <div class="target-input-group">
          <input type="number" id="t-progress-count" min="0" max="${target || ''}" value="${count}" ${readOnly ? 'disabled' : ''}>
        </div>
        <button type="button" class="target-step-btn" id="t-target-plus" ${readOnly ? 'disabled' : ''}>+</button>

      <!-- Slider mode (visible kalau target = 0) -->
      <div id="t-slider-wrap" style="display:${useCounter ? 'none' : 'block'}">
        <input type="range" id="t-progress" class="progress-slider" min="0" max="100" step="5" value="${p}" ${readOnly ? 'disabled' : ''}>
        <div class="progress-quick-row">
          ${[0, 25, 50, 75, 100].map(qp =>
            `<button type="button" class="progress-quick-btn ${p === qp ? 'active' : ''}" data-progress-set="${qp}" ${readOnly ? 'disabled' : ''}>${qp}%</button>`
          ).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderTimeTracker(task) {
  const total = totalTimeMinutes(task);
  const active = activeTimerSession(task); // session aktif by current member
  const log = task?.timeLog || [];
  const me = STATE.currentMember;
  // v2.23: deteksi session running by orang lain (info-only)
  const otherActive = (log || []).filter(s => s.startedAt && !s.endedAt && (!me || s.memberId !== me.id));
  // Only show button kalau user bisa edit task
  const canTrack = canEditTask(task);

  const sessions = log.slice().reverse().slice(0, 10).map(s => {
    const dur = s.duration
      ? Math.round(s.duration / 60000)
      : (s.startedAt && s.endedAt ? Math.round((s.endedAt - s.startedAt) / 60000) : 0);
    const startD = s.startedAt ? new Date(s.startedAt) : null;
    const dateStr = startD ? `${String(startD.getDate()).padStart(2,'0')}/${String(startD.getMonth()+1).padStart(2,'0')} ${String(startD.getHours()).padStart(2,'0')}:${String(startD.getMinutes()).padStart(2,'0')}` : '';
    return `
      <div class="time-tracker-session">
        <span>${escapeHtml(s.memberName || '?')} · ${dateStr}</span>
        <span style="font-family:var(--font-mono);font-weight:600">${dur > 0 ? fmtMinutes(dur) : (s.endedAt ? '0m' : '⏵ running')}</span>
      </div>
    `;
  }).join('');

  // v2.24: AUTO mode — gak ada tombol Start/Stop manual lagi. Timer jalan otomatis
  // saat task PROSES, stop otomatis saat status berubah. Tampilan info-only.
  return `
    <div class="form-group">
      <label class="label">⏱️ Time Tracker (otomatis)</label>
      <div class="time-tracker-box">

function bindCommentForm(task) {
  const btn = document.getElementById('comment-submit');
  const input = document.getElementById('comment-input');
  if (!btn || !input) return;
  // v2.24: @mention picker
  setupMentionPicker(input);
  btn.addEventListener('click', async () => {
    const text = input.value.trim();
    if (!text) return;
    const me = STATE.currentMember;
    // v2.22: parse mentions di comment
    const { mentionedIds } = parseMentions(text);
    const newComment = {
      id: uid(),
      authorId: me.id,
      authorName: me.name,
      text,
      mentions: mentionedIds,
      createdAt: new Date().toISOString(),
    };
    // v2.25: warn kalau @ ada tapi gak match
    if (text.includes('@') && mentionedIds.length === 0) {
      const memberList = (STATE.members || []).map(m => m.name).join(', ');
      console.warn('[mention] @ ditemukan di comment tapi tidak match member apapun.\nMember yg ada:', memberList);
    }
    try {
      await updateDoc(doc(STATE.db, 'tasks', task.id), {
        comments: arrayUnion(newComment),
        updatedAt: serverTimestamp(),
      });
      input.value = '';
      // v2.25: feedback mention sukses
      if (mentionedIds.length > 0) {
        const names = mentionedIds
          .map(id => (STATE.members || []).find(m => m.id === id)?.name)
          .filter(Boolean).join(', ');
        toast(`Comment terkirim · 📌 Mention ke ${names}`, 'success');
      } else {
        toast('Comment terkirim', 'success');
      }
      // Re-render comments via state refresh — listener will update
      // But also update local task for immediate UX
      task.comments = [...(task.comments || []), newComment];
      // FIX v2.17: pakai DOM API + temp div, tidak regex (anti-crash kalau structure berubah)
      const list = document.getElementById('comments-list');
      if (list) {
        const tmp = document.createElement('div');
        tmp.innerHTML = renderCommentsSection(task);

          list.replaceWith(newList);

      toast('Gagal kirim: ' + err.message, 'error');

function bindCommentDelete(task) {
  document.querySelectorAll('[data-del-comment]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.delComment, 10);
      const target = (task.comments || [])[idx];
      if (!target) return;
      if (!confirm('Hapus comment ini?')) return;
      try {
        // v2.23: pakai fresh task dari STATE + filter by comment id (lebih reliable dari arrayRemove
        // yang butuh exact field match — kalau ada field tambahan dari Firestore, gak match)
        const fresh = STATE.tasks.find(t => t.id === task.id) || task;
        const cid = target.id;
        let updatedComments;
        if (cid) {
          updatedComments = (fresh.comments || []).filter(c => c.id !== cid);
        } else {
          // fallback ke arrayRemove kalau comment lama gak punya id
          updatedComments = null;
        }
        await updateDoc(doc(STATE.db, 'tasks', task.id), {
          comments: updatedComments !== null ? updatedComments : arrayRemove(target),
          updatedAt: serverTimestamp(),
        });
        toast('Comment dihapus', 'success');
      } catch (err) {
        toast('Gagal hapus: ' + err.message, 'error');
      }
    });
  });
}

async function updateTaskStatus(taskId, newStatus) {
  const task = STATE.tasks.find(t => t.id === taskId);
  if (!task) return;
  // v2.53 — Enforce: task ber-checklist tidak boleh done kalau centang < 100%
  if (newStatus === 'done') {
    const v = validateChecklistDone(task.checklists);
    if (!v.ok) {
      toast(v.message, 'error');
      return;
    }
  }
  const me = STATE.currentMember;
  const newProgress = statusToProgress(newStatus, task.progress);
  const update = {
    status: newStatus,
    progress: newProgress,
    updatedAt: serverTimestamp(),
  };
  if (newStatus === 'done' && task.status !== 'done') update.completedAt = serverTimestamp();
  if (newStatus !== 'done' && task.status === 'done') update.completedAt = null;
  // v2.24: kalau task ditandai selesai (done), clear flag notCompleted + kendala (assume udah resolve)
  if (newStatus === 'done') {
    if (task.notCompleted) update.notCompleted = false;
    if (task.kendala) update.kendala = null;
  }
  // v2.24: AUTO TIME TRACK — kalau status berubah proses↔non-proses, sync timeLog
  const tt = applyAutoTimeTrack(task, task.status, newStatus, me?.id, me?.name);
  if (tt) update.timeLog = tt.timeLog;

  // Activity log
  const ts = new Date().toISOString();
  const newActivities = [];
  if (task.status !== newStatus) {
    newActivities.push({
      id: uid(), type: 'status_changed',
      byId: me.id, byName: me.name, at: ts,
      from: task.status, to: newStatus,
    });
  }
  if ((task.progress || 0) !== newProgress) {
    newActivities.push({
      id: uid(), type: 'progress_changed',
      byId: me.id, byName: me.name, at: ts,
      from: task.progress || 0, to: newProgress,
    });
  }
  if (newActivities.length > 0) {
    update.activity = [...(task.activity || []), ...newActivities];
  }

  try {
    await updateDoc(doc(STATE.db, 'tasks', taskId), update);
  } catch (err) {
    toast('Gagal update: ' + err.message, 'error');
  }
}

// Collect semua task (real + virtual template forecast) untuk tanggal tertentu, member filter
// v2.41: pakai logic LANGSUNG (gak via isTaskActiveOnDay) karena helper itu bias ke "active hingga today"
// untuk pending task. Preview mau lihat task yg scheduled di tanggal target (apapun statusnya).
function previewCollectTasks(targetDate, memberFilter) {
  const today = todayStr();
  const tasks = [];
  (STATE.tasks || []).forEach(t => {
    if (t.isDeleted === true || t.notCompleted === true) return;
    if (memberFilter && t.assigneeId !== memberFilter && !(t.isShared === true)) return;
    let isRelevant = false;
    if (t.isProject) {
      // Project: target di range [date, dueDate]
      const start = t.date || '';
      const end = t.dueDate || t.date || '';
      if (start && targetDate >= start && targetDate <= end) {
        // Skip kalau project sudah done sebelum target (gak ada kerjaan lagi)
        if (t.status === 'done' && t.completedAt) {
          const cd = tsToLocalDateStr(t.completedAt);
          if (cd && targetDate > cd) return;
        }
        isRelevant = true;
      }
    } else {
      // Non-project: scheduled tepat target date
      if (t.date === targetDate) isRelevant = true;
    }
    if (isRelevant) tasks.push({ ...t, _source: 'real' });
  });
  // v2.42: 2. Virtual forecast dari template — pakai helper terpadu (fix bug schema)
  if (targetDate >= today) {
    const forecast = templateForecastForDate(targetDate, { memberFilter });
    forecast.forEach(vt => tasks.push({ ...vt, _source: 'template' }));
  }
  // Sort: jam start asc, lalu kategori, lalu title
  tasks.sort((a, b) => {
    const ta = a.startTime || '99:99';
    const tb = b.startTime || '99:99';
    if (ta !== tb) return ta.localeCompare(tb);
    return (a.title || '').localeCompare(b.title || '');
  });
  return tasks;
}

// v2.41-v2.45: Bawa task ke hari ini. Strategi berbeda per jenis source:
//   - Task real NON-PROJECT future → MOVE (update task.date ke today, task asli HILANG dari tanggal asalnya)
//   - Task real PROJECT future → CLONE non-project (project asli tetap span tanggalnya, biar semantic project preserved)
//   - Template VIRTUAL forecast → CLONE + claim sourceDate (template skip generate nanti)
async function bringTaskToToday(sourceRef, sourceDate) {
  const me = STATE.currentMember;
  if (!me) return;
  const [type, id] = sourceRef.split(':');
  const today = todayStr();

  // Resolve source data
  let sourceData;
  let isFromTemplate = false;
  let templateId = null;
  let realTaskId = null;
  if (type === 'real') {
    const task = STATE.tasks.find(t => t.id === id);
    if (!task) { toast('Task tidak ketemu', 'error'); return; }
    sourceData = task;
    realTaskId = task.id;
    isFromTemplate = !!task.fromTemplateId;
    templateId = task.fromTemplateId || null;
  } else if (type === 'virtual') {
    const v = STATE._previewVirtuals && STATE._previewVirtuals[id];
    if (!v) { toast('Forecast template tidak ketemu, refresh dulu', 'error'); return; }
    sourceData = v;
    isFromTemplate = true;
    templateId = v.fromTemplateId;
  } else {
    return;
  }

  const sourceDateLabel = sourceDate || sourceData.date || '?';
  const titleLabel = sourceData.title || sourceData.fromTemplateName || 'Tugas';
  const tplName = sourceData.fromTemplateName || titleLabel;

  // === STRATEGI 1: TASK REAL NON-PROJECT → MOVE (update task.date ke today, asli HILANG) ===
  if (type === 'real' && !sourceData.isProject) {
    const confirmMsg = `Pindah task "${titleLabel}" ke hari ini (${today})?\n\n` +
      `Task asli tanggal ${sourceDateLabel} akan DIPINDAHKAN ke hari ini.\n` +
      `Status reset ke TODO, progress 0%.`;
    if (!confirm(confirmMsg)) return;
    try {
      const newActivity = [...(sourceData.activity || []), {
        id: uid(),
        type: 'moved_via_preview',
        byId: me.id, byName: me.name,
        at: new Date().toISOString(),
        from: sourceDateLabel,
        to: today,
      }];
      await updateDoc(doc(STATE.db, 'tasks', realTaskId), {
        date: today,
        status: 'todo',
        progress: 0,
        progressCount: 0,
        completedAt: null,
        activity: newActivity,
        updatedAt: serverTimestamp(),
      });
      toast(`✅ Task "${titleLabel}" dipindahkan dari ${sourceDateLabel} ke hari ini`, 'success');
      closeModal();
    } catch (err) {
      toast('Gagal pindah: ' + err.message, 'error');
    }
    return;
  }

  // === STRATEGI 2 & 3: CLONE (project real atau virtual template) ===
  // Anti-duplikat untuk template virtual: cek fromTemplateId+today+title sudah ada
  if (type === 'virtual' && templateId) {
    const exists = STATE.tasks.find(t =>
      t.fromTemplateId === templateId && t.date === today && t.isDeleted !== true
      && t.title === sourceData.title);
    if (exists) {
      toast(`Task "${exists.title}" dari template ini sudah ada hari ini`, 'info');
      closeModal();
      return;
    }
  }

  const confirmMsg = type === 'virtual'
    ? `Bawa task "${titleLabel}" ke hari ini (${today})?\n\nTask baru dibuat dari template "${tplName}".\nTemplate diklaim untuk tanggal ${sourceDateLabel} — TIDAK generate lagi di tanggal itu (anti-double).`
    : `Bawa task "${titleLabel}" (proyek ${sourceDateLabel}) ke hari ini (${today})?\n\nProject asli TETAP berjalan di range tanggalnya.\nTask BARU non-project tanggal hari ini akan dibuat.`;
  if (!confirm(confirmMsg)) return;

  // Build clone
  const clone = {
    title: titleLabel,
    description: sourceData.description || '',
    assigneeId: sourceData.assigneeId || me.id,
    assigneeName: sourceData.assigneeName || me.name,
    category: sourceData.category || 'iklan',
    labelIds: Array.isArray(sourceData.labelIds) ? sourceData.labelIds : [],
    isShared: sourceData.isShared === true,
    isProject: false,
    date: today,
    dueDate: null,
    startTime: sourceData.startTime || null,
    endTime: sourceData.endTime || null,
    status: 'todo',
    progress: 0,
    target: sourceData.target || 0,
    progressCount: 0,
    checklists: (sourceData.checklists || []).map(c => ({ ...c, done: false })),
    comments: [],
    boardId: STATE.currentBoardId,
    fromTemplateId: isFromTemplate ? templateId : null,
    fromTemplateName: isFromTemplate ? (sourceData.fromTemplateName || tplName) : null,
    fromPreviewOf: realTaskId,
    fromPreviewDate: sourceDateLabel,
    createdById: me.id,
    createdByName: me.name,
    createdAt: serverTimestamp(),
    updatedAt: serverTimestamp(),
    completedAt: null,
    activity: [{
      id: uid(),
      type: 'created',
      byId: me.id, byName: me.name,
      at: new Date().toISOString(),
      note: type === 'real'
        ? `cloned dari proyek tanggal ${sourceDateLabel} via Preview Tugas Mendatang`
        : `materialized dari template "${tplName}" via Preview Tugas Mendatang (claim ${sourceDateLabel})`,
    }],
  };

  try {
    await addDoc(collection(STATE.db, 'tasks'), clone);
    // Claim template untuk anti-double generation di sourceDate
    if (isFromTemplate && templateId && type === 'virtual') {
      try {
        const tplRef = doc(STATE.db, 'boards', STATE.currentBoardId, 'templates', templateId);
        await updateDoc(tplRef, {
          claimedDates: arrayUnion(sourceDate),
          updatedAt: serverTimestamp(),
        });
      } catch (e) {
        console.warn('Gagal claim tanggal template (non-critical):', e);
      }
    }
    toast(`✅ Task "${clone.title}" dibuat hari ini${type === 'virtual' ? ' · template di-claim ' + sourceDate : ''}`, 'success');
    closeModal();
  } catch (err) {
    toast('Gagal: ' + err.message, 'error');
  }
}

function openMarkNotDoneModal(task) {
  const me = STATE.currentMember;
  if (!me) return;
  const html = `
    <div class="modal-header">
      <h2 class="modal-title">🚫 Tandai Tidak Selesai</h2>
      <button class="modal-close" data-close-modal>&times;</button>
    </div>
    <div class="modal-body" style="padding:20px">
      <div style="background:#fef2f2;border-left:3px solid #dc2626;padding:12px 14px;border-radius:6px;margin-bottom:14px">
        <div style="font-weight:600;color:#991b1b;margin-bottom:4px">Task: ${escapeHtml(task.title)}</div>
        <div style="font-size:12px;color:#7f1d1d">Task ini akan masuk ke menu <strong>🚫 Tidak Selesai</strong> untuk direview. Status di kanban gak berubah, tapi badge "🚫 Tidak Selesai" muncul di card.</div>
      </div>
      <div class="form-group">
        <label class="label">Kenapa task ini tidak bisa diselesaikan? <span style="color:#dc2626">*</span></label>
        <textarea id="nd-kendala" class="textarea" rows="4" placeholder="Mis: nunggu supplier kirim barang, alat rusak, customer cancel, dll" autofocus></textarea>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">
          Wajib isi. Tim & admin bisa lihat alasan ini dan koordinasi solusi.
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal>Batal</button>
      <button class="btn btn-danger" id="nd-submit">🚫 Tandai Tidak Selesai</button>
    </div>
  `;
  showModal(html, { size: 'md' });
  const submitBtn = document.getElementById('nd-submit');
  const input = document.getElementById('nd-kendala');
  submitBtn.addEventListener('click', async () => {
    const reason = input.value.trim();
    if (!reason || reason.length < 5) {
      toast('Alasan minimal 5 karakter', 'error');
      input.focus();
      return;
    }
    if (submitBtn.disabled) return;
    submitBtn.disabled = true;
    try {
      const update = {
        notCompleted: true,
        kendala: reason,
        notCompletedAt: Date.now(),
        notCompletedBy: { id: me.id, name: me.name },
        updatedAt: serverTimestamp(),
      };
      // Stop timer kalau lagi running
      const tt = applyAutoTimeTrack(task, task.status, 'todo', me.id, me.name);
      if (tt) update.timeLog = tt.timeLog;
      // Activity log
      const newAct = {
        id: uid(),
        type: 'marked_not_completed',
        byId: me.id, byName: me.name,
        at: new Date().toISOString(),
        reason,
      };
      update.activity = [...(task.activity || []), newAct];
      await updateDoc(doc(STATE.db, 'tasks', task.id), update);
      toast('Task ditandai tidak selesai · pindah ke menu 🚫 Tidak Selesai', 'success');
      closeModal();
      // v2.25: auto-redirect user ke menu Tidak Selesai biar langsung lihat task-nya
      STATE.currentView = 'notdone';
      renderMain();
    } catch (err) {
      submitBtn.disabled = false;
      toast('Gagal: ' + err.message, 'error');
    }
  });
  // Ctrl+Enter submit
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitBtn.click();
  });
}

/* =============================================================
   RIWAYAT PENGERJAAN MODAL (timeline activity)
   ============================================================= */
function openHistoryModal(taskId) {
  const task = STATE.tasks.find(t => t.id === taskId);
  if (!task) return;

  // Build timeline events
  const events = [];
  const activity = task.activity || [];

  // Selalu include "created" sebagai event pertama kalau ada
  if (activity.length > 0) {
    activity.forEach(a => {
      let label, markerClass = 'todo', icon = '·';
      switch (a.type) {
        case 'created':
          label = 'To do'; markerClass = 'created'; icon = '+';
          break;
        case 'status_changed':
          label = (a.to || '').toUpperCase().charAt(0) + (a.to || '').slice(1);
          markerClass = a.to === 'done' ? 'done' : (a.to === 'proses' ? 'proses' : 'todo');
          icon = a.to === 'done' ? '✓' : (a.to === 'proses' ? '◐' : '○');
          break;
        case 'progress_changed':
          label = `Progress: ${a.to}%`;
          markerClass = 'progress';
          icon = '%';
          break;
        case 'assignee_changed':
          label = `Pelaksana → ${a.to || '?'}`;
          markerClass = 'todo';
          icon = '👤';
          break;
        default:
          label = a.type;
      }
      events.push({ ...a, label, markerClass, icon });
    });
  } else {
    // Tidak ada activity tracker — fallback ke createdAt + completedAt
    if (task.createdAt) {
      events.push({
        type: 'created', label: 'Dibuat',
        markerClass: 'created', icon: '+',
        byName: task.createdByName, at: task.createdAt,
      });
    }
    if (task.completedAt) {
      events.push({
        type: 'completed', label: 'Selesai',
        markerClass: 'done', icon: '✓',
        byName: task.assigneeName, at: task.completedAt,
      });
    }
  }

  // Format date/time
  function fmtDateTime(at) {
    if (!at) return '';
    const d = typeof at === 'string' ? new Date(at) : (at.toDate ? at.toDate() : new Date(at));
    const dd = String(d.getDate()).padStart(2, '0');
    const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    const mm = months[d.getMonth()];
    const yyyy = d.getFullYear();
    const hh = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return { date: `${dd} ${mm} ${yyyy}`, time: `${hh}.${min}` };
  }

  const itemsHtml = events.map(ev => {
    const dt = fmtDateTime(ev.at);
    return `
      <div class="timeline-item">
        <div class="timeline-marker ${ev.markerClass}">${ev.icon}</div>
        <div class="timeline-status">${escapeHtml(ev.label)}</div>
        ${ev.byName ? `<div class="timeline-detail">oleh <strong>${escapeHtml(ev.byName)}</strong></div>` : ''}
        <div class="timeline-meta">
          <span class="timeline-meta-item">📅 ${dt.date || ''}</span>
          <span class="timeline-meta-item">🕐 ${dt.time || ''}</span>
        </div>
      </div>
    `;
  }).join('');

  showModal(`
    <div class="modal-header">
      <div class="modal-title">🕐 Riwayat Pengerjaan</div>
      <button class="modal-close" data-close-modal>×</button>
    </div>
    <div class="modal-body">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:18px">
        Task: <strong style="color:var(--text)">${escapeHtml(task.title)}</strong>
      </div>
      ${events.length > 0
        ? `<div class="timeline">${itemsHtml}</div>`
        : `<div style="color:var(--text-light);text-align:center;padding:24px;font-size:13px">Belum ada riwayat aktivitas</div>`}
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close-modal>Tutup</button>
    </div>
  `);
}
