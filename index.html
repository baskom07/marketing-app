            <button class="btn btn-secondary btn-sm" data-priority-label="${l.id}">Prioritas</button>
            <button class="btn btn-secondary btn-sm" data-rename-label="${l.id}">Rename</button>
            <button class="btn btn-danger btn-sm" data-del-label="${l.id}">Hapus</button>
          ` : ''}
        </div>
      </div>
    `;
  }).join('');

  showModal(`
    <div class="modal-header">
      <div class="modal-title">🏷️ Labels</div>
      <button class="modal-close" data-close-modal>×</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-muted);font-size:12px;margin-bottom:14px">
        Labels dipakai untuk tag task (mis: Segera, Harian, Mingguan, dll). ${canEdit ? '' : '<strong>Mode lihat saja</strong> — minta admin untuk kasih izin edit.'}
      </p>
      ${canEdit ? `
        <div style="margin-bottom:18px;padding:12px 14px;background:var(--bg-col);border-radius:var(--radius)">
          <label class="label">Bikin Label Baru</label>
          <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
            <input id="new-label-name" class="input" placeholder="Mis: Urgent, Routine" style="flex:1;min-width:160px">
            <div class="color-picker" id="new-label-colors">${colorOpts}</div>
          </div>
          <button class="btn btn-primary btn-sm" id="new-label-add" style="margin-top:10px">+ Bikin Label</button>
        </div>
      ` : ''}
      <h4 style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px">Daftar Labels</h4>
      ${STATE.labels.length === 0 ? '<div style="color:var(--text-light);font-size:13px;text-align:center;padding:20px">Belum ada label.</div>' : `<div class="member-list">${list}</div>`}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal>Tutup</button>
    </div>
  `, { size: 'lg' });

  if (!canEdit) return;

  let selectedColor = PALETTE[0].value;
  document.querySelectorAll('[data-new-label-color]').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedColor = btn.dataset.newLabelColor;
      document.querySelectorAll('[data-new-label-color]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  document.getElementById('new-label-add').addEventListener('click', async () => {
    const name = document.getElementById('new-label-name').value.trim();
    if (!name) { toast('Nama label wajib diisi', 'error'); return; }
    try {
      await addDoc(collection(STATE.db, 'boards', STATE.currentBoardId, 'labels'), {
        name, color: selectedColor, priority: 50, createdAt: serverTimestamp(),
      });
      toast(`Label "${name}" dibuat`, 'success');
      closeModal();
      setTimeout(openLabelsModal, 200);
    } catch (err) {
      toast('Gagal: ' + err.message, 'error');
    }
  });

  document.querySelectorAll('[data-priority-label]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.priorityLabel;
      const l = STATE.labels.find(x => x.id === id);
      const cur = Number(l.priority) || 50;
      const input = prompt(`Set prioritas label "${l.name}" (1 = paling tinggi, 99 = paling rendah):\nDefault tim:\n  Segera=1, Harian=2, Mingguan=3, Bulanan=4, Insidental=5`, cur);
      if (input === null) return;
      const num = parseInt(input, 10);
      if (isNaN(num) || num < 1 || num > 99) { toast('Angka 1-99 saja', 'error'); return; }
      try {
        await updateDoc(doc(STATE.db, 'boards', STATE.currentBoardId, 'labels', id), { priority: num });
        toast(`Prioritas ${l.name} = ${num}`, 'success');
        setTimeout(openLabelsModal, 200);
      } catch (err) {
        toast('Gagal: ' + err.message, 'error');
      }
    });
  });

  document.querySelectorAll('[data-rename-label]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.renameLabel;
      const l = STATE.labels.find(x => x.id === id);
      const newName = prompt('Nama label baru:', l.name);
      if (!newName || newName.trim() === l.name) return;
      try {
        await updateDoc(doc(STATE.db, 'boards', STATE.currentBoardId, 'labels', id), { name: newName.trim() });
        toast('Label di-rename', 'success');
        setTimeout(openLabelsModal, 200);
      } catch (err) {
        toast('Gagal: ' + err.message, 'error');
      }
    });
  });

  document.querySelectorAll('[data-del-label]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.delLabel;
      const l = STATE.labels.find(x => x.id === id);
      if (!confirm(`Hapus label "${l.name}"?\nTask yang punya label ini akan kehilangan tag-nya.`)) return;
      try {
        await deleteDoc(doc(STATE.db, 'boards', STATE.currentBoardId, 'labels', id));
        toast('Label dihapus', 'success');
        setTimeout(openLabelsModal, 200);
      } catch (err) {
        toast('Gagal: ' + err.message, 'error');
      }
    });
  });
}

/* =============================================================
   TEMPLATES MODAL
   ============================================================= */
function openTemplatesModal() {
  const canEdit = hasPerm('templates');
  const board = STATE.boards.find(b => b.id === STATE.currentBoardId);
  if (!board) return;

  const freqLabel = {
    manual: { txt: 'Manual', color: 'var(--text-muted)' },
    daily: { txt: '🗓️ Harian', color: '#dc2626' },
    weekly: { txt: '📆 Mingguan', color: '#2563eb' },
    monthly: { txt: '📅 Bulanan', color: '#c87f1f' },
  };
  const dowNames = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const list = STATE.templates.map(t => {
    const freq = t.frequency || 'manual';
    const fl = freqLabel[freq] || freqLabel.manual;
    const itemCount = (t.items || []).length || (t.title ? 1 : 0);
    const assignee = STATE.members.find(m => m.id === t.defaultAssigneeId);
    const isInactive = t.active === false;
    // Day-of-week badge
    const dowArr = Array.isArray(t.daysOfWeek) ? t.daysOfWeek.map(Number) : [0,1,2,3,4,5,6];
    let dowText = '';
    if (dowArr.length === 7) dowText = 'Setiap hari';
    else if (dowArr.length === 5 && [1,2,3,4,5].every(d => dowArr.includes(d))) dowText = 'Sen-Jum';
    else dowText = dowArr.sort((a,b) => (a===0?7:a) - (b===0?7:b)).map(d => dowNames[d]).join('·');
    const sharedNote = t.defaultIsShared ? ' · <span style="color:#15803d;font-weight:600">👥 Bersama</span>' : '';
    return `
      <div class="member-row" style="${isInactive ? 'opacity:0.6' : ''}">
        <div class="member-info">
          <div class="member-name">
            ${escapeHtml(t.name)}
            <span style="font-size:11px;padding:2px 8px;border-radius:100px;background:var(--bg-col);color:${fl.color};font-weight:700;margin-left:6px">${fl.txt}</span>
            ${isInactive ? '<span style="font-size:11px;padding:2px 8px;border-radius:100px;background:var(--bg-col);color:var(--text-light);margin-left:4px">Nonaktif</span>' : ''}
          </div>
          <div class="member-meta">
            🗓️ ${dowText} · ${itemCount} item${assignee ? ` · ke ${escapeHtml(assignee.name)}` : ''}${sharedNote}
          </div>
        </div>
        <div class="member-actions">
          ${canEdit ? `
            <button class="btn btn-secondary btn-sm" data-edit-tpl="${t.id}">Edit</button>
            <button class="btn btn-danger btn-sm" data-del-tpl="${t.id}">Hapus</button>
          ` : `
            <button class="btn btn-ghost-soft btn-sm" data-view-tpl="${t.id}">👁️ Lihat</button>
          `}
        </div>
      </div>
    `;
  }).join('');

  showModal(`
    <div class="modal-header">
      <div class="modal-title">📋 Templates</div>
      <button class="modal-close" data-close-modal>×</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-muted);font-size:12px;margin-bottom:14px">
        Template dipakai saat bikin task baru atau auto-generate harian/mingguan/bulanan. ${canEdit ? '' : '<strong>Mode lihat saja</strong> — minta admin untuk kasih izin edit.'}
      </p>
      ${canEdit ? `<button class="btn btn-primary" id="new-tpl-btn" style="margin-bottom:18px">+ Bikin Template Baru</button>` : ''}
      <h4 style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px">Daftar Templates</h4>
      ${STATE.templates.length === 0 ? '<div style="color:var(--text-light);font-size:13px;text-align:center;padding:20px">Belum ada template.</div>' : `<div class="member-list">${list}</div>`}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal>Tutup</button>
    </div>
  `, { size: 'lg' });

  if (canEdit) {
    document.getElementById('new-tpl-btn').addEventListener('click', () => openTemplateEditor(null));
    document.querySelectorAll('[data-edit-tpl]').forEach(btn => {
      btn.addEventListener('click', () => openTemplateEditor(btn.dataset.editTpl));
    });
    document.querySelectorAll('[data-del-tpl]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.delTpl;
        const t = STATE.templates.find(x => x.id === id);
        if (!confirm(`Hapus template "${t.name}"?`)) return;
        try {
          await deleteDoc(doc(STATE.db, 'boards', STATE.currentBoardId, 'templates', id));
          toast('Template dihapus', 'success');
          setTimeout(openTemplatesModal, 200);
        } catch (err) {
          toast('Gagal: ' + err.message, 'error');
        }
      });
    });
  } else {
    // View-only mode untuk member
    document.querySelectorAll('[data-view-tpl]').forEach(btn => {
      btn.addEventListener('click', () => openTemplateViewer(btn.dataset.viewTpl));
    });
  }
}

function openTemplateViewer(tplId) {
  const tpl = STATE.templates.find(t => t.id === tplId);
  if (!tpl) return;
  const freqLabel = {
    manual: 'Manual (pakai saat create task)',
    daily: '🗓️ Harian — auto setiap hari',
    weekly: '📆 Mingguan — auto tiap hari yang ditentukan',
    monthly: '📅 Bulanan — auto tiap tanggal yang ditentukan',
  };
  const freq = tpl.frequency || 'manual';
  const assignee = STATE.members.find(m => m.id === tpl.defaultAssigneeId);
  const cat = CATEGORIES.find(c => c.id === tpl.defaultCategoryId);
  const items = tpl.items || [];

  showModal(`
    <div class="modal-header">
      <div class="modal-title">👁️ ${escapeHtml(tpl.name)}</div>
      <button class="modal-close" data-close-modal>×</button>
    </div>
    <div class="modal-body">
      <div class="task-meta-row" style="display:flex;flex-direction:column;align-items:stretch;gap:6px">
        <div><strong>Frekuensi:</strong> ${freqLabel[freq] || freq}</div>
        ${assignee ? `<div><strong>Pelaksana default:</strong> ${escapeHtml(assignee.name)}</div>` : ''}
        ${cat ? `<div><strong>Kategori default:</strong> ${escapeHtml(cat.name)}</div>` : ''}
        <div><strong>Status:</strong> ${tpl.active === false ? 'Nonaktif' : 'Aktif'}</div>
      </div>
      <h4 class="comments-title" style="margin-top:14px">Item Tugas (${items.length})</h4>
      ${items.length === 0 ? '<div style="color:var(--text-light);font-size:13px;padding:10px">Belum ada item.</div>' :
        items.map((it, idx) => `
          <div class="checklist-block" style="margin-bottom:8px">
            <div style="font-weight:600;font-size:13.5px;margin-bottom:4px">${idx + 1}. ${escapeHtml(it.title || '')}</div>
            ${it.description ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">${escapeHtml(it.description)}</div>` : ''}
            ${Array.isArray(it.checklist) && it.checklist.length > 0
              ? `<div style="font-size:12px;color:var(--text);margin-top:6px">
                  <div style="font-weight:600;font-size:11px;color:var(--text-muted);margin-bottom:4px">Checklist:</div>
                  ${it.checklist.map(c => `<div style="padding-left:8px;line-height:1.5">☐ ${escapeHtml(c)}</div>`).join('')}
                </div>`
              : ''}
          </div>
        `).join('')}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal>Tutup</button>
    </div>
  `, { size: 'lg' });
}

function openTemplateEditor(tplId) {
  const tpl = tplId ? STATE.templates.find(t => t.id === tplId) : null;
  const isEdit = !!tpl;

  // Normalize items — kalau template lama pakai title/description/checklists single, convert ke items[0]
  let initialItems = tpl?.items;
  if (!initialItems || !Array.isArray(initialItems) || initialItems.length === 0) {
    // backward compat
    if (tpl && (tpl.title || (tpl.checklists?.length || 0) > 0)) {
      initialItems = [{
        id: uid(),
        title: tpl.title || tpl.name || '',
        description: tpl.description || '',
        checklist: (tpl.checklists || []).join('\n'),
      }];
    } else {
      initialItems = [{ id: uid(), title: '', description: '', checklist: '' }];
    }
  } else {
    // Convert existing items checklist-array to text for editing
    initialItems = initialItems.map(i => ({
      id: i.id || uid(),
      title: i.title || '',
      description: i.description || '',
      checklist: Array.isArray(i.checklist) ? i.checklist.join('\n') : (i.checklist || ''),
    }));
  }

  const freq = tpl?.frequency || 'daily';
  const defaultAssigneeId = tpl?.defaultAssigneeId || '';
  const defaultCategoryId = tpl?.defaultCategoryId || '';
  const isActive = tpl?.active !== false;
  // Days of week: array of 0-6. Default semua hari (= setiap hari) kalau gak di-set.
  const initialDaysOfWeek = Array.isArray(tpl?.daysOfWeek) && tpl.daysOfWeek.length > 0
    ? tpl.daysOfWeek.map(Number) : [0, 1, 2, 3, 4, 5, 6];
  const defaultIsShared = tpl?.defaultIsShared === true;

  const memberOpts = `<option value="">— Tidak di-set —</option>` + STATE.members.map(m =>
    `<option value="${m.id}" ${m.id === defaultAssigneeId ? 'selected' : ''}>${escapeHtml(m.name)}</option>`
  ).join('');

  const catOpts = `<option value="">— Tidak di-set —</option>` + CATEGORIES.map(c =>
    `<option value="${c.id}" ${c.id === defaultCategoryId ? 'selected' : ''}>${escapeHtml(c.name)}</option>`
  ).join('');

  showModal(`
    <div class="modal-header">
      <div class="modal-title">${isEdit ? 'Edit' : 'Bikin'} Template</div>
      <button class="modal-close" data-close-modal>×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="label">Nama Template</label>
        <input id="tpl-name" class="input" placeholder="Mis: Tugas Harian Prayoga, Restock Mingguan" value="${escapeHtml(tpl?.name || '')}">
      </div>

      <div class="form-group">
        <label class="label">Auto-Generate di Hari</label>
        <div class="chip-row" id="tpl-dow-chips" style="gap:6px;flex-wrap:wrap">
          ${[
            { i: 1, name: 'Sen' },
            { i: 2, name: 'Sel' },
            { i: 3, name: 'Rab' },
            { i: 4, name: 'Kam' },
            { i: 5, name: 'Jum' },
            { i: 6, name: 'Sab' },
            { i: 0, name: 'Min' },
          ].map(d => `
            <button type="button" class="chip ${initialDaysOfWeek.includes(d.i) ? 'active' : ''}"
              data-tpl-dow="${d.i}"
              style="min-width:50px;justify-content:center">${d.name}</button>
          `).join('')}
        </div>
        <div style="display:flex;gap:6px;margin-top:6px">
          <button type="button" class="btn btn-ghost btn-sm" id="tpl-dow-all">Semua hari</button>
          <button type="button" class="btn btn-ghost btn-sm" id="tpl-dow-weekday">Sen-Jum aja</button>
          <button type="button" class="btn btn-ghost btn-sm" id="tpl-dow-clear">Kosongkan</button>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">
          Pilih hari-hari template akan auto-generate task. Default: setiap hari.
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group">
          <label class="label">Pelaksana Default</label>
          <select id="tpl-assignee" class="select">${memberOpts}</select>
        </div>
        <div class="form-group">
          <label class="label">Kategori Default</label>
          <select id="tpl-category" class="select">${catOpts}</select>
        </div>
      </div>

      <div class="form-group" style="padding:10px 14px;background:${defaultIsShared ? 'var(--success-light)' : 'var(--bg-col)'};border-radius:var(--radius-sm);transition:background .2s" id="tpl-shared-wrap">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:600;font-size:13px">
          <input type="checkbox" id="tpl-shared" ${defaultIsShared ? 'checked' : ''} style="width:16px;height:16px;cursor:inherit;accent-color:var(--success)">
          👥 Default jadi Tugas Bersama
        </label>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;padding-left:24px">
          Kalau dicentang, task auto-generate dari template ini = tugas bersama (muncul di kanban semua anggota tim).
        </div>
      </div>

      <div class="form-group" style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="tpl-active" ${isActive ? 'checked' : ''} style="width:16px;height:16px;cursor:pointer">
        <label for="tpl-active" style="cursor:pointer;font-size:13px">Template aktif (auto-generate)</label>
      </div>

      <div class="form-group">
        <label class="label">Daftar Tugas (Item) — tiap item = 1 task</label>
        <div id="tpl-items-root"></div>
        <button type="button" class="btn btn-secondary btn-sm" id="tpl-add-item" style="margin-top:8px">+ Tambah Item Tugas</button>
        <div style="font-size:12px;color:var(--text-muted);margin-top:6px">
          Saat template auto-generate, tiap item akan jadi task terpisah di kanban hari itu.
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close-modal>Batal</button>
      <button class="btn btn-primary" id="tpl-save">${isEdit ? 'Simpan' : 'Bikin Template'}</button>
    </div>
  `, { size: 'lg' });

  // Mutable items state + day-of-week selection
  const ITEMS_STATE = { items: [...initialItems] };
  const TPL_STATE = {
    daysOfWeek: new Set(initialDaysOfWeek),
    defaultIsShared: defaultIsShared,
  };

  function refreshDowChips() {
    document.querySelectorAll('[data-tpl-dow]').forEach(btn => {
      const i = Number(btn.dataset.tplDow);
      btn.classList.toggle('active', TPL_STATE.daysOfWeek.has(i));
    });
  }
  document.querySelectorAll('[data-tpl-dow]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = Number(btn.dataset.tplDow);
      if (TPL_STATE.daysOfWeek.has(i)) TPL_STATE.daysOfWeek.delete(i);
      else TPL_STATE.daysOfWeek.add(i);
      refreshDowChips();
    });
  });
  document.getElementById('tpl-dow-all')?.addEventListener('click', () => {
    TPL_STATE.daysOfWeek = new Set([0,1,2,3,4,5,6]);
    refreshDowChips();
  });
  document.getElementById('tpl-dow-weekday')?.addEventListener('click', () => {
    TPL_STATE.daysOfWeek = new Set([1,2,3,4,5]);
    refreshDowChips();
  });
  document.getElementById('tpl-dow-clear')?.addEventListener('click', () => {
    TPL_STATE.daysOfWeek = new Set();
    refreshDowChips();
  });

  // Shared toggle
  const sharedCb = document.getElementById('tpl-shared');
  const sharedWrap = document.getElementById('tpl-shared-wrap');
  if (sharedCb) {
    sharedCb.addEventListener('change', () => {
      TPL_STATE.defaultIsShared = sharedCb.checked;
      if (sharedWrap) sharedWrap.style.background = sharedCb.checked ? 'var(--success-light)' : 'var(--bg-col)';
    });
  }

  function refreshItems() {
    const root = document.getElementById('tpl-items-root');
    if (!root) return;
    root.innerHTML = ITEMS_STATE.items.map((it, idx) => `
      <div class="checklist-block" data-item-idx="${idx}" style="margin-bottom:8px">
        <div class="checklist-head">
          <input class="checklist-title" data-tpl-item-title="${idx}" value="${escapeHtml(it.title || '')}" placeholder="Judul item tugas...">
          ${ITEMS_STATE.items.length > 1 ? `<button type="button" class="btn btn-ghost btn-sm" data-tpl-del-item="${idx}" style="color:var(--danger)">✕</button>` : ''}
        </div>
        <textarea class="textarea" data-tpl-item-desc="${idx}" placeholder="Deskripsi (opsional)" style="margin-top:6px;min-height:50px">${escapeHtml(it.description || '')}</textarea>
        <textarea class="textarea" data-tpl-item-checklist="${idx}" placeholder="Checklist (1 item per baris, opsional)" style="margin-top:6px;font-family:ui-monospace,monospace;font-size:12px;min-height:60px">${escapeHtml(it.checklist || '')}</textarea>
      </div>
    `).join('');
    // Bind item inputs
    root.querySelectorAll('[data-tpl-item-title]').forEach(el => {
      el.addEventListener('input', () => { ITEMS_STATE.items[Number(el.dataset.tplItemTitle)].title = el.value; });
    });
    root.querySelectorAll('[data-tpl-item-desc]').forEach(el => {
      el.addEventListener('input', () => { ITEMS_STATE.items[Number(el.dataset.tplItemDesc)].description = el.value; });
    });
    root.querySelectorAll('[data-tpl-item-checklist]').forEach(el => {
      el.addEventListener('input', () => { ITEMS_STATE.items[Number(el.dataset.tplItemChecklist)].checklist = el.value; });
    });
    root.querySelectorAll('[data-tpl-del-item]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = Number(btn.dataset.tplDelItem);
        if (!confirm('Hapus item ini?')) return;
        ITEMS_STATE.items.splice(idx, 1);
        refreshItems();
      });
    });
  }
  refreshItems();

  document.getElementById('tpl-add-item').addEventListener('click', () => {
    ITEMS_STATE.items.push({ id: uid(), title: '', description: '', checklist: '' });
    refreshItems();
  });

  document.getElementById('tpl-save').addEventListener('click', async () => {
    const name = document.getElementById('tpl-name').value.trim();
    if (!name) { toast('Nama template wajib diisi', 'error'); return; }

    // Validate items: minimal 1 item dengan title
    const validItems = ITEMS_STATE.items
      .filter(it => (it.title || '').trim())
      .map(it => ({
        id: it.id || uid(),
        title: it.title.trim(),
        description: (it.description || '').trim(),
        checklist: (it.checklist || '').trim().split('\n').map(l => l.trim()).filter(Boolean),
      }));
    if (validItems.length === 0) { toast('Minimal 1 item tugas dengan judul', 'error'); return; }

    const daysOfWeekArr = Array.from(TPL_STATE.daysOfWeek).sort((a, b) => a - b);
    if (daysOfWeekArr.length === 0) {
      toast('Pilih minimal 1 hari (atau klik "Semua hari")', 'error'); return;
    }
    const data = {
      name,
      frequency: 'daily',  // v2.14: template selalu harian
      daysOfWeek: daysOfWeekArr, // v2.15: array 0-6, hari mana saja generate
      defaultAssigneeId: document.getElementById('tpl-assignee').value || null,
      defaultCategoryId: document.getElementById('tpl-category').value || null,
      defaultIsShared: !!TPL_STATE.defaultIsShared,
      active: document.getElementById('tpl-active').checked,
      dayOfWeek: null,
      dayOfMonth: null,
      items: validItems,
      updatedAt: serverTimestamp(),
    };

    try {
      if (isEdit) {
        await updateDoc(doc(STATE.db, 'boards', STATE.currentBoardId, 'templates', tpl.id), data);
        toast('Template tersimpan', 'success');
      } else {
        data.createdAt = serverTimestamp();
        await addDoc(collection(STATE.db, 'boards', STATE.currentBoardId, 'templates'), data);
        toast('Template dibuat', 'success');
      }
      closeModal();
      setTimeout(openTemplatesModal, 200);
    } catch (err) {
      toast('Gagal: ' + err.message, 'error');
    }
  });
}

function renderNotifHistoryList(hist) {
  if (!hist || hist.length === 0) {
    return `
      <div style="padding:40px 20px;text-align:center;color:var(--text-muted);background:var(--bg-col);border-radius:var(--radius)">
        <div style="font-size:48px;margin-bottom:10px">🔕</div>
        <div style="font-weight:600;margin-bottom:6px">Belum ada notifikasi</div>
        <div style="font-size:13px">Notifikasi yang muncul (tugas baru, jam mulai, reminder catatan, dll) akan tersimpan di sini supaya gak terlewat.</div>
        <div style="font-size:11px;margin-top:10px;color:var(--text-muted);font-style:italic">Catatan: riwayat tersimpan per device (browser) selama maks ${NOTIF_HISTORY_TTL_DAYS} hari.</div>
      </div>
    `;
  }
  // Group by tanggal
  const groups = {};
  hist.forEach(n => {
    const d = new Date(n.ts);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(n);
  });
  const today = todayStr();
  const yesterday = (() => { const d = new Date(); d.setDate(d.getDate()-1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
  const formatGroupLabel = (key) => {
    if (key === today) return 'Hari Ini';
    if (key === yesterday) return 'Kemarin';
    const d = new Date(key);
    return d.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  };
  let html = '';
  Object.keys(groups).sort((a,b) => b.localeCompare(a)).forEach(key => {
    html += `<div style="margin-bottom:18px">
      <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:0 4px">${formatGroupLabel(key)} <span style="color:var(--text-light);font-weight:400;text-transform:none">(${groups[key].length})</span></div>
      ${groups[key].map(n => renderNotifHistoryItem(n)).join('')}
    </div>`;
  });
  return html;
}

function renderNotifHistoryItem(n) {
  const d = new Date(n.ts);
  const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const unreadStyle = n.read ? '' : 'background:#fef3c7;border-left:3px solid #f59e0b';
  const clickable = !!n.action;
  return `

      style="display:flex;gap:12px;padding:12px 14px;background:var(--bg-col);border-radius:8px;margin-bottom:6px;${unreadStyle};${clickable ? 'cursor:pointer' : ''}">

        ${clickable ? `<div style="font-size:11px;color:var(--primary);margin-top:4px">→ Klik untuk buka</div>` : ''}

function bindNotifPage() {
  // Tab switching
  document.querySelectorAll('[data-notif-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      _notifPageTab = btn.dataset.notifTab;
      renderMain();
    });
  });
  // History actions
  if (_notifPageTab === 'history') {
    document.getElementById('notif-mark-all-read')?.addEventListener('click', () => {
      markAllNotifRead();
      toast('Semua notifikasi ditandai dibaca', 'success');
      renderMain();
    });
    document.getElementById('notif-clear-all')?.addEventListener('click', () => {
      if (!confirm('Hapus semua riwayat notifikasi?')) return;
      clearNotifHistory();
      toast('Riwayat notifikasi dihapus', 'success');
      renderMain();
    });
    document.querySelectorAll('.notif-history-item[data-clickable="1"]').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.closest('[data-notif-del]')) return;
        const id = el.dataset.notifId;
        markNotifRead(id);
        const hist = getNotifHistory();
        const item = hist.find(n => n.id === id);
        if (item && item.action) executeNotifAction(item.action);
      });
    });
    document.querySelectorAll('[data-notif-del]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.notifDel;
        const arr = getNotifHistory().filter(n => n.id !== id);
        saveNotifHistory(arr);
        updateNotifBadge();
        renderMain();
      });
    });
    // Auto-mark all sebagai read saat user buka tab Riwayat (after small delay)
    setTimeout(() => { if (_notifPageTab === 'history') markAllNotifRead(); }, 1500);
  }
  // Settings actions
  if (_notifPageTab === 'settings') {
    document.getElementById('ns-req-perm')?.addEventListener('click', async () => {
      const ok = await requestNotifPermission();
      if (ok) { toast('Izin notif diberikan', 'success'); renderMain(); }
      else toast('Izin notif ditolak', 'error');
    });
    document.getElementById('ns-test')?.addEventListener('click', async () => {
      if ('Notification' in window && Notification.permission !== 'granted') {
        await requestNotifPermission();
      }
      showNotif('🔔 Tes Notifikasi', 'Notifikasi Marketing Tracker bekerja!', { tag: 'test-notif', type: 'default', skipHistory: true });
      const oldEnabled = STATE.notifSettings?.enabled;
      const oldSound = STATE.notifSettings?.soundEnabled;
      if (STATE.notifSettings) { STATE.notifSettings.enabled = true; STATE.notifSettings.soundEnabled = true; }
      playNotifSound();
      if (STATE.notifSettings) { STATE.notifSettings.enabled = oldEnabled; STATE.notifSettings.soundEnabled = oldSound; }
    });
    document.getElementById('ns-test-chat')?.addEventListener('click', () => {
      showAppNotif('💬 Tes Sound Chat', 'Ding-dong!', { type: 'default', icon: '💬', skipHistory: true });
      const oldEnabled = STATE.notifSettings?.enabled;
      const oldChat = STATE.notifSettings?.chatSoundEnabled;
      if (STATE.notifSettings) { STATE.notifSettings.enabled = true; STATE.notifSettings.chatSoundEnabled = true; }
      playChatSound();
      if (STATE.notifSettings) { STATE.notifSettings.enabled = oldEnabled; STATE.notifSettings.chatSoundEnabled = oldChat; }
    });
    document.getElementById('ns-save')?.addEventListener('click', async () => {
      const enabled = document.getElementById('ns-enabled').checked;
      if (enabled && Notification.permission !== 'granted') {
        const ok = await requestNotifPermission();
        if (!ok) { toast('Notif gak bisa di-aktifkan tanpa izin browser', 'error'); return; }
      }
      const newSettings = {
        enabled,
        soundEnabled: document.getElementById('ns-sound').checked,
        chatSoundEnabled: document.getElementById('ns-chat-sound').checked,
        notifyOnNewTask: document.getElementById('ns-new-task').checked,
        notifyOnStartTime: document.getElementById('ns-start-time').checked,
        notifyDailyReminder: document.getElementById('ns-daily').checked,
        reminderTime: document.getElementById('ns-reminder-time').value || '09:00',
      };
      saveNotifSettings(newSettings);
      toast('Pengaturan tersimpan', 'success');
    });
  }
}

// v2.52 — Helper: compute total minutes worked dari timeLog sessions
function computeWorkedMinutes(task, fromDate, toDate) {
  const log = task?.timeLog || [];
  if (!Array.isArray(log) || log.length === 0) return 0;
  let total = 0;
  log.forEach(s => {
    if (!s || !s.startedAt) return;
    const startMs = s.startedAt.toMillis ? s.startedAt.toMillis() : (typeof s.startedAt === 'number' ? s.startedAt : new Date(s.startedAt).getTime());
    const endMs = s.endedAt
      ? (s.endedAt.toMillis ? s.endedAt.toMillis() : (typeof s.endedAt === 'number' ? s.endedAt : new Date(s.endedAt).getTime()))
      : Date.now();
    if (!isFinite(startMs) || !isFinite(endMs) || endMs <= startMs) return;
    // Optional clip ke range tanggal
    if (fromDate || toDate) {
      const startDateStr = new Date(startMs).toISOString().slice(0,10);
      if (fromDate && startDateStr < fromDate) return;
      if (toDate && startDateStr > toDate) return;
    }
    total += Math.round((endMs - startMs) / 60000);
  });
  return total;
}

function fmtMinutesAsHours(min) {
  if (!min || min <= 0) return '';
  const h = Math.floor(min / 60);
  const m = min % 60;
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}j`;
  return `${h}j ${m}m`;
}

        if (!opts.tasks) tasks = []; // user cuma minta notdone
        tasks.sort((a, b) => (a.date || '').localeCompare(b.date || '') || (a.createdAt?.toMillis?.() || 0) - (b.createdAt?.toMillis?.() || 0));
        notdoneTasks.sort((a, b) => (b.notCompletedAt?.toMillis?.() || 0) - (a.notCompletedAt?.toMillis?.() || 0));
      }

      // Fetch reminders
      let reminders = [];
      if (opts.reminders) {
        const snap = await getDocs(collection(STATE.db, 'reminders'));
        reminders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        reminders.sort((a, b) => (a.dateTime || 0) - (b.dateTime || 0));
      }

      // Fetch files
      let files = [];
      if (opts.files) {
        const snap = await getDocs(collection(STATE.db, 'importantFiles'));
        files = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        files.sort((a, b) => (b.uploadedAt?.toMillis?.() || 0) - (a.uploadedAt?.toMillis?.() || 0));
      }

      // Fetch templates
      let templates = [];
      if (opts.templates) {
        const snap = await getDocs(collection(STATE.db, 'boards', STATE.currentBoardId, 'templates'));
        templates = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        templates.sort((a, b) => (a.name || '').localeCompare(b.name || ''));

      // Fetch kalkerja overrides (per month in range)
      let kalkerjaOverrides = {};
      if (opts.kalkerja) {
        const months = new Set();
        let cur = from.slice(0, 7);
        const end = to.slice(0, 7);
        while (cur <= end) {
          months.add(cur);
          const [y, m] = cur.split('-').map(Number);
          const next = new Date(y, m, 1); // m=1..12, this gives next month
          cur = `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, '0')}`;
        }
        for (const ym of months) {
          try {
            const docSnap = await getDoc(doc(STATE.db, 'monthlyCalendarOverrides', ym));
            if (docSnap.exists()) kalkerjaOverrides[ym] = docSnap.data().overrides || {};
          } catch (e) { /* skip */ }
        }
      }

      const memberLabel = memberFilter ? STATE.members.find(m => m.id === memberFilter)?.name : 'Semua';
      const ext = format === 'markdown' ? 'md' : format;
      const safeName = (memberLabel || 'Semua').replace(/[^a-zA-Z0-9]/g, '_');
      const filename = `marketing_tracker_${from}_to_${to}_${safeName}.${ext}`;

      if (format === 'xlsx') {
        await exportAsXlsx(filename, { tasks, notdoneTasks, reminders, files, templates, kalkerjaOverrides, tasksForKalender, opts, from, to, memberFilter, memberLabel, categoryFilter });

        const content = JSON.stringify(buildExportObject({ tasks, notdoneTasks, reminders, files, templates, kalkerjaOverrides, tasksForKalender, opts, from, to, memberFilter, memberLabel, categoryFilter }), null, 2);
        downloadFile(filename, content, 'application/json');
      } else if (format === 'csv') {
        const content = buildCsvContent(tasks, from, to);
        downloadFile(filename, content, 'text/csv');
      } else {
        // markdown
        const content = buildMarkdownReport({ tasks, notdoneTasks, reminders, files, templates, kalkerjaOverrides, tasksForKalender, opts, from, to, memberFilter, memberLabel, categoryFilter });
        downloadFile(filename, content, 'text/markdown');
      }

      const totalRows = tasks.length + notdoneTasks.length + reminders.length + files.length + templates.length;
      toast(`Export berhasil: ${totalRows} baris data`, 'success');
      closeModal();
    } catch (err) {
      toast('Gagal export: ' + err.message, 'error');
      console.error(err);
      goBtn.disabled = false;
      goBtn.textContent = '⬇️ Export & Download';
    }
  });
}

// v2.52 — Build full export object (untuk JSON & dasar XLSX)
function buildExportObject(d) {
  return {
    export_meta: {
      exported_at: new Date().toISOString(),
      app_version: 'v2.63-mkt',
      range: { from: d.from, to: d.to },
      filter_member: d.memberLabel,
      filter_category: d.categoryFilter || 'Semua',
      total_tasks: d.tasks.length,
      total_notdone: d.notdoneTasks.length,
    },
    members: STATE.members.map(m => ({
      id: m.id, name: m.name, role: m.role,
      hidden: m.hidden === true,
    })),
    categories: CATEGORIES.map(c => ({ id: c.id, name: c.name })),
    labels: STATE.labels.map(l => ({ id: l.id, name: l.name, color: l.color, priority: l.priority })),
    tasks: d.opts.tasks ? d.tasks.map(t => mapTaskForExport(t, d.from, d.to)) : undefined,
    tasks_tidak_selesai: d.opts.notdone ? d.notdoneTasks.map(t => mapTaskForExport(t, d.from, d.to)) : undefined,
    reminders: d.opts.reminders ? d.reminders.map(r => ({
      id: r.id, title: r.title, type: r.type, date: r.date, time: r.time || null,
      description: r.description || '',
      created_by: r.createdByName,
      created_at: tsToIso(r.createdAt),
    })) : undefined,
    important_files: d.opts.files ? d.files.map(f => ({
      id: f.id, name: f.name, url: f.url, type_label: f.typeLabel, ext: f.ext,
      description: f.description || '',
      uploaded_by: f.uploadedBy,
      uploaded_at: tsToIso(f.uploadedAt),
    })) : undefined,
    templates: d.opts.templates ? d.templates.map(t => ({
      id: t.id, name: t.name, active: !!t.active,
      default_assignee: STATE.members.find(m => m.id === t.defaultAssigneeId)?.name || null,
      default_category: t.defaultCategoryId,
      default_is_shared: !!t.defaultIsShared,
      days_of_week: t.daysOfWeek || null,
      items_count: (t.items || []).length,
      items: (t.items || []).map(it => ({
        title: it.title, startTime: it.startTime || null, endTime: it.endTime || null,
        target: it.target || 0, description: it.description || '',
      })),
    })) : undefined,
    kalkerja_overrides: d.opts.kalkerja ? d.kalkerjaOverrides : undefined,
    // v2.63 — jadwal per-jam hasil render (SAMA kayak grid Kalender Kerja di app),
    // udah include status (proses)/(selesai) per slot dari timeLog. Bukan override mentah.
    kalender_kerja_render: d.opts.kalkerja ? buildKalenderRenderForExport(d) : undefined,
    summary: d.opts.summary ? buildSummaryStats(d.tasks, d.notdoneTasks, d.from, d.to) : undefined,
  };
}

// v2.63 — Render Kalender Kerja per-jam untuk SELURUH range export (lintas bulan).
// Pakai STATE-swap: pasang tasks + overrides bulan ybs ke STATE, panggil kalKerjaCellInfo
// (fungsi yg SAMA dipakai grid & Excel kalender), lalu restore. Konsisten 100% dgn tampilan.
// Catatan: render pakai task hasil fetch range — task carry-over yg MULAI sebelum 'from'
// mungkin tak ikut (range query by date). Untuk analisa periode, ini cukup & self-consistent.
function buildKalenderRenderForExport(d) {
  const tasksForRender = d.tasksForKalender || [];
  const out = [];
  let members = (STATE.members || []).filter(m => !m.hidden);
  if (d.memberFilter) members = members.filter(m => m.id === d.memberFilter);

  const savedTasks = STATE.tasks;
  const savedOverrides = STATE.kalKerjaOverrides;
  try {
    STATE.tasks = tasksForRender;
    const start = new Date(d.from + 'T12:00:00');
    const end = new Date(d.to + 'T12:00:00');
    let curMonthKey = null;
    for (let dt = new Date(start); dt <= end; dt.setDate(dt.getDate() + 1)) {
      const y = dt.getFullYear();
      const mo = dt.getMonth() + 1;
      const day = dt.getDate();
      const ym = `${y}-${String(mo).padStart(2, '0')}`;
      const dateStr = `${y}-${String(mo).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      if (ym !== curMonthKey) {
        STATE.kalKerjaOverrides = (d.kalkerjaOverrides && d.kalkerjaOverrides[ym]) || {};
        kalKerjaInvalidateCache();
        curMonthKey = ym;
      }
      members.forEach(m => {
        const slots = [];
        KALKERJA_TIME_SLOTS.forEach(slot => {
          const info = kalKerjaCellInfo(m.id, y, mo, day, slot.label);
          if (info.text && info.kind !== 'lunch' && info.kind !== 'empty') {
            slots.push({ jam: slot.label, isi: info.text, status: info.status || null, jenis: info.kind });
          }
        });
        if (slots.length > 0) {
          out.push({ tanggal: dateStr, anggota: m.name, anggota_id: m.id, slots });
        }
      });
    }
  } finally {
    STATE.tasks = savedTasks;
    STATE.kalKerjaOverrides = savedOverrides;
    kalKerjaInvalidateCache();
  }
  return out;
}

// v2.63 — sessions timeLog MENTAH (dimensi waktu: kapan mulai, stop, durasi per sesi).
// Inilah data yg bikin Claude bisa analisa "jam berapa proses, jam berapa selesai, ada gap kerja gak".
function mapTimeLogForExport(task) {
  const log = task?.timeLog || [];
  if (!Array.isArray(log) || log.length === 0) return [];
  const out = [];
  log.forEach(s => {
    if (!s || !s.startedAt) return;
    const startMs = s.startedAt.toMillis ? s.startedAt.toMillis() : (typeof s.startedAt === 'number' ? s.startedAt : new Date(s.startedAt).getTime());
    if (!isFinite(startMs)) return;
    const hasEnd = !!s.endedAt;
    const endMs = hasEnd
      ? (s.endedAt.toMillis ? s.endedAt.toMillis() : (typeof s.endedAt === 'number' ? s.endedAt : new Date(s.endedAt).getTime()))
      : null;
    const durasi = (hasEnd && isFinite(endMs) && endMs > startMs) ? Math.round((endMs - startMs) / 60000) : null;
    out.push({
      tanggal: tsToLocalDateStr(s.startedAt),
      mulai: tsToLocalHHMM(s.startedAt),
      selesai: hasEnd ? tsToLocalHHMM(s.endedAt) : null,
      mulai_iso: tsToIso(s.startedAt),
      selesai_iso: hasEnd ? tsToIso(s.endedAt) : null,
      durasi_menit: durasi,
      masih_berjalan: !hasEnd,
    });
  });
  out.sort((a, b) => (a.mulai_iso || '').localeCompare(b.mulai_iso || ''));
  return out;
}

      title: cl.title || '',
      items: (cl.items || []).map(it => ({ text: it.text, done: !!it.done })),
      done_count: (cl.items || []).filter(it => it.done).length,
      total_count: (cl.items || []).length,
    })),

function buildSummaryStats(tasks, notdoneTasks, from, to) {
  const byStatus = {};
  const byMember = {};
  const byCategory = {};
  const byDate = {};
  let totalWorkedMinutes = 0;
  tasks.forEach(t => {
    byStatus[t.status || 'todo'] = (byStatus[t.status || 'todo'] || 0) + 1;
    const mk = t.assigneeName || '?';
    byMember[mk] = byMember[mk] || { total: 0, done: 0, proses: 0, todo: 0, notdone: 0, worked_minutes: 0 };
    byMember[mk].total++;
    if (t.status === 'done') byMember[mk].done++;
    else if (t.status === 'proses') byMember[mk].proses++;
    else byMember[mk].todo++;
    if (t.notCompleted) byMember[mk].notdone++;
    const w = computeWorkedMinutes(t, from, to);
    byMember[mk].worked_minutes += w;
    totalWorkedMinutes += w;
    const cat = CATEGORIES.find(c => c.id === t.category);
    const ck = cat ? cat.name : 'Tanpa kategori';
    byCategory[ck] = byCategory[ck] || { total: 0, done: 0 };
    byCategory[ck].total++;
    if (t.status === 'done') byCategory[ck].done++;
    const dk = t.date || 'tanpa-tgl';
    byDate[dk] = byDate[dk] || { total: 0, done: 0 };
    byDate[dk].total++;
    if (t.status === 'done') byDate[dk].done++;
  });
  return {
    total_tasks: tasks.length,
    total_tidak_selesai: notdoneTasks.length,
    by_status: byStatus,
    by_member: byMember,
    by_category: byCategory,
    by_date: byDate,
    total_worked_minutes: totalWorkedMinutes,
    total_worked_hours_str: fmtMinutesAsHours(totalWorkedMinutes),
    completion_rate: tasks.length ? Math.round((byStatus.done || 0) / tasks.length * 100) : 0,
  };
}

      ];

  // Sheet 3: Catatan Penting

    const header = ['Tanggal', 'Jam', 'Tipe', 'Judul', 'Keterangan', 'Dibuat Oleh', 'Dibuat Pada'];

      r.date || '', r.time || '', r.type || '',

      [],
      ['PER ANGGOTA'],
      ['Nama', 'Total', 'Done', 'Proses', 'TODO', 'Tidak Selesai', 'Jam Kerja', '% Selesai'],
      ...Object.entries(stats.by_member).map(([k, v]) => [
        k, v.total, v.done, v.proses, v.todo, v.notdone,

      [],

      ['Kategori', 'Total', 'Done', '% Selesai'],
      ...Object.entries(stats.by_category).map(([k, v]) => [
        k, v.total, v.done, v.total ? `${Math.round(v.done/v.total*100)}%` : '0%',
      ]),
      [],
      ['PER TANGGAL'],
      ['Tanggal', 'Total', 'Done', '% Selesai'],
      ...Object.entries(stats.by_date).sort((a,b) => a[0].localeCompare(b[0])).map(([k, v]) => [
        k, v.total, v.done, v.total ? `${Math.round(v.done/v.total*100)}%` : '0%',
      ]),
    ];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, 'Ringkasan');
  }

  // Meta sheet always last
  const metaRows = [
    ['META EXPORT'],
    ['Exported At', new Date().toISOString()],
    ['App Version', 'v2.63-mkt'],
    ['Range From', d.from],
    ['Range To', d.to],

  XLSX.writeFile(wb, filename);
}

  if (d.opts.summary && d.tasks.length) {

          });
        });
      });
    }
  }

  return content;
}

function tsToIso(ts) {
  if (!ts) return '';
  if (typeof ts === 'string') return ts;
  if (ts.toDate) return ts.toDate().toISOString();
  if (ts instanceof Date) return ts.toISOString();
  return String(ts);
}
function csvCell(v) {
  const s = String(v == null ? '' : v);
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}
function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
